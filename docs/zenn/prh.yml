    pattern: 奇跡の
    message: 誇張・未検証訴求は避けてください。
  - expected: 早急に
    pattern: 秒で
    message: 簡易訴求は避けてください。
  - expected: 即座に
    pattern: 今すぐ
    message: 煽り表現は避けてください。
  - expected: 大きな
    pattern: とんでもない
    message: 誇張表現は避けてください。
  - expected: 非常識な

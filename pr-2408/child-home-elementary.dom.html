body {

}
h1, h2, h3, h4 {
  text-wrap: balance;

.tap-target {
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: transform 0.15s ease;
}
.tap-target:active {
  transform: scale(0.95);
}
@keyframes bounce-in {
  0% {
    transform: scale(0);
    opacity: 0;
  }
  50% {
    transform: scale(1.15);
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}
@keyframes point-pop {
  0% {
    transform: scale(0.5) translateY(20px);
    opacity: 0;
  }
  60% {
    transform: scale(1.2) translateY(-5px);
  }
  100% {
    transform: scale(1) translateY(0);
    opacity: 1;
  }
}
@keyframes spin-in {
  0% {
    transform: rotateY(0deg);
  }
  100% {
    transform: rotateY(720deg);
  }
}
@keyframes shimmer {
  0% {
    background-position: -200% center;
  }
  100% {
    background-position: 200% center;
  }
}
@keyframes flame-appear {
  0% {
    transform: scale(0) translateY(10px);
    opacity: 0;
  }
  100% {
    transform: scale(1) translateY(0);
    opacity: 1;
  }
}
.animate-bounce-in {
  animation: bounce-in 0.5s ease-out forwards;
}
.animate-point-pop {
  animation: point-pop 0.6s ease-out forwards;
}
.animate-spin-in {
  animation: spin-in 1.5s ease-in-out forwards;
}
.animate-shimmer {
  background: linear-gradient(90deg, transparent 25%, rgba(255, 215, 0, 0.3) 50%, transparent 75%);
  background-size: 200% 100%;
  animation: shimmer 2s infinite;
}
.animate-flame {
  animation: flame-appear 0.3s ease-out forwards;
}
.animate-flame:nth-child(1) {
  animation-delay: 0s;
}
.animate-flame:nth-child(2) {
  animation-delay: 0.1s;
}
.animate-flame:nth-child(3) {
  animation-delay: 0.2s;
}
.animate-flame:nth-child(4) {
  animation-delay: 0.3s;
}
.animate-flame:nth-child(5) {
  animation-delay: 0.4s;
}
.skeleton-block {
  background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
  background-size: 200% 100%;
  animation: skeleton-shimmer 1.5s ease-in-out infinite;
}
@keyframes skeleton-shimmer {
  0% {
    background-position: 200% 0;
  }
  100% {
    background-position: -200% 0;
  }
}
@keyframes bar-pulse {
  0%,	100% {
    box-shadow: 0 0 8px rgba(251, 191, 36, 0.4);
  }
  50% {
    box-shadow: 0 0 16px rgba(251, 191, 36, 0.9);
  }
}
@keyframes banner-drop {
  0% {
    transform: translateY(-120%) scale(0.8);
    opacity: 0;
  }
  100% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}
@keyframes gold-flash {
  0% {
    background-color: rgba(251, 191, 36, 0.4);
  }
  100% {
    background-color: transparent;
  }
}
@keyframes stamp-in {
  0% {
    transform: scale(2.5) rotate(-15deg);
    opacity: 0;
  }
  60% {
    transform: scale(0.9) rotate(3deg);
    opacity: 1;
  }
  100% {
    transform: scale(1) rotate(0deg);
    opacity: 1;
  }
}
@keyframes holo-border {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}
@keyframes sparkle-float {
  0%,	100% {
    transform: scale(0.5) rotate(0deg);
    opacity: 0.4;
  }
  50% {
    transform: scale(1.2) rotate(180deg);
    opacity: 1;
  }
}
@keyframes card-shine {
  from {
    transform: translateX(-100%);
  }
  to {
    transform: translateX(100%);
  }
}
@keyframes breathing-glow {
  0%,	100% {
    box-shadow: 0 0 4px rgba(255, 200, 0, 0.3);
  }
  50% {
    box-shadow: 0 0 12px rgba(255, 200, 0, 0.7);
  }
}
@media (prefers-reduced-motion: reduce) {
  *,	*::before,	*::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  .tap-target:active {
    transform: none;
  }
}
:focus-visible {
  outline: 3px solid var(--theme-primary, #3878b8);
  outline-offset: 2px;
  border-radius: 4px;
}
.safe-area-bottom {
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
@keyframes btn-pulse {
  0%,	100% {
    transform: scale(1);
  }
  50% {
    transform: scale(0.97);
  }
}
.animate-btn-pulse {
  animation: btn-pulse 0.8s ease-in-out infinite;
}

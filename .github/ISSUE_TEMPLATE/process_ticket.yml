name: プロセス・ドキュメント Issue（PO 起票系）
description: LP / マーケ / プロセス改善 / refactor-SSOT / docs 系の起票テンプレ。実装系は dev_ticket.yml
title: ""
labels: []
body:
  - type: markdown
    attributes:
      value: |
        実装系 Issue（feat / fix / 新機能・新 API / DB スキーマ変更等）は [dev_ticket.yml](?template=dev_ticket.yml) を使ってください。

  - type: dropdown
    id: kind
    attributes:
      label: kind（PO 起票系 5 区分）
      options:
        - "refactor-SSOT: SSOT 整理・重複削除"
        - "docs: ドキュメント / ADR / 設計書"
        - "marketing: マーケ / Growth"
        - "process: プロセス改善 / CI / Issue テンプレ"
        - "lp-content: LP 文言 / IA"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - "critical: 最優先"
        - "high: 高"
        - "medium: 中"
        - "low: 低"
    validations:
      required: true

  - type: textarea
    id: customer-value
    attributes:
      label: 顧客価値・目的
      description: 「なぜこの変更がユーザー / 運営 / 開発チームにとって必要か」を 1-2 文で。
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: 関連 Issue / ADR
      description: Blocked by / Blocks / Related の 3 分割（#1261）+ 関連 ADR
      placeholder: |
        - Blocked by: #123 / Blocks: #456 / Related: ADR-0003 / ADR-0010
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 設計背景
      description: 過去経緯 / この改善がなかった場合に何が困るか
    validations:
      required: true

  - type: textarea
    id: design-policy
    attributes:
      label: 設計方針
      description: 採用設計 / 将来拡張 / 意図的に対応しない範囲（YAGNI）
    validations:
      required: true

  - type: textarea
    id: auxiliary-feature-ux-checklist
    attributes:
      label: 補助機能 UX 完成度 checklist（permission 系 / marketplace 系のみ必須、#2117 / #2139）
      description: |
        process 系 Issue でも対象機能が Web Platform API (permission 系) / marketplace 系の場合は以下 checklist を AC として複製する。
        該当しない Issue は「N/A（permission/marketplace 系ではない）」と明記。
        SSOT: ADR-0010 §7 / `.claude/skills/issue-triage/SKILL.md`。
      value: |
        <!-- permission 系 5 項目 (#2117): 該当する場合 AC に複製 -->
        - [ ] **Loading state**: 非同期処理中の UI 状態 (spinner / disabled)
        - [ ] **Failure handling**: 失敗時の try/catch + ユーザーフィードバック (Toast / inline error / 設定画面誘導)
        - [ ] **Informed consent**: 許可リクエスト前の説明 (頻度 / 内容 / 送信先 / quiet hours 等)
        - [ ] **State feedback**: 成功時 / 失敗時 / pending 中の UI 状態フィードバック
        - [ ] **Settings fallback**: 後から ON/OFF できる設定画面 link

        <!-- marketplace 系 4 層 (#2139): 該当する場合 AC に複製 -->
        - [ ] **表示層**: マーケットプレイス一覧 + 詳細ページで preview 可能
        - [ ] **import 層**: import service / DB 反映機構 / 重複検出
        - [ ] **アプリ反映層**: 取込後に既存機能 (special_rewards / checklist_templates / settings 等) と整合動作
        - [ ] **setup 連携層**: 新規ユーザー setup フローで一括追加経路あり

        または: N/A（permission/marketplace 系ではない）
    validations:
      required: false

  - type: textarea
    id: oss-research
    attributes:
      label: OSS / 確立パターン調査結果（refactor-SSOT 時に必須、#1350）
      description: 10 行超独自実装は 2 件以上比較必須。lp-content / marketing / docs では N/A 可。

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives + Prior art（Rust RFC 抜粋、#2090）
      description: |
        検討した他案 + 不採用理由を列挙。Prior art (採用 OSS / 競合の同等機能) を含めること。
        該当が無い場合は「探した範囲」を書く（どのキーワードで探し、なぜ該当がなかったか）。
      value: |
        <!-- 例:
        - 案 A: SSOT を docs/CLAUDE.md に追加 — メリット: 既存集約 / デメリット: 散在継続（不採用）
        - 案 B: 専用 ADR 起票 — メリット: 横断ポリシー化 / デメリット: 10 枠圧迫（採用）
        - Prior art: kubernetes/community KEP テンプレ
        -->
    validations:
      required: true

  - type: textarea
    id: no-gos
    attributes:
      label: No-gos / 今回スコープ外（Shape Up 抜粋、#2090）
      description: |
        今回意図的にスコープ外とする範囲を明示する（YAGNI 適用 / 将来 Issue 候補）。
        該当が無い場合は「特になし」と明記すること（空欄不可）。
      value: |
        <!-- 例:
        - 既存 open Issue への retroactive 適用（新規のみ）
        - CI 自動 lint（本 Issue では Manual 検証、future work）
        -->
    validations:
      required: true

  - type: textarea
    id: research-link
    attributes:
      label: research-link（Deep Research 結果リンク、#2090）
      description: |
        `docs/reference/NN-research-*.md` への link を貼る、または "N/A" を明記。
        OSS 比較 / 競合調査 / 学術参照などの調査記録のリンク先。
      value: |
        <!-- 例:
        - docs/reference/01-research-issue-templating-and-doc-consolidation.md §2.1
        - または: N/A（既存パターン適用のため新規調査不要）
        -->
    validations:
      required: true

  - type: textarea
    id: pre-pmf-check
    attributes:
      label: Pre-PMF check（ADR-0010 §3、#2090）
      description: |
        Pre-PMF 段階での起票バイアスを防ぐため、ADR-0010 §3 の 5 質問に回答する。
        `priority:critical` bug fix / 法務・セキュリティ対応はチェック不要（その旨明記）。
      value: |
        <!--
        Q1: どのペルソナ (P1/P2) のどの課題を解決するか？
        →
        Q2: V2MOM Method (M1〜M4) のどれに紐づくか？
        →
        Q3: この変更なしで Pre-PMF サインアップ 20 名/月 (V2MOM Q2) に到達できるか？ (可能→medium 以下 / 不可能→high 以上 + 根拠)
        →
        Q4: 直近に Growth / Marketing / Onboarding 系 Issue を 1 本以上起票したか？
        →
        Q5: 工数と Year 1 KPI (MAU 500 / MRR ¥12,000) への寄与が釣り合っているか？
        →
        または: 免除 (priority:critical bug fix / 法務 / セキュリティ / process: プロセス改善で機構強制)
        -->
    validations:
      required: true

  - type: textarea
    id: goals
    attributes:
      label: ゴール（Acceptance Criteria）
      description: 測定可能な数値・文字列・ファイルパス・SS で書く（ADR-0004）。曖昧な「修正する」禁止。
      value: |
        - [ ] **AC1**: <!-- 測定可能な完了条件 -->
        - [ ] **AC2**:
    validations:
      required: true

  - type: textarea
    id: ac-verification-plan
    attributes:
      label: AC 検証計画（ADR-0004 必須）
      description: 各 AC をどの機械手段（コマンド / ファイルパス / 期待文字列）で検証するか。
      value: |
        - AC1: <!-- 例: `wc -l <file>` <= N -->
        - AC2:
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: 工程区分
      description: 下流 Phase は上流 Phase が閉じるまで着手しない。
      options:
        - "P0: インフラ・プロセス更改"
        - "P1: ポリシー・判断基準 (ADR)"
        - "P2: プロダクト定義・顧客範囲"
        - "N/A（独立タスク）"
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 影響範囲
      description: 変更ファイル / 影響を受ける運用 / dogfood 観察期間など。実装系の重い検証項目は本 template 対象外（dev_ticket.yml を使用）。

  - type: checkboxes
    id: done-checklist
    attributes:
      label: 完了チェックリスト
      options:
        - label: "AC 全項目 [x]（ADR-0005）"
        - label: "`npm run pre-ready -- --pr <num>` PASS（PR 系の場合）"
        - label: "GitHub Actions 全 green"
        - label: "dogfood 観察期間中の異常なし（Phase 2 を持つ Issue のみ）"

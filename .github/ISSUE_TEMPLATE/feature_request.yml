name: 機能リクエスト
description: 新機能や改善の提案
title: "[Feature] "
labels: ["type:feat"]
body:
  - type: markdown
    attributes:
      value: |
        機能の提案ありがとうございます。以下の項目を記入してください。

  - type: textarea
    id: usecase
    attributes:
      label: ユースケース
      description: この機能はどんな問題を解決しますか? 誰が恩恵を受けますか?
      placeholder: |
        親として、... したい
        子供ユーザーとして、... したい
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案する解決策
      description: この機能がどのように動作してほしいか説明してください。
    validations:
      required: true

  - type: dropdown
    id: age-group
    attributes:
      label: 対象年齢モード
      description: どの年齢モードに最も関連しますか?
      options:
        - "baby (0-2歳)"
        - "preschool (3-5歳)"
        - "elementary (6-9歳)"
        - "junior (10-12歳)"
        - "senior (13-15歳)"
        - "全年齢共通"
        - "親/管理者向け"
        - "該当なし"

  - type: textarea
    id: ui-mockup
    attributes:
      label: UI イメージ / モックアップ
      description: 画面のイメージがあれば、ラフスケッチやモックアップを添付してください。

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他の解決策やワークアラウンドを検討しましたか?

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: その他の情報、参考事例、スクリーンショットなど。

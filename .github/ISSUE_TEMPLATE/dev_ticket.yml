name: 開発チケット
description: 開発タスク・改善・リファクタリング等の内部チケット
title: ""
labels: []
body:
  - type: dropdown
    id: type
    attributes:
      label: 種別
      options:
        - "feat: 新機能"
        - "fix: バグ修正"
        - "refactor: リファクタリング"
        - "infra: インフラ・CI/CD"
        - "design: デザイン・UI改善"
        - "test: テスト改善"
        - "docs: ドキュメント"
        - "marketing: マーケティング・LP"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - "critical: 最優先"
        - "high: 高"
        - "medium: 中"
        - "low: 低"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: このチケットで何を実現するか（1-2文）
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・動機
      description: なぜこのタスクが必要なのか

  - type: textarea
    id: goals
    attributes:
      label: ゴール
      description: 完了条件をチェックリスト形式で
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: technical
    attributes:
      label: 技術メモ
      description: 実装方針・影響範囲・注意点など

  - type: textarea
    id: test
    attributes:
      label: テスト観点
      description: 確認すべきテストケース
      value: |
        - [ ]
        - [ ]

  - type: textarea
    id: impact-check
    attributes:
      label: 影響範囲チェック
      description: 変更が他の画面やコンポーネントに波及しないか事前に確認する
      value: |
        - [ ] この変更は他の画面/コンポーネントに影響するか？
        - [ ] 用語変更の場合: grep で全件確認したか？
        - [ ] UIの構造変更の場合: チュートリアル（tutorial-chapters.ts）の更新が必要か？
        - [ ] E2Eテスト（data-tutorial/data-testid セレクタ）に影響するか？
    validations:
      required: true

  - type: textarea
    id: quality-policy
    attributes:
      label: 品質ポリシー（スクラップ&ビルド時 必読）
      description: 機能削除・根本的修正を含むチケットでは特に厳守すること。
      value: |
        以下に該当する作業がある場合、はりぼて修正（表示だけ変更・コメントアウト・unused変数放置等）は禁止。
        作業が肥大化してでも、設計思想・コーディングポリシーに準拠した丁寧な対応を行うこと。

        **機能削除時:**
        - [ ] 関連コンポーネント・ページ・ルートを完全削除（コメントアウトではなく削除）
        - [ ] 関連するサービス層・API エンドポイントも削除
        - [ ] 関連するDBテーブル・カラムのマイグレーション対応
        - [ ] 関連するテスト（unit/E2E）を削除または更新
        - [ ] 関連するシードデータ・テストデータを更新
        - [ ] 他コンポーネントからの参照（import/props/型定義）を全て除去
        - [ ] 不要になった型定義・インターフェースを削除

        **機能改修時:**
        - [ ] 既存コードの上に条件分岐を重ねるのではなく、設計から見直す
        - [ ] 一時的な互換レイヤー（_旧変数名、re-export等）を残さない
        - [ ] UIの配置変更は関連コンポーネント全体のレイアウトを再検討する

    validations:
      required: true

  - type: textarea
    id: impact-check
    attributes:
      label: 影響範囲・横展開チェック
      description: この変更が他の画面やシステムに及ぼす影響を事前に確認すること
      value: |
        - [ ] 用語変更がある場合: `grep` で全件確認し、漏れなく更新した
        - [ ] UI構造変更がある場合: チュートリアル（`tutorial-chapters.ts`）のセレクタ・説明文を更新した
        - [ ] デモ版（`/demo`）にも同等の変更が必要か確認した
        - [ ] カラー・スタイル: hex 直書き・Tailwind デフォルト色の新規追加をしていない（`docs/reference/color-mapping.md` 参照）
        - [ ] Button/Card/FormField 等のプリミティブコンポーネントを使用した
        - [ ] 影響する設計書（`docs/design/`）を更新した

  - type: textarea
    id: done-checklist
    attributes:
      label: 完了チェックリスト（共通）
      description: チケット完了時に全項目を満たすこと。省略不可。
      value: |
        - [ ] `npx biome check .` — lint エラーなし
        - [ ] `npx svelte-check` — 型エラーなし
        - [ ] `npx vitest run` — ユニットテスト全通過
        - [ ] `npx playwright test` — E2Eテスト全通過
        - [ ] git commit & push 完了
        - [ ] GitHub Actions デプロイ成功（`gh run list` で確認）
        - [ ] ローカルNUCデプロイ & 動作確認
        - [ ] 影響する設計書（docs/design/）を更新済み
    validations:
      required: true

  - type: input
    id: related
    attributes:
      label: 関連チケット
      description: "関連する Issue 番号（例: #123, #456）"

  - type: textarea
    id: scrap_and_build
    attributes:
      label: 品質ポリシー（スクラップ&ビルド時）
      description: |
        機能削除・根本改修を伴う場合は必ず記載。
        はりぼて実装（コメントアウト・表示非表示だけの応急処置）は禁止。
      value: |
        - 削除対象のコード・機能:
        - 新規実装で置き換えるもの:
        - 互換性の考慮:

  - type: markdown
    attributes:
      value: |
        ---
        ## 📋 チケット作業プロセス（全開発者・ツール共通）

        以下のプロセスに従って作業を進めてください:

        1. **チケット内容の確認** — ゴール・背景・技術メモを読み、スコープを把握
        2. **ブランチ作成** — `feature/{issue番号}-{slug}` または `fix/{issue番号}-{slug}` 形式（例: `feature/123-add-rewards`）
        3. **影響範囲の調査** — 関連ファイル・テスト・設計書を事前に確認
        4. **実装** — CLAUDE.md のコーディングガイドラインに従う
        5. **lint チェック** — `npx biome check .` でエラーなし確認
        6. **型チェック** — `npx svelte-check` でエラーなし確認
        7. **ユニットテスト** — `npx vitest run` で全通過確認
        8. **E2E テスト** — `npx playwright test` で全通過確認
        9. **設計書同期** — DB・API・UI・インフラ変更時は `docs/design/` の該当設計書を更新
        10. **UI 変更時のビジュアル検証** — 対象画面をブラウザで確認、スクリーンショット提示
        11. **Draft PR 発行** — `gh pr create --draft` でDraft PRとして作成（PRテンプレートに従って記載）
        12. **CI 確認** — GitHub Actions のテスト・デプロイが成功することを確認
        13. **Ready for Review** — CI通過・コンフリクト解消後に `gh pr ready` で Ready に変更
        14. **マージ** — レビュー承認後にマージ、`closes #番号` で自動クローズ
        15. **本番動作確認** — デプロイ後に本番環境で動作を確認

  - type: markdown
    attributes:
      value: |
        ## ⚠️ 重要事項・注意点

        - **UI実装ルール**: ボタンは `$lib/ui/primitives/Button.svelte`、カードは `$lib/ui/primitives/Card.svelte` を使用。routes 配下で hex カラー直書き禁止、CSS変数を使用すること
        - **サービス層経由必須**: `+server.ts` から直接 ORM を呼び出さない。`$lib/server/services` 経由で実装
        - **データ取得**: `+page.ts` / `+layout.ts` の `load` を使用。コンポーネント内の直接 fetch 禁止
        - **スクラップ&ビルド**: 機能削除時にコメントアウト・表示変更だけの応急処置禁止。根本から削除・再構築すること
        - **画像アセット**: シール/バッジ/実績等のゲーム報酬は絵文字で代替禁止。Gemini生成またはチケット化必須
        - **テスト・デモデータ**: 実在の子供名を使用禁止。「たろうくん」「はなこちゃん」のようなダミー名を使用
        - **チケット管理**: 開発チケットの起票・管理は GitHub Issues に統一すること。`docs/tickets/` は新規チケット管理には使用しない

  - type: checkboxes
    id: done_checklist
    attributes:
      label: 完了チェックリスト
      description: チケット完了時にすべてチェックすること
      options:
        - label: "lint: `npx biome check .` エラーなし"
        - label: "型: `npx svelte-check` エラーなし"
        - label: "ユニットテスト: `npx vitest run` 全通過"
        - label: "E2E: `npx playwright test` 全通過"
        - label: "PR テンプレートに従って Draft PR を発行"
        - label: "CI 通過後、PR を Draft → Ready for Review に変更"
        - label: "GitHub Actions デプロイ成功確認"
        - label: "UI 変更がある場合: ビジュアル検証・スクリーンショット提示済み"
        - label: "設計書の同期更新が必要な場合: docs/design/ 更新済み"

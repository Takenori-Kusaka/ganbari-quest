name: 開発チケット
description: 開発タスク・改善・リファクタリング等の内部チケット
title: ""
labels: []
body:
  - type: dropdown
    id: type
    attributes:
      label: 種別
      options:
        - "feat: 新機能"
        - "fix: バグ修正"
        - "refactor: リファクタリング"
        - "infra: インフラ・CI/CD"
        - "design: デザイン・UI改善"
        - "test: テスト改善"
        - "docs: ドキュメント"
        - "marketing: マーケティング・LP"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - "critical: 最優先"
        - "high: 高"
        - "medium: 中"
        - "low: 低"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: このチケットで何を実現するか（1-2文）
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・動機
      description: なぜこのタスクが必要なのか

  - type: textarea
    id: goals
    attributes:
      label: ゴール（Acceptance Criteria）
      description: |
        測定可能な数値・文字列・ファイルパス・スクリーンショットで書く（ADR-0004）。「修正する」「改善する」等の曖昧な記述は禁止。
        AC が 7 件を超える場合は子 Issue に分割し、本 Issue を親として「Blocks」に子番号を記載すること（着手前に PO と合意）。
      value: |
        **現状（Before）**: <!-- スクリーンショット or 具体的な表示テキスト -->

        **期待結果（After）**: <!-- 修正後に画面で確認できる具体的な状態 -->

        **完了条件**:
        - [ ] <!-- 例: ナビラベルが「みまもり・はげまし・カスタマイズ・設定」の 4 つで表示される -->
        - [ ] <!-- 例: 同一用語の全出現箇所を grep で確認し漏れなく修正済み -->

        **実機検証手順**:
        1. <!-- 例: /admin にアクセスし、チュートリアルを最初から開始 -->
    validations:
      required: true

  - type: textarea
    id: ac-verification-plan
    attributes:
      label: AC 検証計画（ADR-0004 必須）
      description: |
        各 AC をどの機械手段（コマンド・ファイルパス・期待文字列）で検証するか列挙する。「目視確認」だけでは不可。
      value: |
        - AC1: <!-- 例: `node scripts/measure-lp-dimensions.mjs` で mobileHeight ≤ 15000 を assert -->
        - AC2: <!-- 例: `tests/e2e/lp-first-view.spec.ts` が PASS、SS が `docs/screenshots/<id>/mobile-fold.png` に存在 -->
    validations:
      required: true

  - type: dropdown
    id: static_analysis_tier
    attributes:
      label: 静的解析階層（infra/lint/静的解析ツール導入時のみ、ADR-0007）
      options:
        - "N/A（静的解析ツール導入ではない）"
        - "T1 PR ゲート（< 30s、merge block）"
        - "T2 PR 並行レーン（30s-3min、別 job）"
        - "T3 nightly / 週次（> 3min、PR は止めない）"
        - "T4 四半期 / 手動（脆弱性スキャン等）"
        - "未定（PR で実測後に決定）"

  - type: textarea
    id: oss-research
    attributes:
      label: OSS / 確立パターン調査結果（type:feat/refactor/infra で独自実装 10 行超時に必須、#1350）
      description: |
        OSS / 確立パターンを 2 件以上調査し採用判断を残すこと。docs/fix/test 等保守は「N/A」可。
      placeholder: |
        - 候補 A: zod — stars 34k / bundle 14KB / TS 型推論。△ i18n は別途
        - 候補 B: valibot — bundle 1KB。△ エコシステム小
        - 決定: A（標準）/ Pre-PMF コスト (ADR-0010): +14KB 許容

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives + Prior art（Rust RFC 抜粋、#2090）
      description: |
        検討した他案 + 不採用理由を列挙。Prior art (採用 OSS / 競合の同等機能) を含めること。
        該当が無い場合は「探した範囲」を書く（どのキーワードで探し、なぜ該当がなかったか）。
      value: |
        <!-- 例:
        - 案 A: 既存 hook を拡張 — メリット: 0 行追加 / デメリット: 副作用増（不採用）
        - 案 B: 新規 service 層 — メリット: 単一責務 / デメリット: 工数 +2h（採用）
        - Prior art: kubernetes/kube-aggregator の同等パターン
        -->
    validations:
      required: true

  - type: textarea
    id: no-gos
    attributes:
      label: No-gos / 今回スコープ外（Shape Up 抜粋、#2090）
      description: |
        今回意図的にスコープ外とする範囲を明示する（YAGNI 適用 / 将来 Issue 候補）。
        該当が無い場合は「特になし」と明記すること（空欄不可）。
      value: |
        <!-- 例:
        - 既存 open Issue への retroactive 適用（新規のみ）
        - i18n 対応（別 Issue 候補）
        -->
    validations:
      required: true

  - type: textarea
    id: research-link
    attributes:
      label: research-link（Deep Research 結果リンク、#2090）
      description: |
        `docs/reference/NN-research-*.md` への link を貼る、または "N/A" を明記。
        OSS 比較 / 競合調査 / 学術参照などの調査記録のリンク先。
      value: |
        <!-- 例:
        - docs/reference/01-research-issue-templating-and-doc-consolidation.md §2.1
        - または: N/A（既存パターン適用のため新規調査不要）
        -->
    validations:
      required: true

  - type: textarea
    id: pre-pmf-check
    attributes:
      label: Pre-PMF check（ADR-0010 §3、#2090）
      description: |
        Pre-PMF 段階での起票バイアスを防ぐため、ADR-0010 §3 の 5 質問に回答する。
        `priority:critical` bug fix / 法務・セキュリティ対応はチェック不要（その旨明記）。
      value: |
        <!--
        Q1: どのペルソナ (P1/P2) のどの課題を解決するか？
        →
        Q2: V2MOM Method (M1〜M4) のどれに紐づくか？
        →
        Q3: この機能なしで Pre-PMF サインアップ 20 名/月 (V2MOM Q2) に到達できるか？ (可能→medium 以下 / 不可能→high 以上 + 根拠)
        →
        Q4: 直近に Growth / Marketing / Onboarding 系 Issue を 1 本以上起票したか？
        →
        Q5: 工数と Year 1 KPI (MAU 500 / MRR ¥12,000) への寄与が釣り合っているか？
        →
        または: 免除 (priority:critical bug fix / 法務 / セキュリティ)
        -->
    validations:
      required: true

  - type: textarea
    id: technical
    attributes:
      label: 技術メモ
      description: 実装方針・影響範囲・注意点

  - type: textarea
    id: test
    attributes:
      label: テスト観点
      description: テストケース。ダイアログ・オーバーレイ変更時は開閉サイクル検証を含める。
      value: |
        **単体 / E2E**:
        - [ ]

        **ダイアログ・オーバーレイ検証**（該当時）: 表示条件 / 閉じる / 再表示なし / キュー制御 / E2E 表示→閉じる→元画面復帰

  - type: textarea
    id: quality-policy
    attributes:
      label: 品質ポリシー（スクラップ&ビルド時 必読）
      description: 機能削除・根本改修時、はりぼて修正（コメントアウト等の応急処置）禁止。
      value: |
        **機能削除時**: 関連コンポーネント / ページ / ルート / サービス / API / DB / テスト / シードを完全削除（コメントアウト不可）。型定義・参照も全除去。
        **機能改修時**: 既存コードに条件分岐を重ねず設計から見直す。一時的互換レイヤー（`_旧変数名` / re-export 等）を残さない。
        **削除対象 / 置き換え / 互換性考慮**:

  - type: textarea
    id: impact-check
    attributes:
      label: 影響範囲・並行実装チェック
      description: |
        並行実装ペア全リスト: `docs/design/parallel-implementations.md`
      value: |
        **並行実装ペア**（該当するものすべて）:
        - [ ] 本番アプリ + デモ
        - [ ] LP（`site/**` / `shared-labels.js` 含む、ADR-0013 Committed/Aspirational 確認）
        - [ ] 全年齢モード 5 種（baby/preschool/elementary/junior/senior）
        - [ ] ナビ 3 種（デスクトップ + モバイル + ボトムナビ）
        - [ ] E2E/ユニットシード + チュートリアル + デモガイド

        **横展開**:
        - [ ] 用語変更がある場合: `grep` で全件確認・漏れなく更新
        - [ ] UI 構造変更時: `tutorial-chapters.ts` のセレクタ・説明文を更新
        - [ ] hex 直書き / Tailwind デフォルト色の新規追加なし
        - [ ] Button / Card / FormField 等のプリミティブ使用
        - [ ] 影響する設計書（`docs/design/`）を更新（DB→08 / API→07 / UI→06 / インフラ→13 / セキュリティ→14）

  - type: textarea
    id: blocked_by
    attributes:
      label: Blocked by（上流依存）
      description: |
        このIssue着手前に完了すべき上流 Issue 番号を列挙。全て closed になるまで in-progress にしない（#1261）。
      placeholder: |
        #123 (ADR: Pre-PMF 判断基準)

  - type: textarea
    id: blocks
    attributes:
      label: Blocks（下流への影響）
      description: |
        このIssue完了後にアンブロックされる下流 Issue 番号。途中で scope 変更・close する場合、ここに挙げた Issue の再見積が必要。
      placeholder: |
        #789 (実装: 画面)

  - type: textarea
    id: related
    attributes:
      label: Related（参考のみ・依存関係なし）
      description: |
        関連するが依存関係を持たない Issue / ADR / ドキュメント。「Blocked by / Blocks」に該当しないもののみ。
      placeholder: |
        #234 (類似実装の参考)
        ADR-0003

  - type: dropdown
    id: phase
    attributes:
      label: 工程区分（P0-P7 / N/A）
      description: |
        下流 Phase は上流 Phase が閉じるまで着手しない（例: P5 実装は P2 企画・P3 アーキ未確定では始めない）。複数該当時は最も上流。
      options:
        - "P0: インフラ・プロセス更改"
        - "P1: ポリシー・判断基準 (ADR)"
        - "P2: プロダクト定義・顧客範囲（企画）"
        - "P3: アーキテクチャ・技術選定 (ADR)"
        - "P4: 戦略・構造設計"
        - "P5: 実装・コンテンツ"
        - "P6: 機能実装"
        - "P7: バグ修正・クリーンアップ"
        - "N/A（独立タスク）"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        **チケット作業プロセス・コーディングガイドライン・禁止事項**:
        - [`docs/sessions/dev-session.md`](../../docs/sessions/dev-session.md) — 開発セッション手順 / 並行実装チェックリスト
        - [`CLAUDE.md`](../../CLAUDE.md) — Things Not To Do / コーディングガイドライン / Build & Test
        - [`.github/CLAUDE.md`](../CLAUDE.md) — PR 運用 / Draft / QM Approve 体制（ADR-0022）

  - type: checkboxes
    id: done_checklist
    attributes:
      label: 完了チェックリスト
      description: チケット完了時に全項目チェック必須。
      options:
        - label: "AC 全項目に [x] が入っている（部分実装で closes 禁止 — ADR-0005）"
        - label: "`npm run pre-ready -- --pr <num>` 全 Step PASS（ADR-0030）"
        - label: "Draft PR → CI 全緑 → `gh pr ready` で Ready 化"
        - label: "GitHub Actions デプロイ成功確認（`gh run list`）"
        - label: "UI 変更時: SS 添付 + DESIGN.md §9 セルフチェック済み"
        - label: "影響する設計書（docs/design/）を同 PR 内で更新済み"
        - label: "Critical 修正の場合: ADR-0002 5 要件確認済み（E2E 回帰 + AC 全項目 + 提案全実装 + 5 年齢モード検証 + 直近 30 日重複変更チェック）"

name: 開発チケット
description: 開発タスク・改善・リファクタリング等の内部チケット
title: ""
labels: []
body:
  - type: dropdown
    id: type
    attributes:
      label: 種別
      options:
        - "feat: 新機能"
        - "fix: バグ修正"
        - "refactor: リファクタリング"
        - "infra: インフラ・CI/CD"
        - "design: デザイン・UI改善"
        - "test: テスト改善"
        - "docs: ドキュメント"
        - "marketing: マーケティング・LP"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - "critical: 最優先"
        - "high: 高"
        - "medium: 中"
        - "low: 低"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: このチケットで何を実現するか（1-2文）
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・動機
      description: なぜこのタスクが必要なのか

  - type: textarea
    id: goals
    attributes:
      label: ゴール
      description: 完了条件をチェックリスト形式で
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: technical
    attributes:
      label: 技術メモ
      description: 実装方針・影響範囲・注意点など

  - type: textarea
    id: test
    attributes:
      label: テスト観点
      description: 確認すべきテストケース
      value: |
        - [ ]
        - [ ]

  - type: input
    id: related
    attributes:
      label: 関連チケット
      description: "関連する Issue 番号（例: #123, #456）"

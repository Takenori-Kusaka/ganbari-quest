name: バグ報告
description: バグや予期しない動作を報告する
title: "[Bug] "
labels: ["type:fix"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。以下の項目をできるだけ詳しく記入してください。

  - type: textarea
    id: description
    attributes:
      label: 症状
      description: 何が起きたか? 本来どう動くべきか?
      placeholder: |
        期待動作: ...
        実際の動作: ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: この問題をどのように再現できますか?
      placeholder: |
        1. ... にアクセス
        2. ... をクリック
        3. エラーが発生
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 環境
      description: アプリをどの環境で実行していますか?
      options:
        - AWS Lambda 本番 (ganbari-quest.com)
        - Docker (NUC / セルフホスト)
        - ローカル開発 (npm run dev)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: ブラウザ / デバイス
      description: "例: Chrome 120 / iPhone Safari / iPad"
      placeholder: "Chrome 120 (Android)"

  - type: dropdown
    id: screen
    attributes:
      label: 発生画面
      description: どの画面で発生しましたか?
      options:
        - "子供画面 (baby: 0-2歳)"
        - "子供画面 (preschool: 3-5歳)"
        - "子供画面 (elementary: 6-9歳)"
        - "子供画面 (junior: 10-12歳)"
        - "子供画面 (senior: 13-15歳)"
        - "親 管理画面"
        - "デモ画面"
        - "LP / マーケティングサイト"
        - "その他"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 深刻度
      description: ユーザーへの影響度
      options:
        - "critical: アプリが使えない / データ消失"
        - "high: 主要機能が使えない"
        - "medium: 回避策あり"
        - "low: 見た目の問題 / 軽微"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: スクリーンショット / 動画
      description: 問題を説明するスクリーンショットや画面録画があれば添付してください。

  - type: textarea
    id: blocked_by
    attributes:
      label: Blocked by（上流依存）
      description: |
        このバグ修正を着手する前に完了すべき**上流 Issue 番号**を列挙する。
        同じエリアの先行 PR / 未確定ポリシー等。
      placeholder: "#123 (ADR: 該当ポリシー)"

  - type: textarea
    id: blocks
    attributes:
      label: Blocks（下流への影響）
      description: |
        このバグ修正完了後にアンブロックされる**下流 Issue 番号**を列挙する。
      placeholder: "#789 (依存する機能実装)"

  - type: textarea
    id: related
    attributes:
      label: Related（参考のみ・依存関係なし）
      description: "関連するが依存関係を持たない Issue / ADR / 過去インシデントを列挙"
      placeholder: "#234 (類似バグ)"

  - type: dropdown
    id: phase
    attributes:
      label: 工程区分（P0-P7 / N/A）
      description: "バグ修正は通常 P7 だが、ポリシーや仕様の見直しが必要な場合は該当工程を選択"
      options:
        - "P0: インフラ・プロセス更改"
        - "P1: ポリシー・判断基準 (ADR)"
        - "P2: プロダクト定義・顧客範囲（企画）"
        - "P3: アーキテクチャ・技術選定 (ADR)"
        - "P4: 戦略・構造設計"
        - "P5: 実装・コンテンツ"
        - "P6: 機能実装"
        - "P7: バグ修正・クリーンアップ"
        - "N/A（独立タスク）"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: その他、問題の特定に役立つ情報があれば記載してください。

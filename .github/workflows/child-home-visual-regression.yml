name: Child Home Visual Regression (pixelmatch baseline)

# Issue #2520 AC4/AC5
#
# 目的:
#   per-child refactor (ADR-0055) で頻発する「子供 UI 破綻」を pixelmatch baseline で検出する。
#   既存 `check-lp-visual-regression` の pixelmatch 機構 (LP 専用) を child home に拡張。
#   - 撮影元: `scripts/capture-hp-screenshots.mjs --only growth` (本番ルート /<uiMode>/home を
#     demo fixture data で撮影、AUTH_MODE=anonymous + DATA_SOURCE=demo、ADR-0048) +
#     `--only feature-rpg-battle` (child 冒険クライマックス = critical screen)
#   - baseline: `scripts/child-home-baseline/*.webp` (git tracked、4 mode home + 1 critical screen)
#   - 比較: `scripts/check-lp-visual-regression.mjs` の汎用 pixelmatch ロジックを
#     `--baseline-dir scripts/child-home-baseline --current-dir tmp/child-home-current` で再利用
#
# 段階運用 (Issue #2520 AC4):
#   - 初回は warn (continue-on-error: true)。安定後に hard-fail へ昇格判断 (別 Issue)。
#   - 閾値: diff > 10% (check-lp-visual-regression の DEFAULT_THRESHOLD_PCT)
#
# scope (AC5、過剰回避):
#   - child home 4 mode (preschool/elementary/junior/senior) × mobile 1 viewport
#   - + 1 critical screen (elementary battle)
#   - baby は準備モード (親向け、子供 gamification 非適用、ADR-0011) のため対象外
#   - 全画面×5 mode×複数 viewport は維持コスト爆発のため却下 (research §4)

on:
  pull_request:
    # #2931 / branch-strategy.md §4: 重量レーン。main 向け PR のみ発火（develop 向けでは skip）。
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/lib/features/child-home/**"
      - "src/routes/(child)/**"
      - "src/lib/features/battle/**"
      - "scripts/capture-hp-screenshots.mjs"
      - "scripts/check-lp-visual-regression.mjs"
      - "scripts/child-home-baseline/**"
      - ".github/workflows/child-home-visual-regression.yml"
  push:
    branches:
      - main
    paths:
      - "src/lib/features/child-home/**"
      - "src/routes/(child)/**"
      - "src/lib/features/battle/**"
      - "scripts/capture-hp-screenshots.mjs"
      - "scripts/check-lp-visual-regression.mjs"
      - "scripts/child-home-baseline/**"
      - ".github/workflows/child-home-visual-regression.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: child-home-visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  child-home-visual-regression-check:
    name: Child home visual regression (pixelmatch diff, warn)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build app for preview
        run: npm run build

      - name: Start preview server
        env:
          AUTH_MODE: anonymous
          DATA_SOURCE: demo
        run: |
          npm run preview -- --port 5173 --host 0.0.0.0 > /tmp/preview.log 2>&1 &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
          for i in {1..120}; do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Preview server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Preview server failed to start within 120s"
          cat /tmp/preview.log
          exit 1

      - name: Capture child home + critical screen (current state)
        env:
          BASE_URL: http://localhost:5173
        # 撮影 1 件失敗でも回帰検出を継続させる (baseline 内 image が存在する限り比較する)
        continue-on-error: true
        run: |
          node scripts/capture-hp-screenshots.mjs --webp --only growth
          node scripts/capture-hp-screenshots.mjs --webp --only feature-rpg-battle

      - name: Stop preview server
        if: always()
        run: |
          if [ -n "$PREVIEW_PID" ]; then
            kill $PREVIEW_PID 2>/dev/null || true
          fi

      - name: Assemble current SS with baseline names
        # baseline (scripts/child-home-baseline/child-home-<mode>.webp / child-battle-elementary.webp)
        # と同名で current SS を tmp/child-home-current/ に集約する (pixelmatch は同名比較)。
        run: |
          mkdir -p tmp/child-home-current
          for mode in preschool elementary junior senior; do
            if [ -f "site/screenshots/growth-stage-$mode.webp" ]; then
              cp "site/screenshots/growth-stage-$mode.webp" "tmp/child-home-current/child-home-$mode.webp"
            fi
          done
          if [ -f "site/screenshots/feature-rpg-battle.webp" ]; then
            cp "site/screenshots/feature-rpg-battle.webp" "tmp/child-home-current/child-battle-elementary.webp"
          fi
          ls -la tmp/child-home-current/

      - name: Run child home visual regression check (warn)
        # AC4: 初回は warn (continue-on-error)。diff > 10% でも CI を止めず、安定後に hard-fail 昇格判断。
        continue-on-error: true
        run: |
          node scripts/check-lp-visual-regression.mjs \
            --baseline-dir scripts/child-home-baseline \
            --current-dir tmp/child-home-current \
            --diff-dir tmp/child-home-visual-diffs

      - name: Generate JSON report (artifact)
        if: always()
        run: |
          node scripts/check-lp-visual-regression.mjs \
            --baseline-dir scripts/child-home-baseline \
            --current-dir tmp/child-home-current \
            --json > child-home-visual-regression.json || true

      - name: Upload visual regression report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: child-home-visual-regression
          path: |
            child-home-visual-regression.json
            tmp/child-home-visual-diffs/
            tmp/child-home-current/
          retention-days: 14

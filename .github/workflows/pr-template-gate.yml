name: PR テンプレート必須ゲート

# PR テンプレート (.github/PULL_REQUEST_TEMPLATE.md) の必須項目が
# 適切に記入されているかを 5 つの並列ジョブで検証する。
# いずれか 1 つでも失敗すると PR がブロックされる（hard-fail）。
#
# 対象: Ready for Review 済みの全 PR（Draft は除外）
#
# ★ lane-aware 化 (#2944 / Phase A/A-2、親 #2942 / EPIC #2861):
#   develop 二層ブランチ戦略 (docs/sessions/branch-strategy.md §3〜§5) で 4 lane
#   (feature / integration / hotfix / dependabot) が併存する。各 job は **全 lane で必ず実行**
#   され (`if:` で lane による全体 skip をしない = required check の空洞化禁止)、job 内部で
#   composite action `actions/pr-lane` (A-1 SSOT) から lane を取得して検証観点を切り替える。
#     - feature / hotfix: 現行と完全同一の検証観点 (AC4 回帰ゼロ)。
#     - integration (develop→main 統合 PR): 単一 Issue × per-PR AC 前提を満たせないため、
#       「含有 PR 一覧の存在 / 統合エビデンス表の存在 / 統合 section set」に観点を差し替える (AC2/AC3)。
#     - dependabot: 現行どおり skip 相当 (lane に吸収、AC5。挙動不変)。script が skipped を返す。
#   検証ロジックは yml に inline せず `scripts/pr-template-gate-checks.mjs` (unit test 対象) に集約。
#   lane 判定も同 script に inline せず `actions/pr-lane` 経由のみ (#2944 no-go: inline 重複禁止)。
#
# ★ テンプレート自動追従:
#   各ジョブはベースブランチではなく PR HEAD の PULL_REQUEST_TEMPLATE.md / PR_TEMPLATE_SECTIONS.json を
#   実行時に読み込み、チェック対象のセクション名・フィールド名を動的に決定する (#1855 / #2060)。
#   テンプレートを変更しても本ファイルの修正は不要。base.ref ではなく head.sha を読むことで、
#   template refactor PR で旧 template の見出しを placeholder として残すはりぼて運用を排除する。
#
# ★ required check context 名 (= job の name) は変更しない (#2944 AC6 / no-go):
#   main ruleset に登録済の 5 context (必須セクションの存在確認 / 関連 Issue 番号の記入 /
#   変更タイプの選択 / 顧客価値・目的の記入 / テスト実行結果の記入) を 1 つも改名しない。

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ============================================================
  # Job 1: 必須セクション存在確認 (lane-aware)
  #   feature/hotfix = SSOT JSON の全 `## ` 見出し / integration = 統合 section set /
  #   dependabot = skip。検証ロジックは scripts/pr-template-gate-checks.mjs (check=section-presence)。
  # ============================================================
  check-section-presence:
    name: "必須セクションの存在確認"
    runs-on: ubuntu-latest
    if: "github.event.pull_request.draft == false"
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Classify PR lane (actions/pr-lane SSOT)
        id: lane
        uses: ./actions/pr-lane
      - name: Verify required sections exist (lane-aware)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          LANE: ${{ steps.lane.outputs.lane }}
        run: |
          set -euo pipefail
          printf '%s' "${PR_BODY}" > /tmp/pr-body.md
          printf '%s' "${PR_LABELS}" > /tmp/pr-labels.json
          node scripts/pr-template-gate-checks.mjs \
            --check section-presence --lane "${LANE}" \
            --body-file /tmp/pr-body.md \
            --labels-json /tmp/pr-labels.json \
            --template-file .github/PULL_REQUEST_TEMPLATE.md \
            --ssot-file .github/PR_TEMPLATE_SECTIONS.json

  # ============================================================
  # Job 2: 関連 Issue 番号の記入 (lane-aware)
  #   feature/hotfix = `closes #<番号>` or 理由 / integration = 含有 PR 一覧 (#NNNN 2 件以上) /
  #   dependabot = skip。check=issue-reference。
  # ============================================================
  check-issue-reference:
    name: "関連 Issue 番号の記入"
    runs-on: ubuntu-latest
    if: "github.event.pull_request.draft == false"
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Classify PR lane (actions/pr-lane SSOT)
        id: lane
        uses: ./actions/pr-lane
      - name: Verify issue reference (lane-aware)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          LANE: ${{ steps.lane.outputs.lane }}
        run: |
          set -euo pipefail
          printf '%s' "${PR_BODY}" > /tmp/pr-body.md
          printf '%s' "${PR_LABELS}" > /tmp/pr-labels.json
          node scripts/pr-template-gate-checks.mjs \
            --check issue-reference --lane "${LANE}" \
            --body-file /tmp/pr-body.md \
            --labels-json /tmp/pr-labels.json \
            --template-file .github/PULL_REQUEST_TEMPLATE.md

  # ============================================================
  # Job 3: 変更タイプの選択 (lane-aware)
  #   feature/hotfix = 1 つ以上 [x] / integration = 複数混在 OK (1 つ以上 [x] 維持) /
  #   dependabot = skip。check=change-type。
  # ============================================================
  check-change-type:
    name: "変更タイプの選択"
    runs-on: ubuntu-latest
    if: "github.event.pull_request.draft == false"
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Classify PR lane (actions/pr-lane SSOT)
        id: lane
        uses: ./actions/pr-lane
      - name: Verify change type selected (lane-aware)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          LANE: ${{ steps.lane.outputs.lane }}
        run: |
          set -euo pipefail
          printf '%s' "${PR_BODY}" > /tmp/pr-body.md
          printf '%s' "${PR_LABELS}" > /tmp/pr-labels.json
          node scripts/pr-template-gate-checks.mjs \
            --check change-type --lane "${LANE}" \
            --body-file /tmp/pr-body.md \
            --labels-json /tmp/pr-labels.json \
            --template-file .github/PULL_REQUEST_TEMPLATE.md

  # ============================================================
  # Job 4: 顧客価値・目的の記入 (lane-aware)
  #   feature/hotfix = 1 番目 ## section の placeholder 残存検出 / integration = 同検出
  #   (リリースバッチ顧客価値サマリの意味付け) / dependabot = skip。check=customer-value。
  # ============================================================
  check-customer-value:
    name: "顧客価値・目的の記入"
    runs-on: ubuntu-latest
    if: "github.event.pull_request.draft == false"
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Classify PR lane (actions/pr-lane SSOT)
        id: lane
        uses: ./actions/pr-lane
      - name: Verify customer value section filled (lane-aware)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          LANE: ${{ steps.lane.outputs.lane }}
        run: |
          set -euo pipefail
          printf '%s' "${PR_BODY}" > /tmp/pr-body.md
          printf '%s' "${PR_LABELS}" > /tmp/pr-labels.json
          node scripts/pr-template-gate-checks.mjs \
            --check customer-value --lane "${LANE}" \
            --body-file /tmp/pr-body.md \
            --labels-json /tmp/pr-labels.json \
            --template-file .github/PULL_REQUEST_TEMPLATE.md

  # ============================================================
  # Job 5: テスト実行結果の記入 (lane-aware、⚠️ 必須)
  #   feature/hotfix = 結果列 placeholder/空欄検出 (type:docs skip) /
  #   integration = 統合エビデンス表 (マージ判定エビデンス) の存在検証 /
  #   dependabot/type:docs = skip。check=test-results。
  # ============================================================
  check-test-results:
    name: "テスト実行結果の記入"
    runs-on: ubuntu-latest
    if: "github.event.pull_request.draft == false"
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Classify PR lane (actions/pr-lane SSOT)
        id: lane
        uses: ./actions/pr-lane
      - name: Verify test results filled (lane-aware)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          LANE: ${{ steps.lane.outputs.lane }}
        run: |
          set -euo pipefail
          printf '%s' "${PR_BODY}" > /tmp/pr-body.md
          printf '%s' "${PR_LABELS}" > /tmp/pr-labels.json
          node scripts/pr-template-gate-checks.mjs \
            --check test-results --lane "${LANE}" \
            --body-file /tmp/pr-body.md \
            --labels-json /tmp/pr-labels.json \
            --template-file .github/PULL_REQUEST_TEMPLATE.md

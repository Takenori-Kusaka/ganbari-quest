name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    # site/** 以外の変更でも、アプリ画面が変わればスクリーンショットに影響するため
    # src/** と scripts/capture-hp-screenshots.mjs も対象に含める (#1157)
    paths:
      - 'site/**'
      - 'src/**'
      - 'scripts/capture-hp-screenshots.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  capture-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Regenerate sitemap.xml (#1908)
        # main push 毎に site/*.html / site/help/*.html を走査し sitemap.xml を再生成。
        # generate-sitemap.mjs は <lastmod> を git log から取得するため、過去ページも
        # 直近の意味のある変更日に追従する (手動編集時代の stale 解消)。
        run: node scripts/generate-sitemap.mjs

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build app for preview
        run: npm run build

      - name: Start preview server
        # #2097 EPIC PR-B1 (2026-05-17): AUTH_MODE=anonymous + DATA_SOURCE=demo を指定し、
        # capture-hp-screenshots.mjs が本番ルート `/(child)/[uiMode]/home` を demo fixture data
        # で撮影できるようにする (Multi-Lambda demo Lambda と同型の env、ADR-0048)。
        #   - AUTH_MODE=anonymous: hooks.server.ts が AnonymousAuthProvider を選択 →
        #       tenantId='demo' / role='owner' / licenseStatus=ACTIVE で全画面を許可
        #   - DATA_SOURCE=demo: db/factory.ts が demo Repository (in-memory fixture) を選択 →
        #       SQLite / DynamoDB に書き込みせず demo-data.ts のみで完結
        # Epic #2525 Phase 7 PR-L5 (#2860): AWS_LICENSE_SECRET 注入を撤去 (license key 全廃、
        # assertLicenseKeyConfigured() は PR-L0 で no-op 化済)。
        env:
          AUTH_MODE: anonymous
          DATA_SOURCE: demo
        run: |
          npm run preview -- --port 5173 --host 0.0.0.0 > /tmp/preview.log 2>&1 &
          echo "PREVIEW_PID=$!" >> $GITHUB_ENV
          # 起動待機 (最大 60 秒)
          for i in {1..60}; do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Preview server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Preview server failed to start within 60s"
          cat /tmp/preview.log
          exit 1

      - name: Capture LP screenshots
        env:
          BASE_URL: http://localhost:5173
        # 撮影失敗時は workflow を fail させる (ADR-0029 / #1783: 無言で古い画像を残さない)
        # capture-hp-screenshots.mjs は 1 件でも撮影失敗があれば exit 1 する
        run: node scripts/capture-hp-screenshots.mjs --webp

      - name: Stop preview server
        if: always()
        run: |
          if [ -n "$PREVIEW_PID" ]; then
            kill $PREVIEW_PID 2>/dev/null || true
          fi

      - name: Verify screenshots referenced in site/index.html all exist
        # #1783 AC1: HTML 内 <img src="screenshots/..."> が全て site/screenshots/ に物理存在することを検証
        # measure-lp-dimensions.mjs は missing screenshots を検知すると exit 1 する
        run: node scripts/measure-lp-dimensions.mjs --site-dir=site --output=lp-metrics.json

      - name: Verify screenshot freshness (#1893)
        # #1893 AC4-5 (PO-4-7、8 回目指摘): 「撮影が黙ってスキップされて古い WebP が GitHub Pages に
        # 配信される」事故への構造的対策。直前の "Capture LP screenshots" step 完了直後なので、
        # 全 webp の mtime が 30 分以内であるべき。1 件でも古ければ撮影スキップ疑いで fail。
        run: node scripts/check-screenshot-freshness.mjs --max-age-minutes 30

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: Quarterly Security Scan

on:
  schedule:
    # Every quarter: 1st of Jan, Apr, Jul, Oct at 00:00 UTC
    - cron: '0 0 1 */3 *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: |
          npm audit --json > audit-result.json 2>&1 || true
          echo "Audit completed"

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-results
          path: audit-result.json
          retention-days: 90

      - name: Create issues from findings
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/security-findings-to-issues.mjs audit-result.json

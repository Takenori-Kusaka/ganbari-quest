name: PR AC verification check (ADR-0038)

# #1165 / ADR-0038: PR 本文の「AC 検証マップ」が全行埋まっているかを機械検証する
# 初期リリース: warn-only (continue-on-error: true)。
# → hard-fail に昇格済み（pr-template-gate.yml 導入に合わせて統一）。
#
# #1808: Dependabot / Renovate / Copilot 自動 PR は本ジョブを skip する
# (依存更新 PR は AC マップを持たないため、毎回手動で `<!-- ac-verification-skip: ... -->`
# コメントを追加する運用負担を解消)。
#
# #2945 (Phase A/A-3、親 #2942): lane-aware 化。
#   - job は全レーンで必ず実行 (trigger filter / job-level 全体 skip しない、#2942 no-go)。
#     ただし dependabot は従来どおり job-level if で skip 相当 (AC6、挙動不変)。
#   - lane 判定は A-1 SSOT (actions/pr-lane → scripts/pr-lane.mjs) 経由のみ (AC1、inline 判定なし)。
#   - feature / hotfix lane = 現行 (AC 検証マップ 4 列 + #1539 未完了表記検出) を完全維持 (AC4)。
#   - integration lane = per-PR AC マップの代わりに「マージ判定エビデンス表」section の存在 +
#     4 列 (含有 PR / 領域 / テスト / 結果) + 「残 NG 0 件」明示を検証 (AC3、audit-team.md §3.5)。
#   - 検証ロジックは scripts/check-ac-verification-map.mjs に集約 (unit test 可能、二重実装しない)。
#   - required context 名「Verify AC map in PR body」は不変 (AC7)。

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: Verify AC map in PR body
    runs-on: ubuntu-latest
    # #1808 / #2945 AC6: Dependabot / Renovate は依存更新 PR で AC マップを持たないため job レベルで skip。
    # (skip された job は Success を報告し required check は通過する = 従来どおりの挙動不変。
    #  これは dependabot lane の「観点」であり、他レーンは下記 step で必ず実検証する)
    if: "github.event.pull_request.draft == false && github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'"
    timeout-minutes: 3
    steps:
      # A-1 lane 判定 SSOT を uses。inline 判定はしない (AC1、#2942 no-go)。
      # composite action (actions/pr-lane) + judge 関数 (check-ac-verification-map.mjs) を読むため checkout。
      - name: Checkout (lane SSOT + judge 関数)
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            actions/pr-lane
            scripts/pr-lane.mjs
            scripts/check-ac-verification-map.mjs
          sparse-checkout-cone-mode: false

      - name: Classify PR lane (A-1 SSOT)
        id: lane
        uses: ./actions/pr-lane

      - name: "Check AC verification (lane-aware: feature/hotfix=AC map, integration=evidence table)"
        uses: actions/github-script@v9
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
          PR_LANE: ${{ steps.lane.outputs.lane }}
        with:
          script: |
            const lane = process.env.PR_LANE || 'feature';
            core.info(`PR lane = ${lane} (判定 SSOT: scripts/pr-lane.mjs / actions/pr-lane、#2945)`);

            const body = process.env.PR_BODY || '';
            const labels = JSON.parse(process.env.PR_LABELS || '[]').map((l) => l.name);

            // 検証ロジックは scripts/check-ac-verification-map.mjs に集約 (二重実装しない、unit test 済)。
            const mod = await import(
              `${process.env.GITHUB_WORKSPACE}/scripts/check-ac-verification-map.mjs`
            );
            const result = mod.checkAcVerification({ body, labels, lane });

            for (const line of result.info || []) core.info(line);

            if (result.ok) {
              core.info(`✅ ${result.reason || 'PASS'} (lane=${result.lane})`);
              return;
            }
            core.setFailed(result.error || '❌ AC 検証に失敗しました');

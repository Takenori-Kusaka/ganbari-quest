name: Deploy to AWS (Production)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'static/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'Dockerfile*'
      - 'infra/**'
      - 'drizzle/**'
      - 'scripts/**'
      # #2097 hotfix #7: deploy.yml 自身の変更でも deploy が走るようにする
      # (PR #2133 で発覚: deploy.yml 単独 PR は trigger されずに demo Lambda 反映遅延)
      - '.github/workflows/deploy.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ganbari-quest
  LAMBDA_FUNCTION: ganbari-quest-app
  DOMAIN_NAME: ganbari-quest.com
  CERTIFICATE_ARN: arn:aws:acm:us-east-1:443370718249:certificate/a278b058-8798-4793-ba1f-3f3de2a0b837
  APP_MAJOR_VERSION: "1"

jobs:
  # #1277: pre-deploy の test-lint / test-e2e / test-cognito / test-gate は
  # ci.yml (PR CI) と完全重複しており、flaky が 2 回走って main が詰まる温床だった。
  # - PR merge 前: ci.yml が Branch ruleset の required_status_checks で強制
  # - PR merge 後: deploy.yml は build + deploy + health-check のみ
  # - 本番稼働確認: e2e-production (post-deploy smoke on Lambda URL) が担う
  # - 障害時: Rollback on failure step が previous image に戻す
  # 歴史的インシデント: #911 / #967 / #1084 / #1097 / #1277

  deploy:
    runs-on: ubuntu-24.04-arm
    environment: production
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.version.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "image-tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is-release=true" >> "$GITHUB_OUTPUT"
          else
            VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "image-tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "is-release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Deploying version: $VERSION"

      # #1586: 本番デプロイに必須の GitHub Secrets が登録されているかを deploy 前に検証する。
      # - OPS_SECRET_KEY: cron-dispatcher の Bearer 認証 fallback (CRON_SECRET 未登録時)
      # - AWS_OIDC_IAMROLE_ARN: AWS 認証
      # - STRIPE_SECRET_KEY: Stripe 課金
      # 欠落するとサイレントに secret 注入が抜けて本番で fail するため、CI 段階で hard-fail させる。
      # Epic #2525 Phase 7 PR-L5 (#2860): AWS_LICENSE_SECRET は license key 全廃 contract で撤去済。
      - name: Validate required secrets
        env:
          OPS_SECRET_KEY: ${{ secrets.OPS_SECRET_KEY }}
          AWS_OIDC_IAMROLE_ARN: ${{ secrets.AWS_OIDC_IAMROLE_ARN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          # #2310 / #2337 / ADR-0050: parent-gate-session.ts が production で必須要求。
          # 未注入だと /admin/* cold start で throw して 500 連発 (PR #2325 で実害発生)。
          PARENT_GATE_COOKIE_SECRET: ${{ secrets.PARENT_GATE_COOKIE_SECRET }}
        run: |
          missing=0
          for s in OPS_SECRET_KEY AWS_OIDC_IAMROLE_ARN STRIPE_SECRET_KEY PARENT_GATE_COOKIE_SECRET; do
            val=$(eval echo "\$$s")
            if [ -z "$val" ]; then
              echo "::error::Required GitHub Secret '$s' is missing. Register via 'gh secret set $s --body <value>'"
              missing=$((missing + 1))
            else
              echo "::notice::Required secret '$s' is set"
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "::error::$missing required secret(s) missing — aborting deploy (#1586)"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_IAMROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra/
        run: npm ci

      # Phase 1: Replacement check + Deploy Storage stack (ECR repo, DynamoDB, S3)
      # #1400: cdk diff で Replacement/Destroy リソースを検出し、未承認なら deploy をブロック
      - name: CDK diff — replacement check (Storage)
        working-directory: infra/
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          npx cdk diff GanbariQuestStorage \
            -c domainName=${{ env.DOMAIN_NAME }} \
            -c certificateArn=${{ env.CERTIFICATE_ARN }} \
            -c cronSecret=${{ secrets.CRON_SECRET }} \
            -c opsSecretKey=${{ secrets.OPS_SECRET_KEY }} \
            2>&1 | COMMIT_MSG="$COMMIT_MSG" node ../scripts/check-cdk-replacement.mjs

      - name: CDK Deploy Storage
        working-directory: infra/
        run: >-
          npx cdk deploy GanbariQuestStorage --require-approval never
          -c domainName=${{ env.DOMAIN_NAME }}
          -c certificateArn=${{ env.CERTIFICATE_ARN }}
          -c cronSecret=${{ secrets.CRON_SECRET }}
          -c opsSecretKey=${{ secrets.OPS_SECRET_KEY }}

      # Phase 2: Build and push Docker image to ECR (ARM64 native on Graviton runner)
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install app dependencies
        run: npm ci

      - name: Generate version
        run: npm run version:generate
        env:
          APP_MAJOR_VERSION: ${{ env.APP_MAJOR_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.lambda
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.version.outputs.image-tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # BUILD_TIMESTAMP busts the version:generate layer cache (#711 / PR #826 review).
          # Combined with cache-from: type=gha this ensures the image always stamps
          # a fresh build date even for workflow_dispatch redeploys of the same SHA.
          build-args: |
            BUILD_TIMESTAMP=${{ github.run_id }}-${{ github.run_attempt }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Phase 2.4: #3087 解決策 B — deploy 済 image から SvelteKit client immutable アセットを抽出。
      # NetworkStack の StaticAssetsDeploy (BucketDeployment) が `infra/static-assets/_app/immutable`
      # を S3 に upload し、/_app/immutable/* を S3 (OAC) から配信する。
      # 抽出元は「Lambda が実際に配信するのと同一の build artifact」(同一 image) のため、HTML が
      # 参照する content-hash と S3 の hash が構造的に完全一致する (host 再ビルドによる hash drift を回避)。
      # Dockerfile.lambda は build/ の中身を /app/ に COPY するため client は /app/client。
      - name: Extract SvelteKit client assets for S3 offload (#3087)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker pull "$IMAGE"
          CID=$(docker create "$IMAGE")
          rm -rf infra/static-assets
          mkdir -p infra/static-assets
          docker cp "$CID:/app/client/_app" infra/static-assets/_app
          docker rm "$CID" >/dev/null
          if [ ! -d infra/static-assets/_app/immutable ]; then
            echo "::error::SvelteKit immutable assets not found at /app/client/_app/immutable in image (#3087)"
            exit 1
          fi
          echo "::notice::Extracted $(find infra/static-assets/_app/immutable -type f | wc -l) immutable asset files for S3 offload"

      # Phase 2.5: Clean up failed stacks and orphaned resources
      - name: Cleanup failed stacks
        continue-on-error: true
        run: |
          for stack in GanbariQuestOps GanbariQuestNetwork GanbariQuestCompute GanbariQuestAuth GanbariQuestSes; do
            status=$(aws cloudformation describe-stacks --stack-name "$stack" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "$status" = "ROLLBACK_COMPLETE" ] || [ "$status" = "DELETE_FAILED" ]; then
              echo "Deleting $stack (status: $status)"
              aws cloudformation delete-stack --stack-name "$stack"
              aws cloudformation wait stack-delete-complete --stack-name "$stack" || true
            fi
          done
          # Delete orphaned S3 bucket left by failed SES stack deploys (RETAIN policy)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SES_BUCKET="ganbari-quest-support-mail-${ACCOUNT_ID}"
          SES_STATUS=$(aws cloudformation describe-stacks --stack-name GanbariQuestSes --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          echo "SES stack status: $SES_STATUS"
          echo "Checking bucket: $SES_BUCKET"
          # If the SES stack doesn't exist (or is failed), remove the orphaned bucket
          if [ "$SES_STATUS" = "NOT_FOUND" ] || [ "$SES_STATUS" = "ROLLBACK_COMPLETE" ] || [ "$SES_STATUS" = "CREATE_FAILED" ]; then
            echo "SES stack not active. Cleaning up orphaned bucket..."
            aws s3 rb "s3://${SES_BUCKET}" --force 2>&1 || echo "Bucket cleanup skipped (may not exist)"
          fi
          # Note: Cost Anomaly Monitoring はデフォルトモニターを使用（CDK管理外）

      # Phase 3: Replacement check + Deploy Compute + Network stacks (Lambda, CloudFront)
      # #1400: Auth / Network / Compute スタック（特に Cognito User Pool）の Replacement を検知
      - name: CDK diff — replacement check (all stacks)
        working-directory: infra/
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          npx cdk diff --all \
            -c domainName=${{ env.DOMAIN_NAME }} \
            -c certificateArn=${{ env.CERTIFICATE_ARN }} \
            -c staticAssetsS3Offload=true \
            -c feedbackDiscordWebhookUrl=${{ secrets.FEEDBACK_DISCORD_WEBHOOK_URL }} \
            -c geminiApiKey=${{ secrets.GEMINI_API_KEY }} \
            -c adminAllowedIps=${{ secrets.ADMIN_ALLOWED_IPS }} \
            -c stripeSecretKey=${{ secrets.STRIPE_SECRET_KEY }} \
            -c stripeWebhookSecret=${{ secrets.STRIPE_WEBHOOK_SECRET }} \
            -c stripePriceStandardMonthly=${{ vars.STRIPE_PRICE_STANDARD_MONTHLY }} \
            -c stripePriceFamilyMonthly=${{ vars.STRIPE_PRICE_FAMILY_MONTHLY }} \
            -c useLookupKey=${{ vars.USE_LOOKUP_KEY || 'true' }} \
            -c stripeWebhookShadowMode=${{ vars.STRIPE_WEBHOOK_SHADOW_MODE || 'false' }} \
            -c stripeWebhookSecretTest=${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }} \
            -c discordWebhookSupport=${{ secrets.DISCORD_WEBHOOK_SUPPORT }} \
            -c cronSecret=${{ secrets.CRON_SECRET }} \
            -c opsSecretKey=${{ secrets.OPS_SECRET_KEY }} \
            -c parentGateCookieSecret=${{ secrets.PARENT_GATE_COOKIE_SECRET }} \
            -c discordWebhookHealth=${{ secrets.DISCORD_WEBHOOK_HEALTH }} \
            ${{ secrets.GOOGLE_OAUTH_CLIENT_ID && format('-c googleClientId={0}', secrets.GOOGLE_OAUTH_CLIENT_ID) || '' }} \
            ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET && format('-c googleClientSecret={0}', secrets.GOOGLE_OAUTH_CLIENT_SECRET) || '' }} \
            2>&1 | COMMIT_MSG="$COMMIT_MSG" node ../scripts/check-cdk-replacement.mjs

      - name: CDK Deploy all stacks
        working-directory: infra/
        run: >-
          npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
          -c domainName=${{ env.DOMAIN_NAME }}
          -c certificateArn=${{ env.CERTIFICATE_ARN }}
          -c staticAssetsS3Offload=true
          -c feedbackDiscordWebhookUrl=${{ secrets.FEEDBACK_DISCORD_WEBHOOK_URL }}
          -c geminiApiKey=${{ secrets.GEMINI_API_KEY }}
          -c adminAllowedIps=${{ secrets.ADMIN_ALLOWED_IPS }}
          -c stripeSecretKey=${{ secrets.STRIPE_SECRET_KEY }}
          -c stripeWebhookSecret=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          -c stripePriceStandardMonthly=${{ vars.STRIPE_PRICE_STANDARD_MONTHLY }}
          -c stripePriceFamilyMonthly=${{ vars.STRIPE_PRICE_FAMILY_MONTHLY }}
          -c useLookupKey=${{ vars.USE_LOOKUP_KEY || 'true' }}
          -c stripeWebhookShadowMode=${{ vars.STRIPE_WEBHOOK_SHADOW_MODE || 'false' }}
          -c stripeWebhookSecretTest=${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
          -c discordWebhookSupport=${{ secrets.DISCORD_WEBHOOK_SUPPORT }}
          -c cronSecret=${{ secrets.CRON_SECRET }}
          -c opsSecretKey=${{ secrets.OPS_SECRET_KEY }}
          -c parentGateCookieSecret=${{ secrets.PARENT_GATE_COOKIE_SECRET }}
          -c discordWebhookHealth=${{ secrets.DISCORD_WEBHOOK_HEALTH }}
          ${{ secrets.GOOGLE_OAUTH_CLIENT_ID && format('-c googleClientId={0}', secrets.GOOGLE_OAUTH_CLIENT_ID) || '' }}
          ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET && format('-c googleClientSecret={0}', secrets.GOOGLE_OAUTH_CLIENT_SECRET) || '' }}

      # Phase 4: Update Lambda to use the new image
      - name: Update Lambda function image (production)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --region $AWS_REGION

      - name: Wait for Lambda update (production)
        run: |
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION \
            --region $AWS_REGION

      # ADR-0048 hotfix #6 (2026-05-16): demo Lambda は `latest` タグで CDK 管理されるため
      # CloudFormation が新しい image push を検知できない (production と同じ問題)。
      # production と同じく aws lambda update-function-code で SHA タグ image に明示更新する。
      # 該当しない時のスキップ条件: demo Lambda がまだ存在しない (初回 deploy 前)。
      - name: Update Lambda function image (demo)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if aws lambda get-function --function-name ganbari-quest-app-demo --region $AWS_REGION > /dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name ganbari-quest-app-demo \
              --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
              --region $AWS_REGION
            aws lambda wait function-updated \
              --function-name ganbari-quest-app-demo \
              --region $AWS_REGION
            echo "::notice::demo Lambda image updated to $IMAGE_TAG"
          else
            echo "::notice::demo Lambda not yet deployed; skipping image update"
          fi

      # #1586: cron-dispatcher Lambda の env 注入が正しいか dryRun で検証する。
      # Issue #1586 では PR#1509 マージ後 2 日間 dispatcher が CRON_SECRET 未注入のまま
      # silent fail していた (post-deploy smoke test 不在のため気付かず)。再発防止策。
      # dryRun: true で env 検証のみ実行し、ジョブ副作用は起こさない。
      - name: Cron dispatcher smoke test
        run: |
          aws lambda invoke \
            --function-name ganbari-quest-cron-dispatcher \
            --payload '{"cronJob":"retention-cleanup","dryRun":true}' \
            --cli-binary-format raw-in-base64-out \
            --region $AWS_REGION \
            cron-dispatcher-response.json
          echo "=== cron-dispatcher response ==="
          cat cron-dispatcher-response.json
          echo ""
          if ! grep -q '"statusCode":200' cron-dispatcher-response.json; then
            echo "::error::cron-dispatcher smoke test failed — env injection broken (#1586)"
            exit 1
          fi
          if ! grep -q '"dryRun":true' cron-dispatcher-response.json; then
            echo "::error::cron-dispatcher smoke test did not run in dryRun mode (#1586)"
            exit 1
          fi
          echo "::notice::cron-dispatcher smoke test passed"

      # ADR-0048 / #2130: demo Lambda post-deploy smoke test
      # PR #2124 (week 4) merge 後 3 件の hotfix (#2127 / #2128 / #2129) が連続発生し、
      # 特に #2129 (AUTH_MODE=anonymous skip for assertLicenseKeyConfigured 502 hotfix) は
      # CI 段階で検出されるべき機能的 fail だった。post-deploy smoke が無いため deploy 完了
      # 後に LP→demo 遷移先 502 で初めて露呈した経緯。
      #
      # 対策: production と同じく demo Lambda function URL 直接で 200 (直接応答) または
      # 302 (root から /switch へ redirect、demo Lambda root の正常仕様 — #2284) を確認し、
      # 502/503/504 (runtime crash) は hard-fail させて Rollback step に遷移させる。
      # デモ環境はまだ存在しない可能性があるため (初回 deploy 前 / disable 時) skip 条件付き。
      - name: Demo Lambda smoke test (#2130)
        id: demo-smoke
        continue-on-error: false
        run: |
          if ! aws lambda get-function --function-name ganbari-quest-app-demo --region $AWS_REGION > /dev/null 2>&1; then
            echo "::notice::demo Lambda not deployed; skipping smoke test"
            exit 0
          fi
          DEMO_URL=$(aws lambda get-function-url-config \
            --function-name ganbari-quest-app-demo \
            --region $AWS_REGION \
            --query 'FunctionUrl' --output text 2>/dev/null || echo "")
          if [ -z "$DEMO_URL" ] || [ "$DEMO_URL" = "None" ]; then
            echo "::warning::demo Lambda has no Function URL; skipping smoke test"
            exit 0
          fi
          echo "Demo smoke target: $DEMO_URL"
          echo "Waiting 10s for Lambda cold start..."
          sleep 10
          # 200 = direct response OK / 302 = root path redirect to /switch (正常仕様、#2284)
          # 502/503/504 のみ runtime crash として fail 判定対象
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sk -o /tmp/demo-smoke-body.txt -w "%{http_code}" "$DEMO_URL")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "::notice::demo Lambda smoke test passed ($STATUS OK — 200 direct or 302 /switch redirect)"
              exit 0
            fi
            if [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ] || [ "$STATUS" = "504" ]; then
              echo "::warning::demo Lambda returned $STATUS — likely runtime crash (e.g. #2129 assertLicenseKeyConfigured)"
              echo "=== Response body (last 500 chars) ==="
              tail -c 500 /tmp/demo-smoke-body.txt || true
            fi
            echo "Retrying in 10s..."
            sleep 10
          done
          echo "::error::demo Lambda smoke test failed after 5 attempts (last status: $STATUS) — see ADR-0048 / #2130 / #2284"
          exit 1

      # Phase 5: Post-deployment health check (with retry)
      # Lambda Function URL 直接で確認（DNS 障害時もデプロイ判定可能）
      - name: Health check
        id: healthcheck
        run: |
          FUNCTION_URL=$(aws lambda get-function-url-config \
            --function-name $LAMBDA_FUNCTION \
            --region $AWS_REGION \
            --query 'FunctionUrl' --output text)
          echo "Health check target: ${FUNCTION_URL}api/health"
          echo "Waiting 10s for Lambda cold start..."
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${FUNCTION_URL}api/health")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts (last status: $STATUS)"
          exit 1

      # Phase 5b: Rollback on health check failure
      - name: Rollback on failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          echo "Deployment failed, rolling back to previous image..."
          PREVIOUS_DIGEST=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --query 'sort_by(imageDetails,&imagePushedAt)[-2].imageDigest' \
            --output text \
            --region $AWS_REGION)
          if [ "$PREVIOUS_DIGEST" = "None" ] || [ -z "$PREVIOUS_DIGEST" ]; then
            echo "No previous image found, cannot rollback"
            exit 1
          fi
          echo "Rolling back to image digest: $PREVIOUS_DIGEST"
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY@$PREVIOUS_DIGEST \
            --region $AWS_REGION
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION \
            --region $AWS_REGION
          echo "Rollback complete"

      # Phase 5c: Post-deploy resource & cost audit
      - name: Post-deploy resource audit
        continue-on-error: true
        run: |
          echo "=== CloudFormation Stack Resource Count ==="
          for stack in GanbariQuestStorage GanbariQuestAuth GanbariQuestCompute GanbariQuestNetwork GanbariQuestSes GanbariQuestOps; do
            count=$(aws cloudformation list-stack-resources --stack-name "$stack" --query 'length(StackResourceSummaries)' --output text 2>/dev/null || echo "N/A")
            echo "$stack: $count resources"
          done

          echo ""
          echo "=== Lambda Functions (expected: 2) ==="
          aws lambda list-functions --query 'Functions[?starts_with(FunctionName,`ganbari`)].{Name:FunctionName,Memory:MemorySize,Timeout:Timeout}' --output table

          echo ""
          echo "=== DynamoDB Tables (expected: 1) ==="
          aws dynamodb list-tables --query 'TableNames[?contains(@,`ganbari`)]' --output text

          echo ""
          echo "=== S3 Buckets (expected: 2) ==="
          aws s3api list-buckets --query 'Buckets[?contains(Name,`ganbari`)].Name' --output text

          echo ""
          echo "=== ECR Repositories (expected: 1) ==="
          aws ecr describe-repositories --query 'repositories[?contains(repositoryName,`ganbari`)].{Name:repositoryName}' --output table 2>/dev/null || true

          echo ""
          echo "=== CloudWatch Log Groups ==="
          aws logs describe-log-groups --log-group-name-prefix "/aws/lambda/ganbari" --query 'logGroups[].{Name:logGroupName,RetentionDays:retentionInDays,StoredBytes:storedBytes}' --output table

          echo ""
          echo "=== Current month cost estimate ==="
          aws ce get-cost-and-usage \
            --time-period Start=$(date -u +%Y-%m-01),End=$(date -u +%Y-%m-%d) \
            --granularity MONTHLY \
            --metrics "UnblendedCost" \
            --query 'ResultsByTime[0].Total.UnblendedCost.{Amount:Amount,Unit:Unit}' \
            --output table 2>/dev/null || echo "Cost Explorer not available"

      - name: Detect orphaned resources
        continue-on-error: true
        run: |
          echo "=== Orphaned Lambda Functions (not in any stack) ==="
          all_lambdas=$(aws lambda list-functions --query 'Functions[?starts_with(FunctionName,`ganbari`)].FunctionName' --output text)
          managed_lambdas=""
          for stack in GanbariQuestStorage GanbariQuestAuth GanbariQuestCompute GanbariQuestNetwork GanbariQuestSes GanbariQuestOps; do
            managed=$(aws cloudformation list-stack-resources --stack-name "$stack" --query 'StackResourceSummaries[?ResourceType==`AWS::Lambda::Function`].PhysicalResourceId' --output text 2>/dev/null)
            managed_lambdas="$managed_lambdas $managed"
          done
          orphaned=0
          for fn in $all_lambdas; do
            if ! echo "$managed_lambdas" | grep -q "$fn"; then
              echo "ORPHANED: $fn"
              orphaned=$((orphaned + 1))
            fi
          done
          [ $orphaned -eq 0 ] && echo "None found"

          echo ""
          echo "=== Orphaned CloudWatch Log Groups ==="
          orphaned_logs=0
          for lg in $(aws logs describe-log-groups --log-group-name-prefix "/aws/lambda/ganbari" --query 'logGroups[].logGroupName' --output text); do
            fn_name=$(echo "$lg" | sed 's|/aws/lambda/||')
            if ! aws lambda get-function --function-name "$fn_name" > /dev/null 2>&1; then
              echo "ORPHANED LOG GROUP: $lg"
              orphaned_logs=$((orphaned_logs + 1))
            fi
          done
          [ $orphaned_logs -eq 0 ] && echo "None found"

          echo ""
          echo "=== Orphaned Cost Anomaly Monitors ==="
          aws ce get-anomaly-monitors --query 'AnomalyMonitors[?contains(MonitorName,`ganbari`) || contains(MonitorName,`gq-cost`)].{Name:MonitorName,Arn:MonitorArn}' --output table 2>/dev/null || echo "None found"

      - name: Show deployment outputs
        working-directory: infra/
        if: always()
        run: cat cdk-outputs.json 2>/dev/null || echo "No outputs file"

  e2e-production:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # #1007: test job と同一の cache key で Playwright browsers を共有
      # 同一 workflow run 内では test job が保存した cache を即時利用可能
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # CloudFront Geo Restriction (JP only) のため、Lambda Function URL 直接でテスト
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_IAMROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Lambda Function URL
        id: function-url
        run: |
          FUNCTION_URL=$(aws lambda get-function-url-config \
            --function-name $LAMBDA_FUNCTION \
            --region $AWS_REGION \
            --query 'FunctionUrl' --output text)
          # Remove trailing slash for consistency
          FUNCTION_URL="${FUNCTION_URL%/}"
          echo "url=$FUNCTION_URL" >> "$GITHUB_OUTPUT"
          echo "E2E target: $FUNCTION_URL"

      - name: Wait for deployment propagation
        run: sleep 15

      - name: Run Production Smoke Test
        run: npx playwright test --config playwright.production.config.ts
        env:
          E2E_BASE_URL: ${{ steps.function-url.outputs.url }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Production E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-production-results
          path: test-results/
          retention-days: 14

  release:
    needs: [deploy, e2e-production]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Deploy Info
            - **Version**: ${{ github.ref_name }}
            - **Commit**: ${{ github.sha }}
            - **Docker Image**: `${{ needs.deploy.outputs.image-tag }}`
            - **Deploy Date**: ${{ github.event.head_commit.timestamp }}

  release-notes:
    needs: [deploy, e2e-production]
    runs-on: ubuntu-latest
    if: needs.deploy.result == 'success' && needs.e2e-production.result != 'failure'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50

      - name: Get commit messages since last deploy
        id: commits
        run: |
          PREV=$(git tag --sort=-creatordate | grep '^deploy-' | head -1 || echo "")
          if [ -z "$PREV" ]; then
            RAW=$(git log --format="%s" --no-merges -10)
          else
            RAW=$(git log ${PREV}..HEAD --format="%s" --no-merges | head -30)
          fi

          # 前処理: チケット番号除去、プレフィックス日本語化、技術系除外
          MESSAGES=$(echo "$RAW" |
            sed 's/#[0-9]\+//g' |
            sed 's/^feat: /機能: /g' |
            sed 's/^fix: /修正: /g' |
            sed 's/^docs: /ドキュメント: /g' |
            sed 's/^refactor: /改善: /g' |
            sed 's/^perf: /改善: /g' |
            sed 's/^chore: /保守: /g' |
            sed 's/^test: /テスト: /g' |
            sed 's/^ci: /CI: /g' |
            sed 's/^build: /ビルド: /g' |
            grep -v "^ドキュメント:" |
            grep -v "^テスト:" |
            grep -v "^保守:" |
            grep -v "^CI:" |
            grep -v "^ビルド:" |
            grep -v "Co-Authored-By:" |
            sed 's/  */ /g' |
            sed 's/^ //g' |
            sed '/^$/d' |
            sed 's/^/- /')

          echo "messages<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MESSAGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "source=preprocessed" >> "$GITHUB_OUTPUT"

      - name: Tag current deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "deploy-$(date +%Y%m%d-%H%M%S)-$(echo ${{ github.sha }} | cut -c1-7)"
          git push origin --tags
        continue-on-error: true

      - name: Generate user-facing release notes (Gemini)
        id: release-notes
        if: env.GEMINI_API_KEY != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMIT_MESSAGES: ${{ steps.commits.outputs.messages }}
        run: |
          PROMPT="あなたは「がんばりクエスト」（子供の頑張りをゲーム感覚で見守る家族向けアプリ）のリリースノートライターです。
          以下の開発ログを、アプリを使う保護者・お子様向けのお知らせ文に書き換えてください。

          ルール:
          - ユーザーに見える変化（機能追加・UI改善・バグ修正）のみを記載する
          - インフラ・依存関係・テスト・リファクタリングのみの場合は「SKIP」とだけ返す
          - 「🆕 新機能・改善」「🐛 不具合修正」のカテゴリで分けて箇条書きにする
          - 各項目は「〜しました」「〜できるようになりました」で終わる文体にする
          - 技術用語（commit hash, CDK, Lambda, CloudFront, API等）は使わない
          - チケット番号（#0160 等）は削除する
          - 何が便利になったか、何が直ったかを具体的に書く
          - 子供にも分かる表現を心がける（例: 「演出」→「キラキラ効果」）
          - 英語の機能名は日本語に訳す（例: overlay → 画面表示）
          - 箇条書きは「• 」で始める（「- 」ではない）
          - 最大 8 項目まで

          コミット:
          ${COMMIT_MESSAGES}"

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":$(echo "$PROMPT" | jq -Rs .)}]}]}")

          NOTES=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "SKIP"')
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$NOTES" != "SKIP" ] && [ -n "$NOTES" ]; then
            echo "::notice::📝 Release notes generated by Gemini AI"
          fi

      - name: Build fallback release notes (Gemini unavailable)
        id: fallback-notes
        if: env.GEMINI_API_KEY == '' || steps.release-notes.outputs.notes == '' || steps.release-notes.outputs.notes == 'SKIP'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMIT_MESSAGES: ${{ steps.commits.outputs.messages }}
        run: |
          if [ -z "$COMMIT_MESSAGES" ]; then
            echo "notes=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # カテゴリ分け: 機能・改善を抽出
          FEATURES=$(echo "$COMMIT_MESSAGES" | grep -E "^- (機能|改善):" |
            sed 's/^- [^:]*: /• /' | head -4)

          # 修正を抽出
          FIXES=$(echo "$COMMIT_MESSAGES" | grep "^- 修正:" |
            sed 's/^- 修正: /• /' | head -4)

          NOTES=""
          if [ -n "$FEATURES" ]; then
            NOTES="🆕 **主な改善**\n${FEATURES}"
          fi
          if [ -n "$FIXES" ]; then
            [ -n "$NOTES" ] && NOTES="${NOTES}\n\n"
            NOTES="${NOTES}🐛 **修正**\n${FIXES}"
          fi

          if [ -z "$NOTES" ]; then
            echo "notes=SKIP" >> "$GITHUB_OUTPUT"
          else
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
          echo "::notice::📝 Release notes generated by fallback (no AI)"

      - name: Resolve final notes
        id: final-notes
        env:
          AI_NOTES: ${{ steps.release-notes.outputs.notes }}
          FB_NOTES: ${{ steps.fallback-notes.outputs.notes }}
        run: |
          if [ -n "$AI_NOTES" ] && [ "$AI_NOTES" != "SKIP" ]; then
            FINAL="$AI_NOTES"
          elif [ -n "$FB_NOTES" ] && [ "$FB_NOTES" != "SKIP" ]; then
            FINAL="$FB_NOTES"
          else
            FINAL="SKIP"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FINAL" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post release notes to Discord
        if: steps.final-notes.outputs.notes != '' && steps.final-notes.outputs.notes != 'SKIP'
        env:
          WEBHOOK_URL: ${{ vars.DISCORD_RELEASE_NOTES_WEBHOOK_URL }}
          NOTES: ${{ steps.final-notes.outputs.notes }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_RELEASE_NOTES_WEBHOOK_URL is not set. Skipping Discord notification."
            exit 0
          fi
          DATE_JP=$(date -u +"%Y年%-m月%-d日")
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🎉 アップデートのお知らせ\",
                \"description\": $(echo -e "$NOTES\n\nご意見・ご要望は **設定 > フィードバック** からどうぞ！" | jq -Rs .),
                \"color\": 5763719,
                \"footer\": {\"text\": \"がんばりクエスト • ${DATE_JP}\"}
              }]
            }"

  notify:
    needs: [deploy, e2e-production]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify deployment result (Discord)
        if: vars.DISCORD_WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ needs.deploy.result }}
          E2E_STATUS: ${{ needs.e2e-production.result }}
          VERSION: ${{ needs.deploy.outputs.version }}
        run: |
          if [ "$STATUS" = "success" ] && [ "$E2E_STATUS" != "failure" ]; then
            COLOR=3066993
            TITLE="Deploy Success"
            DESC="Version \`$VERSION\` deployed to production"
          else
            COLOR=15158332
            TITLE="Deploy Failed"
            DESC="Version \`$VERSION\` deployment failed (deploy: $STATUS, e2e: $E2E_STATUS)"
          fi
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"$DESC\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"\`$(echo ${{ github.sha }} | cut -c1-7)\`\", \"inline\": true},
                  {\"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Branch/Tag\", \"value\": \"${{ github.ref_name }}\", \"inline\": true}
                ]
              }]
            }"

name: Deploy to AWS (Production)

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ganbari-quest
  LAMBDA_FUNCTION: ganbari-quest-app
  DOMAIN_NAME: ganbari-quest.com
  CERTIFICATE_ARN: arn:aws:acm:us-east-1:443370718249:certificate/a278b058-8798-4793-ba1f-3f3de2a0b837
  APP_MAJOR_VERSION: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - name: Generate version
        run: npm run version:generate
      - run: npx biome check .
      - run: npx svelte-check
      - name: Security audit (high/critical vulnerabilities)
        run: npm audit --audit-level=high || true
      - run: npx vitest run --coverage
        name: Unit tests with coverage enforcement

      # Build before E2E (preview mode eliminates Vite JIT compilation overhead)
      - run: npm run build

      # E2E tests (local mode)
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: npx playwright test

      # E2E tests (cognito-dev mode)
      - run: npx playwright test --config playwright.cognito-dev.config.ts

  deploy:
    needs: test
    runs-on: ubuntu-24.04-arm
    environment: production
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.version.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "image-tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is-release=true" >> "$GITHUB_OUTPUT"
          else
            VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "image-tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "is-release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Deploying version: $VERSION"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_IAMROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra/
        run: npm ci

      # Phase 1: Deploy Storage stack (ECR repo, DynamoDB, S3)
      - name: CDK Deploy Storage
        working-directory: infra/
        run: >-
          npx cdk deploy GanbariQuestStorage --require-approval never
          -c domainName=${{ env.DOMAIN_NAME }}
          -c certificateArn=${{ env.CERTIFICATE_ARN }}

      # Phase 2: Build and push Docker image to ECR (ARM64 native on Graviton runner)
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install app dependencies
        run: npm ci

      - name: Generate version
        run: npm run version:generate
        env:
          APP_MAJOR_VERSION: ${{ env.APP_MAJOR_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.lambda
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.version.outputs.image-tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Phase 2.5: Clean up failed stacks and orphaned resources
      - name: Cleanup failed stacks
        continue-on-error: true
        run: |
          for stack in GanbariQuestOps GanbariQuestNetwork GanbariQuestCompute GanbariQuestAuth GanbariQuestSes; do
            status=$(aws cloudformation describe-stacks --stack-name "$stack" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "$status" = "ROLLBACK_COMPLETE" ] || [ "$status" = "DELETE_FAILED" ]; then
              echo "Deleting $stack (status: $status)"
              aws cloudformation delete-stack --stack-name "$stack"
              aws cloudformation wait stack-delete-complete --stack-name "$stack" || true
            fi
          done
          # Delete orphaned S3 bucket left by failed SES stack deploys (RETAIN policy)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SES_BUCKET="ganbari-quest-support-mail-${ACCOUNT_ID}"
          SES_STATUS=$(aws cloudformation describe-stacks --stack-name GanbariQuestSes --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          echo "SES stack status: $SES_STATUS"
          echo "Checking bucket: $SES_BUCKET"
          # If the SES stack doesn't exist (or is failed), remove the orphaned bucket
          if [ "$SES_STATUS" = "NOT_FOUND" ] || [ "$SES_STATUS" = "ROLLBACK_COMPLETE" ] || [ "$SES_STATUS" = "CREATE_FAILED" ]; then
            echo "SES stack not active. Cleaning up orphaned bucket..."
            aws s3 rb "s3://${SES_BUCKET}" --force 2>&1 || echo "Bucket cleanup skipped (may not exist)"
          fi
          # Note: Cost Anomaly Monitoring はデフォルトモニターを使用（CDK管理外）

      # Phase 3: Deploy Compute + Network stacks (Lambda, CloudFront)
      - name: CDK Deploy all stacks
        working-directory: infra/
        run: >-
          npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
          -c domainName=${{ env.DOMAIN_NAME }}
          -c certificateArn=${{ env.CERTIFICATE_ARN }}
          -c feedbackDiscordWebhookUrl=${{ secrets.FEEDBACK_DISCORD_WEBHOOK_URL }}
          -c geminiApiKey=${{ secrets.GEMINI_API_KEY }}
          -c adminAllowedIps=${{ secrets.ADMIN_ALLOWED_IPS }}
          -c stripeSecretKey=${{ secrets.STRIPE_SECRET_KEY }}
          -c stripeWebhookSecret=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          -c stripePriceMonthly=${{ vars.STRIPE_PRICE_MONTHLY }}
          -c stripePriceYearly=${{ vars.STRIPE_PRICE_YEARLY }}
          -c discordWebhookSupport=${{ secrets.DISCORD_WEBHOOK_SUPPORT }}
          -c opsSecretKey=${{ secrets.OPS_SECRET_KEY }}
          ${{ secrets.GOOGLE_OAUTH_CLIENT_ID && format('-c googleClientId={0}', secrets.GOOGLE_OAUTH_CLIENT_ID) || '' }}
          ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET && format('-c googleClientSecret={0}', secrets.GOOGLE_OAUTH_CLIENT_SECRET) || '' }}

      # Phase 4: Update Lambda to use the new image
      - name: Update Lambda function image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --region $AWS_REGION

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION \
            --region $AWS_REGION

      # Phase 5: Post-deployment health check (with retry)
      # Lambda Function URL 直接で確認（DNS 障害時もデプロイ判定可能）
      - name: Health check
        id: healthcheck
        run: |
          FUNCTION_URL=$(aws lambda get-function-url-config \
            --function-name $LAMBDA_FUNCTION \
            --region $AWS_REGION \
            --query 'FunctionUrl' --output text)
          echo "Health check target: ${FUNCTION_URL}api/health"
          echo "Waiting 10s for Lambda cold start..."
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${FUNCTION_URL}api/health")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts (last status: $STATUS)"
          exit 1

      # Phase 5b: Rollback on health check failure
      - name: Rollback on failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          echo "Deployment failed, rolling back to previous image..."
          PREVIOUS_DIGEST=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --query 'sort_by(imageDetails,&imagePushedAt)[-2].imageDigest' \
            --output text \
            --region $AWS_REGION)
          if [ "$PREVIOUS_DIGEST" = "None" ] || [ -z "$PREVIOUS_DIGEST" ]; then
            echo "No previous image found, cannot rollback"
            exit 1
          fi
          echo "Rolling back to image digest: $PREVIOUS_DIGEST"
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY@$PREVIOUS_DIGEST \
            --region $AWS_REGION
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION \
            --region $AWS_REGION
          echo "Rollback complete"

      # Phase 5c: Post-deploy resource & cost audit
      - name: Post-deploy resource audit
        continue-on-error: true
        run: |
          echo "=== CloudFormation Stack Resource Count ==="
          for stack in GanbariQuestStorage GanbariQuestAuth GanbariQuestCompute GanbariQuestNetwork GanbariQuestSes GanbariQuestOps; do
            count=$(aws cloudformation list-stack-resources --stack-name "$stack" --query 'length(StackResourceSummaries)' --output text 2>/dev/null || echo "N/A")
            echo "$stack: $count resources"
          done

          echo ""
          echo "=== Lambda Functions (expected: 2) ==="
          aws lambda list-functions --query 'Functions[?starts_with(FunctionName,`ganbari`)].{Name:FunctionName,Memory:MemorySize,Timeout:Timeout}' --output table

          echo ""
          echo "=== DynamoDB Tables (expected: 1) ==="
          aws dynamodb list-tables --query 'TableNames[?contains(@,`ganbari`)]' --output text

          echo ""
          echo "=== S3 Buckets (expected: 2) ==="
          aws s3api list-buckets --query 'Buckets[?contains(Name,`ganbari`)].Name' --output text

          echo ""
          echo "=== ECR Repositories (expected: 1) ==="
          aws ecr describe-repositories --query 'repositories[?contains(repositoryName,`ganbari`)].{Name:repositoryName}' --output table 2>/dev/null || true

          echo ""
          echo "=== CloudWatch Log Groups ==="
          aws logs describe-log-groups --log-group-name-prefix "/aws/lambda/ganbari" --query 'logGroups[].{Name:logGroupName,RetentionDays:retentionInDays,StoredBytes:storedBytes}' --output table

          echo ""
          echo "=== Current month cost estimate ==="
          aws ce get-cost-and-usage \
            --time-period Start=$(date -u +%Y-%m-01),End=$(date -u +%Y-%m-%d) \
            --granularity MONTHLY \
            --metrics "UnblendedCost" \
            --query 'ResultsByTime[0].Total.UnblendedCost.{Amount:Amount,Unit:Unit}' \
            --output table 2>/dev/null || echo "Cost Explorer not available"

      - name: Detect orphaned resources
        continue-on-error: true
        run: |
          echo "=== Orphaned Lambda Functions (not in any stack) ==="
          all_lambdas=$(aws lambda list-functions --query 'Functions[?starts_with(FunctionName,`ganbari`)].FunctionName' --output text)
          managed_lambdas=""
          for stack in GanbariQuestStorage GanbariQuestAuth GanbariQuestCompute GanbariQuestNetwork GanbariQuestSes GanbariQuestOps; do
            managed=$(aws cloudformation list-stack-resources --stack-name "$stack" --query 'StackResourceSummaries[?ResourceType==`AWS::Lambda::Function`].PhysicalResourceId' --output text 2>/dev/null)
            managed_lambdas="$managed_lambdas $managed"
          done
          orphaned=0
          for fn in $all_lambdas; do
            if ! echo "$managed_lambdas" | grep -q "$fn"; then
              echo "ORPHANED: $fn"
              orphaned=$((orphaned + 1))
            fi
          done
          [ $orphaned -eq 0 ] && echo "None found"

          echo ""
          echo "=== Orphaned CloudWatch Log Groups ==="
          orphaned_logs=0
          for lg in $(aws logs describe-log-groups --log-group-name-prefix "/aws/lambda/ganbari" --query 'logGroups[].logGroupName' --output text); do
            fn_name=$(echo "$lg" | sed 's|/aws/lambda/||')
            if ! aws lambda get-function --function-name "$fn_name" > /dev/null 2>&1; then
              echo "ORPHANED LOG GROUP: $lg"
              orphaned_logs=$((orphaned_logs + 1))
            fi
          done
          [ $orphaned_logs -eq 0 ] && echo "None found"

          echo ""
          echo "=== Orphaned Cost Anomaly Monitors ==="
          aws ce get-anomaly-monitors --query 'AnomalyMonitors[?contains(MonitorName,`ganbari`) || contains(MonitorName,`gq-cost`)].{Name:MonitorName,Arn:MonitorArn}' --output table 2>/dev/null || echo "None found"

      - name: Show deployment outputs
        working-directory: infra/
        if: always()
        run: cat cdk-outputs.json 2>/dev/null || echo "No outputs file"

  e2e-production:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # CloudFront Geo Restriction (JP only) のため、Lambda Function URL 直接でテスト
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_IAMROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Lambda Function URL
        id: function-url
        run: |
          FUNCTION_URL=$(aws lambda get-function-url-config \
            --function-name $LAMBDA_FUNCTION \
            --region $AWS_REGION \
            --query 'FunctionUrl' --output text)
          # Remove trailing slash for consistency
          FUNCTION_URL="${FUNCTION_URL%/}"
          echo "url=$FUNCTION_URL" >> "$GITHUB_OUTPUT"
          echo "E2E target: $FUNCTION_URL"

      - name: Wait for deployment propagation
        run: sleep 15

      - name: Run Production Smoke Test
        run: npx playwright test --config playwright.production.config.ts
        env:
          E2E_BASE_URL: ${{ steps.function-url.outputs.url }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Production E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-production-results
          path: test-results/
          retention-days: 14

  release:
    needs: [deploy, e2e-production]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Deploy Info
            - **Version**: ${{ github.ref_name }}
            - **Commit**: ${{ github.sha }}
            - **Docker Image**: `${{ needs.deploy.outputs.image-tag }}`
            - **Deploy Date**: ${{ github.event.head_commit.timestamp }}

  release-notes:
    needs: [deploy, e2e-production]
    runs-on: ubuntu-latest
    if: needs.deploy.result == 'success' && needs.e2e-production.result != 'failure'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Get commit messages since last deploy
        id: commits
        run: |
          PREV=$(git tag --sort=-creatordate | grep '^deploy-' | head -1 || echo "")
          if [ -z "$PREV" ]; then
            RAW=$(git log --format="%s" --no-merges -10)
          else
            RAW=$(git log ${PREV}..HEAD --format="%s" --no-merges | head -30)
          fi

          # 前処理: チケット番号除去、プレフィックス日本語化、技術系除外
          MESSAGES=$(echo "$RAW" |
            sed 's/#[0-9]\+//g' |
            sed 's/^feat: /機能: /g' |
            sed 's/^fix: /修正: /g' |
            sed 's/^docs: /ドキュメント: /g' |
            sed 's/^refactor: /改善: /g' |
            sed 's/^perf: /改善: /g' |
            sed 's/^chore: /保守: /g' |
            sed 's/^test: /テスト: /g' |
            sed 's/^ci: /CI: /g' |
            sed 's/^build: /ビルド: /g' |
            grep -v "^ドキュメント:" |
            grep -v "^テスト:" |
            grep -v "^保守:" |
            grep -v "^CI:" |
            grep -v "^ビルド:" |
            grep -v "Co-Authored-By:" |
            sed 's/  */ /g' |
            sed 's/^ //g' |
            sed '/^$/d' |
            sed 's/^/- /')

          echo "messages<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MESSAGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "source=preprocessed" >> "$GITHUB_OUTPUT"

      - name: Tag current deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "deploy-$(date +%Y%m%d-%H%M%S)-$(echo ${{ github.sha }} | cut -c1-7)"
          git push origin --tags
        continue-on-error: true

      - name: Generate user-facing release notes (Gemini)
        id: release-notes
        if: env.GEMINI_API_KEY != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMIT_MESSAGES: ${{ steps.commits.outputs.messages }}
        run: |
          PROMPT="あなたは「がんばりクエスト」（子供の頑張りをゲーム感覚で見守る家族向けアプリ）のリリースノートライターです。
          以下の開発ログを、アプリを使う保護者・お子様向けのお知らせ文に書き換えてください。

          ルール:
          - ユーザーに見える変化（機能追加・UI改善・バグ修正）のみを記載する
          - インフラ・依存関係・テスト・リファクタリングのみの場合は「SKIP」とだけ返す
          - 「🆕 新機能・改善」「🐛 不具合修正」のカテゴリで分けて箇条書きにする
          - 各項目は「〜しました」「〜できるようになりました」で終わる文体にする
          - 技術用語（commit hash, CDK, Lambda, CloudFront, API等）は使わない
          - チケット番号（#0160 等）は削除する
          - 何が便利になったか、何が直ったかを具体的に書く
          - 子供にも分かる表現を心がける（例: 「演出」→「キラキラ効果」）
          - 英語の機能名は日本語に訳す（例: overlay → 画面表示）
          - 箇条書きは「• 」で始める（「- 」ではない）
          - 最大 8 項目まで

          コミット:
          ${COMMIT_MESSAGES}"

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":$(echo "$PROMPT" | jq -Rs .)}]}]}")

          NOTES=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "SKIP"')
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$NOTES" != "SKIP" ] && [ -n "$NOTES" ]; then
            echo "::notice::📝 Release notes generated by Gemini AI"
          fi

      - name: Build fallback release notes (Gemini unavailable)
        id: fallback-notes
        if: env.GEMINI_API_KEY == '' || steps.release-notes.outputs.notes == '' || steps.release-notes.outputs.notes == 'SKIP'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMIT_MESSAGES: ${{ steps.commits.outputs.messages }}
        run: |
          if [ -z "$COMMIT_MESSAGES" ]; then
            echo "notes=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # カテゴリ分け: 機能・改善を抽出
          FEATURES=$(echo "$COMMIT_MESSAGES" | grep -E "^- (機能|改善):" |
            sed 's/^- [^:]*: /• /' | head -4)

          # 修正を抽出
          FIXES=$(echo "$COMMIT_MESSAGES" | grep "^- 修正:" |
            sed 's/^- 修正: /• /' | head -4)

          NOTES=""
          if [ -n "$FEATURES" ]; then
            NOTES="🆕 **主な改善**\n${FEATURES}"
          fi
          if [ -n "$FIXES" ]; then
            [ -n "$NOTES" ] && NOTES="${NOTES}\n\n"
            NOTES="${NOTES}🐛 **修正**\n${FIXES}"
          fi

          if [ -z "$NOTES" ]; then
            echo "notes=SKIP" >> "$GITHUB_OUTPUT"
          else
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
          echo "::notice::📝 Release notes generated by fallback (no AI)"

      - name: Resolve final notes
        id: final-notes
        env:
          AI_NOTES: ${{ steps.release-notes.outputs.notes }}
          FB_NOTES: ${{ steps.fallback-notes.outputs.notes }}
        run: |
          if [ -n "$AI_NOTES" ] && [ "$AI_NOTES" != "SKIP" ]; then
            FINAL="$AI_NOTES"
          elif [ -n "$FB_NOTES" ] && [ "$FB_NOTES" != "SKIP" ]; then
            FINAL="$FB_NOTES"
          else
            FINAL="SKIP"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FINAL" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post release notes to Discord
        if: steps.final-notes.outputs.notes != '' && steps.final-notes.outputs.notes != 'SKIP'
        env:
          WEBHOOK_URL: ${{ vars.DISCORD_RELEASE_NOTES_WEBHOOK_URL }}
          NOTES: ${{ steps.final-notes.outputs.notes }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_RELEASE_NOTES_WEBHOOK_URL is not set. Skipping Discord notification."
            exit 0
          fi
          DATE_JP=$(date -u +"%Y年%-m月%-d日")
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🎉 アップデートのお知らせ\",
                \"description\": $(echo -e "$NOTES\n\nご意見・ご要望は **設定 > フィードバック** からどうぞ！" | jq -Rs .),
                \"color\": 5763719,
                \"footer\": {\"text\": \"がんばりクエスト • ${DATE_JP}\"}
              }]
            }"

  notify:
    needs: [deploy, e2e-production]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify deployment result (Discord)
        if: vars.DISCORD_WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ needs.deploy.result }}
          E2E_STATUS: ${{ needs.e2e-production.result }}
          VERSION: ${{ needs.deploy.outputs.version }}
        run: |
          if [ "$STATUS" = "success" ] && [ "$E2E_STATUS" != "failure" ]; then
            COLOR=3066993
            TITLE="Deploy Success"
            DESC="Version \`$VERSION\` deployed to production"
          else
            COLOR=15158332
            TITLE="Deploy Failed"
            DESC="Version \`$VERSION\` deployment failed (deploy: $STATUS, e2e: $E2E_STATUS)"
          fi
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"$DESC\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"\`$(echo ${{ github.sha }} | cut -c1-7)\`\", \"inline\": true},
                  {\"name\": \"Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Branch/Tag\", \"value\": \"${{ github.ref_name }}\", \"inline\": true}
                ]
              }]
            }"

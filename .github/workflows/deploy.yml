name: Deploy to AWS (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ganbari-quest
  LAMBDA_FUNCTION: ganbari-quest-app
  DOMAIN_NAME: ganbari-quest.com
  CERTIFICATE_ARN: arn:aws:acm:us-east-1:443370718249:certificate/a278b058-8798-4793-ba1f-3f3de2a0b837

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npx biome check .
      - run: npx svelte-check
      - run: npx vitest run

      # E2E tests (local mode)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npx playwright test

      # E2E tests (cognito-dev mode)
      - run: npx playwright test --config playwright.cognito-dev.config.ts

      - run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-24.04-arm
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_IAMROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra/
        run: npm ci

      # Phase 1: Deploy Storage stack (ECR repo, DynamoDB, S3)
      - name: CDK Deploy Storage
        working-directory: infra/
        run: >-
          npx cdk deploy GanbariQuestStorage --require-approval never
          -c domainName=${{ env.DOMAIN_NAME }}
          -c certificateArn=${{ env.CERTIFICATE_ARN }}

      # Phase 2: Build and push Docker image to ECR (ARM64 native on Graviton runner)
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install app dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.lambda
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Phase 3: Deploy Compute + Network stacks (Lambda, CloudFront)
      - name: CDK Deploy all stacks
        working-directory: infra/
        run: >-
          npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
          -c domainName=${{ env.DOMAIN_NAME }}
          -c certificateArn=${{ env.CERTIFICATE_ARN }}

      # Phase 4: Update Lambda to use the new image
      - name: Update Lambda function image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --region $AWS_REGION

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION \
            --region $AWS_REGION

      - name: Show deployment outputs
        working-directory: infra/
        if: always()
        run: cat cdk-outputs.json 2>/dev/null || echo "No outputs file"

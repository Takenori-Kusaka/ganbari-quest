name: "Labeler"

on:
  pull_request_target:
    # #1218: ready_for_review は除外（Draft でも走るため再実行は無駄）。
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

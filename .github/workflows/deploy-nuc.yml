name: Deploy to NUC (Local)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'static/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'drizzle/**'
      - 'scripts/**'
  workflow_dispatch:

concurrency:
  group: deploy-nuc
  cancel-in-progress: true

jobs:
  deploy-nuc:
    # NUC 専用 runner (local_nuc) に pin する。`nuc` ラベルなしの汎用 self-hosted runner
    # (ci-runner-win 等、docker 不在 / 実行ポリシー Restricted) への誤割り当てを排除し、
    # 本番 deploy を必ず実 NUC で走らせる (#3063 runner 誤割り当て根治)。
    runs-on: [self-hosted, Windows, X64, nuc]
    # Self-hosted runner actor guard: restrict self-hosted NUC runner execution to
    # trusted actors performing main push / workflow_dispatch.
    #
    # 本 workflow の trigger は `push: branches=[main]` + `workflow_dispatch` のみで、
    # fork PR からの直接 push は GitHub の保護により発生しない (upstream main への push
    # 権限が fork 側にないため)。workflow_dispatch も upstream リポジトリの権限がある
    # actor からしか発火しない。したがって本 actor allowlist の目的は「fork PR 防御」
    # ではなく、**self-hosted NUC runner 上で実行できる actor を ADR-0022 体制で
    # 想定済みの 2 account に絞り込み、想定外の actor (誤って付与された collaborator /
    # 将来の admin bypass 等) による NUC 本番マシン上での任意コード実行を防ぐ**こと。
    #
    # 許可リスト (ADR-0022 QA merge 体制 + Issue #2356 / EPIC #2354):
    #   - Takenori-Kusaka       : PO (リポジトリ owner)。手動 dispatch / 自身 commit の main 経由 push
    #   - ganbariquestsupport-lab : QA セッション専用 account。ADR-0022 で確立した
    #                                "QA approve + squash merge" 体制での merge actor。
    #                                ここを許可しないと QA merge 後の main push で NUC deploy が
    #                                全件 skip され、本番 / NUC 環境が長期間古い build に固定される。
    #
    # 信頼 account 追加時は本リストに追記するだけで対応可。
    if: contains(fromJSON('["Takenori-Kusaka", "ganbariquestsupport-lab"]'), github.actor)
    defaults:
      run:
        shell: powershell
        working-directory: C:\Docker\ganbari-quest
    steps:
      # Step 1: Stop app container to flush SQLite WAL safely (#0099 incident prevention)
      - name: Stop app container (WAL flush)
        run: docker compose stop app

      # Step 2: Pull latest code from main
      # git pull は merge commit を作ろうとして git identity を要求するため
      # fetch + reset --hard で remote に強制同期する（デプロイ用途では常に remote が正）
      - name: Pull latest code
        run: |
          git fetch origin main
          git reset --hard origin/main

      # Step 2.5: Generate .env from GitHub Actions Secrets (#911)
      # docker-compose.yml は `.env` を `env_file` で読み込む仕組み。
      #
      # 設計方針 (PR #913 改訂):
      # NUC self-hosted runner は本番マシン上に常駐しているため、
      # 「secret を GHA に通さない」という分離は形式論。runner マシン自体が
      # 信頼境界であり、GHA Secrets → runner プロセス → ファイル の経路は
      # SSM / RDP 手動配置と同等のセキュリティを持つ。
      # GHA 経由配布に統一することで rotate / 復旧が無人化される（#911 で 25 連続失敗を経験）。
      #
      # Epic #2525 Phase 7 PR-L5 (#2860): AWS_LICENSE_SECRET 生成・検証・.env 注入を撤去
      # (license key 全廃、assertLicenseKeyConfigured() は PR-L0 で no-op 化済)。
      #
      # docker-compose.yml の hardcoded env (NODE_ENV / DATABASE_URL / PORT / TZ) は
      # ここで書き換えない。`.env` は **secret 専用** とし、構成値とは分離する。
      - name: Generate .env from GitHub Secrets
        env:
          # #2310 / #2337 / ADR-0050: parent-gate-session.ts は NODE_ENV=production で必須要求。
          # NUC も NODE_ENV=production で起動するため未注入だと /admin/* cold start で throw して 500。
          # NUC は LAN 内 + AUTH_MODE=local で PIN gate は実際には使われないが、module load 時の
          # getSecret() throw を避けるためダミー値ではなく実 secret を注入する (Lambda と同値必須ではない)。
          PARENT_GATE_COOKIE_SECRET: ${{ secrets.PARENT_GATE_COOKIE_SECRET }}
        run: |
          if (-not $env:PARENT_GATE_COOKIE_SECRET) {
            Write-Host "::error::PARENT_GATE_COOKIE_SECRET is not set in GitHub Actions Secrets."
            Write-Host "::error::Generate hex with: node -e ""console.log(require('crypto').randomBytes(32).toString('hex'))"""
            Write-Host "::error::Register with: gh secret set PARENT_GATE_COOKIE_SECRET --body <hex> --repo Takenori-Kusaka/ganbari-quest"
            Write-Host "::error::See docs/decisions/0050-parent-gate-session-cookie-signature.md and infra/CLAUDE.md."
            exit 1
          }
          # `.env` を毎回 GHA Secrets から再生成（rotate 対応・冪等）。
          # ASCII エンコーディング指定で BOM を避ける (docker compose env_file は BOM を弾く)。
          # ORIGIN: NUC LAN デプロイでは 0.0.0.0 を指定し同一ネットワーク内の全端末を許可。
          # CSRF origin check は Dockerfile build arg (DISABLE_CSRF_ORIGIN_CHECK) で無効化済み。
          $envLines = @(
            "# Auto-generated by .github/workflows/deploy-nuc.yml from GitHub Actions Secrets.",
            "# DO NOT EDIT MANUALLY. Rotate via: gh secret set <NAME> --body <value> --repo Takenori-Kusaka/ganbari-quest",
            "PARENT_GATE_COOKIE_SECRET=$env:PARENT_GATE_COOKIE_SECRET",
            "AI_PROVIDER=gemini",
            "ORIGIN=http://0.0.0.0:3000"
          )
          Set-Content -Path .env -Value $envLines -Encoding ASCII
          Write-Host "Wrote .env from GitHub Secrets ($($envLines.Count) lines, secret values masked)"

      # Step 3: Rebuild and start containers (stop -> build -> up order is critical for WAL safety)
      # Dockerfile regenerates APP_VERSION at build time (#711), so no host-side tsx required.
      # BUILD_TIMESTAMP busts the build-stage cache (#711 / PR #826 review) — without this,
      # a workflow_dispatch redeploy of the same commit would reuse the cached layer and
      # keep the stale date. Passing a fresh timestamp every run guarantees regeneration.
      # --profile backup を付与しないと profile ゲートの backup service が
      # build / up の対象外になり、compose を更新しても旧コンテナ (古い crontab)
      # が凍結されたまま残り config drift する (#2985 / #2779 再発の根因)。
      - name: Build and start
        run: |
          $env:BUILD_TIMESTAMP = (Get-Date -Format "yyyyMMddHHmmss")
          docker compose --profile backup build
          docker compose --profile backup up -d

      # Step 4: Verify the service is healthy after deployment
      # Uses curl.exe instead of Invoke-WebRequest to avoid NETWORK SERVICE proxy/timeout issues
      - name: Health check
        run: |
          Start-Sleep -Seconds 10
          $maxRetries = 5
          $retryInterval = 5
          for ($i = 1; $i -le $maxRetries; $i++) {
            $code = & curl.exe -s -o NUL -w "%{http_code}" --connect-timeout 10 http://localhost:3000/api/health 2>$null
            if ($code -eq "200") {
              Write-Host "Health check passed on attempt $i (status: $code)"
              exit 0
            }
            Write-Host "Attempt $i failed (status: $code)"
            if ($i -lt $maxRetries) {
              Write-Host "Retrying in ${retryInterval}s..."
              Start-Sleep -Seconds $retryInterval
            }
          }
          throw "Health check failed after $maxRetries attempts"

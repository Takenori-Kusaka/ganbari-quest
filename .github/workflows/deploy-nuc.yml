name: Deploy to NUC (Local)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'static/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'drizzle/**'
      - 'scripts/**'
  workflow_dispatch:

concurrency:
  group: deploy-nuc
  cancel-in-progress: true

jobs:
  deploy-nuc:
    runs-on: [self-hosted, Windows, X64]
    # Public repository guard: only the repo owner can trigger this workflow.
    # Prevents unauthorized fork PRs from executing commands on the self-hosted runner.
    if: github.actor == 'Takenori-Kusaka'
    defaults:
      run:
        shell: powershell
        working-directory: C:\Docker\ganbari-quest
    steps:
      # Step 1: Stop app container to flush SQLite WAL safely (#0099 incident prevention)
      - name: Stop app container (WAL flush)
        run: docker compose stop app

      # Step 2: Pull latest code from main
      - name: Pull latest code
        run: git pull origin main

      # Step 2.5: Ensure production secrets are present in .env (#911, #806)
      # docker-compose.yml は `.env` を `env_file` で読み込む仕組み。
      # NODE_ENV=production で起動する以上、hooks.server.ts の
      # assertLicenseKeyConfigured() が AWS_LICENSE_SECRET を要求する。
      # 未設定だとコンテナ起動時に throw → /api/health が ECONNREFUSED ループ。
      #
      # 運用方針: secret は NUC マシンの
      # `C:\Docker\ganbari-quest\.env.production` に手動で配置済み
      # （ADR-0026 / infra/CLAUDE.md 参照）。このステップは存在確認と
      # `.env.production` → `.env` のマージのみを行う。`.env.production` は
      # git 管理外・runner マシン常駐で、AWS / GitHub Actions には露出しない。
      - name: Verify production secrets are present
        run: |
          if (-not (Test-Path .env.production)) {
            Write-Host "::error::.env.production not found at C:\Docker\ganbari-quest\.env.production"
            Write-Host "::error::Place the production secret file manually on the NUC machine."
            Write-Host "::error::See docs/decisions/0026-license-key-architecture.md and infra/CLAUDE.md."
            exit 1
          }
          $envContent = Get-Content .env.production -Raw
          if (-not ($envContent -match 'AWS_LICENSE_SECRET=')) {
            Write-Host "::error::AWS_LICENSE_SECRET is missing from .env.production"
            Write-Host "::error::Generate with: node -e ""console.log(require('crypto').randomBytes(32).toString('hex'))"""
            Write-Host "::error::Then add AWS_LICENSE_SECRET=<hex> to C:\Docker\ganbari-quest\.env.production"
            exit 1
          }
          # docker compose が読む .env を .env.production からコピー
          Copy-Item .env.production .env -Force
          Write-Host "Merged .env.production into .env (secrets will be loaded by docker compose)"

      # Step 3: Rebuild and start containers (stop -> build -> up order is critical for WAL safety)
      # Dockerfile regenerates APP_VERSION at build time (#711), so no host-side tsx required.
      # BUILD_TIMESTAMP busts the build-stage cache (#711 / PR #826 review) — without this,
      # a workflow_dispatch redeploy of the same commit would reuse the cached layer and
      # keep the stale date. Passing a fresh timestamp every run guarantees regeneration.
      - name: Build and start
        run: |
          $env:BUILD_TIMESTAMP = (Get-Date -Format "yyyyMMddHHmmss")
          docker compose build
          docker compose up -d

      # Step 4: Verify the service is healthy after deployment
      # Uses curl.exe instead of Invoke-WebRequest to avoid NETWORK SERVICE proxy/timeout issues
      - name: Health check
        run: |
          Start-Sleep -Seconds 10
          $maxRetries = 5
          $retryInterval = 5
          for ($i = 1; $i -le $maxRetries; $i++) {
            $code = & curl.exe -s -o NUL -w "%{http_code}" --connect-timeout 10 http://localhost:3000/api/health 2>$null
            if ($code -eq "200") {
              Write-Host "Health check passed on attempt $i (status: $code)"
              exit 0
            }
            Write-Host "Attempt $i failed (status: $code)"
            if ($i -lt $maxRetries) {
              Write-Host "Retrying in ${retryInterval}s..."
              Start-Sleep -Seconds $retryInterval
            }
          }
          throw "Health check failed after $maxRetries attempts"

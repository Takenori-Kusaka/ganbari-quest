name: Deploy to NUC (Staging)

# NOTE (#3014): Windows PowerShell 5.1 は UTF-8 (BOM 無し) script を CP932 誤読するため、
# run block 内の**文字列リテラルは ASCII のみ**とする (多バイト文字が `"` 直前にあると
# 0x82 等の先行 byte が閉じ引用符を食い ParseException)。YAML コメントの日本語は可。

# NUC staging 環境 (#2872 / EPIC #2861 D 系) — 統合 PR (develop→main) の本番近似検証レーン。
#
# 設計の核 (本番不変条件 #2872 AC4 厳守):
#   - 本番 NUC (deploy-nuc.yml / working-dir C:\Docker\ganbari-quest / port 3000) とは**完全独立**。
#   - 別 working-dir (C:\Docker\ganbari-quest-staging) / 別 port (3100) / 別 compose project
#     (`-p ganbari-quest-staging`) / 別 DB path で隔離する。docker-compose.yml は無改変で、
#     compose の `name:` も追加せず CLI の `-p` flag のみで project を分離する。
#   - 本番 DB は **read のみ** (snapshot は online backup、本番 container 停止なし)。
#
# トリガ:
#   - pull_request (base=main) = 統合 PR (develop→main) の検証で発火。
#   - workflow_dispatch = develop HEAD を手動 deploy (AC1)。
#
# 位置付け (当面 advisory):
#   本 workflow は当面 required check に登録しない。staging 初回緑を確認するまで develop→main
#   取込をブロックしないため。merge blocker 化 (AC3) は初回緑確認後に audit-manager が
#   main ruleset の required_status_checks へ `deploy-nuc-staging` を追加して行う。
#
# self-provisioning (Step 0) + host 依存最小原則 (#3024):
#   staging working-dir (C:\Docker\ganbari-quest-staging) が NUC 上に未 provision でも、
#   Step 0 が自動 clone して bootstrap する。NUC runner は本番 working-dir
#   (C:\Docker\ganbari-quest) で credential 済み git fetch の稼働実績があるため、
#   同一 credential で plain https clone が成立する。物理 NUC 上の手作業は不要。
#   host に要求するのは git / docker のみで、node_modules (npm install) は要求しない —
#   依存 install は docker build 内で完結し、better-sqlite3 等の node 依存処理 (snapshot) は
#   本番 app container 内で実行する (Step 4)。本番 host も node_modules を持たない
#   (deploy-nuc.yml は docker build のみで host npm を使わない) ため、self-hosted NUC runner の
#   workflow step に host `node scripts/*` 実行を新規追加しないこと (#3024 横展開原則)。

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-nuc-staging
  cancel-in-progress: true

jobs:
  deploy-nuc-staging:
    runs-on: [self-hosted, Windows, X64]
    # Self-hosted runner actor guard: 本番 deploy-nuc.yml と同じ ADR-0022 体制の 2 account に限定。
    # NUC 本番マシン上 (staging container も同マシンに同居) での想定外 actor による任意コード実行を防ぐ。
    if: contains(fromJSON('["Takenori-Kusaka", "ganbariquestsupport-lab"]'), github.actor)
    defaults:
      run:
        shell: powershell
        working-directory: C:\Docker\ganbari-quest-staging
    steps:
      # Step 0: Bootstrap — staging working-dir が未 provision なら自動 clone (self-provisioning)。
      # defaults.working-directory は dir 不在だと step 起動自体が fail するため、本 step のみ
      # working-directory を C:\ に上書きして provision する。clone 済みなら no-op (冪等)。
      # NUC runner の global git credential (本番 dir の fetch 実績) を流用するため token 埋め込み不要。
      - name: Bootstrap staging working-dir (self-provisioning)
        working-directory: C:\
        run: |
          if (-not (Test-Path "C:\Docker\ganbari-quest-staging\.git")) {
            Write-Host "Staging working-dir not provisioned. Cloning into C:\Docker\ganbari-quest-staging ..."
            New-Item -ItemType Directory -Force -Path "C:\Docker" | Out-Null
            git clone "https://github.com/${{ github.repository }}.git" "C:\Docker\ganbari-quest-staging"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::git clone failed. Check the NUC runner git credential (same credential that fetches the prod dir C:\Docker\ganbari-quest)."
              exit 1
            }
            Write-Host "::notice::staging working-dir provisioned (initial clone)."
          } else {
            Write-Host "Staging working-dir already provisioned (skip)."
          }

      # Step 1: Checkout 対象 ref を staging working-dir に強制同期。
      # - pull_request: 統合 PR の HEAD (develop→main の develop 側)。
      # - workflow_dispatch: develop HEAD (AC1 = develop HEAD を deploy)。
      # git pull は merge commit で identity を要求するため fetch + reset --hard で remote に強制同期する
      # (deploy-nuc.yml と同パターン、デプロイ用途では常に remote が正)。
      - name: Checkout target ref (staging)
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin
          if ($env:PR_HEAD_SHA) {
            Write-Host "Resetting staging to PR head: $env:PR_HEAD_SHA"
            git reset --hard $env:PR_HEAD_SHA
          } else {
            Write-Host "workflow_dispatch: resetting staging to origin/develop HEAD"
            git reset --hard origin/develop
          }

      # Step 2: 既存 staging app container を停止 (WAL flush / 冪等)。
      # 初回 run では container が存在しないため continue-on-error で握り潰す。
      - name: Stop staging app container (WAL flush)
        continue-on-error: true
        run: docker compose -p ganbari-quest-staging stop app

      # Step 3: Generate staging .env from GitHub Secrets (deploy-nuc.yml の生成 step を踏襲)。
      # 本番 deploy-nuc.yml と同一 GitHub Secrets を再利用。port のみ PORT=3100 で隔離する。
      # ORIGIN も staging port に合わせる (CSRF origin check は build arg で無効化済 / NUC LAN)。
      - name: Generate staging .env from GitHub Secrets
        env:
          PARENT_GATE_COOKIE_SECRET: ${{ secrets.PARENT_GATE_COOKIE_SECRET }}
        run: |
          if (-not $env:PARENT_GATE_COOKIE_SECRET) {
            Write-Host "::error::PARENT_GATE_COOKIE_SECRET is not set in GitHub Actions Secrets."
            Write-Host "::error::See docs/decisions/0050-parent-gate-session-cookie-signature.md and infra/CLAUDE.md."
            exit 1
          }
          # `.env` を毎回 GHA Secrets から再生成 (rotate 対応・冪等)。ASCII で BOM 回避。
          $envLines = @(
            "# Auto-generated by .github/workflows/deploy-nuc-staging.yml from GitHub Actions Secrets.",
            "# DO NOT EDIT MANUALLY. Staging-only .env (port 3100, isolated from prod).",
            "PARENT_GATE_COOKIE_SECRET=$env:PARENT_GATE_COOKIE_SECRET",
            "AI_PROVIDER=gemini",
            "PORT=3100",
            "ORIGIN=http://0.0.0.0:3100"
          )
          Set-Content -Path .env -Value $envLines -Encoding ASCII
          Write-Host "Wrote staging .env from GitHub Secrets ($($envLines.Count) lines, secret values masked)"

      # Step 4: 直近本番 DB snapshot を staging DB path にコピー (#2872 AC6 / G-MIG / #3024 案 A)。
      # snapshot-prod-db.cjs は better-sqlite3 を require するが、host (staging / 本番 working-dir
      # とも) は node_modules を持たない (#3024 根本原因)。そこで snapshot を **本番 app container 内**
      # で実行する:
      #   - 本番 runtime image は scripts/ を COPY しない (Dockerfile Stage 3) ため、staging checkout
      #     (PR head) の script を docker cp で /app/scripts/ に流し込んでから node 実行する。
      #     /app 配下に置くことで require('better-sqlite3') が /app/node_modules を解決する。
      #   - container 内 /app/data は本番 host C:\Docker\ganbari-quest\data の bind mount
      #     (docker-compose.yml `./data:/app/data`)。dest は同 dir の一時 file
      #     (.staging-snapshot.tmp.db) に書き、host 側で staging data dir へ Move-Item する。
      #   - 本番不変条件 (#2872 AC4): source (本番 DB) は read のみ (online backup)。本番 container は
      #     停止しない。本番 data dir への書込は tmp snapshot file 1 個のみで、Move-Item で即時搬出する。
      #   - 稼働中 app と同一 container / 同一 WAL 文脈で db.backup() するため snapshot 整合が最も安全。
      # 本番 container 不在/停止時 (初回 provision 等) は従来同様 fixture fallback で継続し、staging は
      # fresh DB で起動する (lazy migration が初期 schema を構築)。container 稼働中でも本番 DB file
      # 不在なら script 自身が exit 0 + fixture fallback する (tmp file 非生成 → move skip)。
      - name: Snapshot prod DB to staging DB (in prod app container)
        run: |
          $prodCid = (& docker compose -p ganbari-quest ps -q app | Select-Object -First 1)
          if (-not $prodCid) {
            Write-Host "::notice::prod app container is not running -> fixture fallback. Staging starts from a fresh DB (lazy migration builds the initial schema)."
            exit 0
          }
          Write-Host "Prod app container: $prodCid"
          # PR head の snapshot script を container に流し込む (runtime image は scripts/ を含まない)
          docker exec $prodCid mkdir -p /app/scripts
          if ($LASTEXITCODE -ne 0) { throw "mkdir /app/scripts failed in prod container (exit $LASTEXITCODE)" }
          docker cp ".\scripts\snapshot-prod-db.cjs" "${prodCid}:/app/scripts/snapshot-prod-db.cjs"
          if ($LASTEXITCODE -ne 0) { throw "docker cp snapshot-prod-db.cjs into prod container failed (exit $LASTEXITCODE)" }
          # 前回 run の残骸 tmp snapshot を除去 (冪等)
          docker exec $prodCid rm -f /app/data/.staging-snapshot.tmp.db
          # online backup: source (prod DB) は read のみ、dest は同 data dir の tmp file
          docker exec $prodCid node /app/scripts/snapshot-prod-db.cjs --source /app/data/ganbari-quest.db --dest /app/data/.staging-snapshot.tmp.db
          if ($LASTEXITCODE -ne 0) { throw "snapshot-prod-db.cjs failed in prod container (exit $LASTEXITCODE)" }
          # tmp snapshot は bind mount 経由で host に現れる -> staging data dir へ move (prod data dir から搬出)
          $tmpSnapshot = "C:\Docker\ganbari-quest\data\.staging-snapshot.tmp.db"
          if (Test-Path $tmpSnapshot) {
            New-Item -ItemType Directory -Force -Path ".\data" | Out-Null
            Move-Item -Path $tmpSnapshot -Destination ".\data\ganbari-quest.db" -Force
            Write-Host "::notice::prod DB snapshot moved to staging data dir (prod DB read-only, container kept running)."
          } else {
            Write-Host "::notice::prod DB file not present in container -> fixture fallback (fresh staging DB, lazy migration)."
          }

      # Step 5: Rebuild and start staging containers (app のみ、--profile 無し)。
      # stop -> build -> up 順は WAL safety のため重要 (deploy-nuc.yml と同型)。
      # BUILD_TIMESTAMP で build-stage cache を bust (#711)。`-p` で本番 project と隔離。
      # PORT=3100 は .env (env_file) 経由で docker-compose.yml の `${PORT:-3000}` に注入される。
      - name: Build and start (staging)
        run: |
          $env:BUILD_TIMESTAMP = (Get-Date -Format "yyyyMMddHHmmss")
          docker compose -p ganbari-quest-staging build
          docker compose -p ganbari-quest-staging up -d

      # Step 6: Post-deploy health check (#2872 AC6 / AC8 = §3.8 step 9 NUC 側)。
      # /api/health が 200 を返すまで retry (deploy-nuc.yml の retry pattern 踏襲)。
      # 200 取得後、response body の schema.schemaValid==true を assert することで
      # 「snapshot からの lazy migration が貫通し schema が valid」を実機担保する (#2508 再発防止)。
      - name: Health check (staging, schema valid assert)
        run: |
          Start-Sleep -Seconds 10
          $maxRetries = 5
          $retryInterval = 5
          $lastBody = ""
          for ($i = 1; $i -le $maxRetries; $i++) {
            $code = & curl.exe -s -o staging-health.json -w "%{http_code}" --connect-timeout 10 http://localhost:3100/api/health 2>$null
            if ($code -eq "200") {
              $lastBody = Get-Content -Path staging-health.json -Raw
              Write-Host "Health check HTTP 200 on attempt $i"
              Write-Host "=== /api/health body ==="
              Write-Host $lastBody
              try {
                $json = $lastBody | ConvertFrom-Json
              } catch {
                throw "Health endpoint returned 200 but body was not valid JSON"
              }
              if ($json.schema.schemaValid -eq $true) {
                Write-Host "::notice::staging health passed (HTTP 200 + schema.schemaValid=true). Migration-from-snapshot verified (#2872 AC6)."
                exit 0
              }
              throw "Health 200 but schema.schemaValid is not true (migration may have failed): $lastBody"
            }
            Write-Host "Attempt $i failed (status: $code)"
            if ($i -lt $maxRetries) {
              Write-Host "Retrying in ${retryInterval}s..."
              Start-Sleep -Seconds $retryInterval
            }
          }
          throw "Staging health check failed after $maxRetries attempts (last status: $code)"

      # Step 7: Smoke test (#2872 AC2 / AC3)。主要導線の到達のみ確認 (本番一致 CUJ は統合 PR e2e が担う)。
      # root (/) が 200/302 + /switch が到達することを確認する。
      - name: Smoke test (staging)
        run: |
          # root: 200 (direct) または 302 (redirect) を正常とみなす。
          $root = & curl.exe -s -o NUL -w "%{http_code}" --connect-timeout 10 http://localhost:3100/ 2>$null
          Write-Host "GET / -> $root"
          if ($root -ne "200" -and $root -ne "302") {
            throw "Smoke test failed: GET / returned $root (expected 200 or 302)"
          }
          # /switch: 到達 (200/302) を確認 (子供切替の入口、本番ルート直 host)。
          $switch = & curl.exe -s -o NUL -w "%{http_code}" --connect-timeout 10 http://localhost:3100/switch 2>$null
          Write-Host "GET /switch -> $switch"
          if ($switch -ne "200" -and $switch -ne "302") {
            throw "Smoke test failed: GET /switch returned $switch (expected 200 or 302)"
          }
          Write-Host "::notice::staging smoke test passed (/ and /switch reachable)"

      # Step 8: Teardown — staging container を停止して runner マシンのリソースを解放する。
      # 本番 container には一切触れない (`-p ganbari-quest-staging` scope)。
      # always() で health/smoke fail 時も確実に停止する。
      - name: Teardown staging
        if: always()
        run: docker compose -p ganbari-quest-staging stop

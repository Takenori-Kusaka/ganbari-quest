name: PR Info

# #1481 Phase 4: pr-size-check.yml + pr-file-overlap.yml を統合
# 両ジョブとも comment-only（block しない）。マージ順序・サイズの注意喚起が目的。

on:
  pull_request:
    # #2931 / branch-strategy.md §4: 軽量レーン（comment-only / label 付与のみ、block しない）。
    # develop 向け PR でも発火する。
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  size-check:
    name: PR サイズ警告
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 差分行数を計算（lockfile・生成物を除外）
        id: size
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --numstat "$BASE_SHA..$HEAD_SHA" \
            -- . \
            ':(exclude)package-lock.json' \
            ':(exclude)**/*.lock' \
            ':(exclude)**/*.min.*' \
            ':(exclude)**/generated/**' \
            | awk '{ add += $1; del += $2 } END { print add + del }')
          CHANGED=${CHANGED:-0}
          FILES=$(git diff --name-only "$BASE_SHA..$HEAD_SHA" \
            -- . \
            ':(exclude)package-lock.json' \
            ':(exclude)**/*.lock' \
            | wc -l | tr -d ' ')
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "PR 変更行数: $CHANGED / 変更ファイル数: $FILES"

      - name: サイズ警告コメントを投稿（500行超えの場合）
        if: steps.size.outputs.changed != '' && fromJSON(steps.size.outputs.changed) > 500
        uses: actions/github-script@v9
        with:
          script: |
            const changed = Number('${{ steps.size.outputs.changed }}');
            const files = Number('${{ steps.size.outputs.files }}');
            const marker = '<!-- pr-size-check -->';
            const body = [
              marker,
              '## ⚠️ PR サイズ警告 (#964 / ADR-0020)',
              '',
              `- 変更行数: **${changed}** 行 (閾値 500 行)`,
              `- 変更ファイル数: **${files}**`,
              '',
              'レビュー品質を保つため、以下のいずれかを検討してください:',
              '- スコープを縮小して分割 PR 化',
              '- レビュー観点を PR 本文で絞り込む (「ここは生成物」等)',
              '- やむを得ない場合は理由を PR 本文に明記',
              '',
              '参考: Postmortem #962 (APPROVED なしマージによる本番障害)',
            ].join('\n');
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pull_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });
            }

  overlap-check:
    name: 並行 PR ファイル重複チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 重複チェック実行
        id: overlap
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          OUTPUT_MODE: json
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/check-pr-file-overlap.mjs > /tmp/overlap.json
          cat /tmp/overlap.json
          OVERLAP_COUNT=$(node -e "const j=require('/tmp/overlap.json'); console.log((j.overlaps || []).length)")
          echo "overlap_count=$OVERLAP_COUNT" >> "$GITHUB_OUTPUT"

      - name: 重複警告コメントを投稿
        if: steps.overlap.outputs.overlap_count != '' && fromJSON(steps.overlap.outputs.overlap_count) > 0
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/overlap.json', 'utf-8'));
            const marker = '<!-- pr-file-overlap-check -->';
            const overlapsMd = (data.overlaps || []).map((o) => {
              const files = o.sharedFiles.map((f) => `    - \`${f}\``).join('\n');
              const draft = o.isDraft ? ' (Draft)' : '';
              return `- #${o.number}${draft} by @${o.author}: ${o.title}\n${files}`;
            }).join('\n');
            const body = [
              marker,
              '## ⚠️ 並行 PR による同ファイル上書きリスク (#1200)',
              '',
              `本 PR が変更しているファイルと重複する open PR が **${data.overlaps.length} 件** あります。`,
              '',
              overlapsMd,
              '',
              '### 推奨アクション',
              '',
              '- どちらを先にマージするか **両 PR の作者間で合意する**',
              '- 後続 PR は先行 PR マージ後に rebase する (特に full rewrite 系)',
              '- スコープを分けられる場合は、本 PR から重複ファイルを外すか検討する',
              '',
              '参考: [Issue #1200](https://github.com/Takenori-Kusaka/ganbari-quest/issues/1200) — PR #1143/#1144/#1178 前例',
            ].join('\n');
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pull_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });
            }

      - name: 重複解消時に警告コメントを削除
        if: steps.overlap.outputs.overlap_count == '0'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- pr-file-overlap-check -->';
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pull_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
            }

  # #2495 観察1: PR title 接頭辞を SSOT として type:* label を自動付与。
  # actions/labeler (labeler.yml) は area:* file-glob のみで PR title を見ないため、
  # title→type:* 機構を本 job が補完する (責務分離: title→type / file-glob→area)。
  type-label:
    name: title 接頭辞から type:* label 付与
    runs-on: ubuntu-latest
    if: "github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'"
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            // PR title 接頭辞 (Conventional Commits 風) を SSOT とし type:* label を derive する。
            // type 集合は PULL_REQUEST_TEMPLATE.md「## 変更タイプ」8 件 + gh label list の
            // type:* 8 件と一致 (feat/fix/refactor/design/infra/test/docs/marketing)。
            // build/chore/ci/perf/style 等は label 不在のため map しない。
            const title = context.payload.pull_request.title || '';
            const m = title.match(/^(feat|fix|refactor|design|infra|test|docs|marketing)(\(.+\))?!?:/i);
            if (!m) {
              core.info(`title 接頭辞が type:* 対象外のため無干渉: "${title}"`);
              return;
            }
            const want = `type:${m[1].toLowerCase()}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const cur = context.payload.pull_request.labels.map((l) => l.name);
            // 既存の異なる type:* を 1 回 remove (手動上書きとの二重化防止、idempotent)
            for (const l of cur.filter((n) => n.startsWith('type:') && n !== want)) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: l }).catch(() => {});
            }
            if (!cur.includes(want)) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [want] });
              core.info(`付与: ${want}`);
            } else {
              core.info(`既付与のためスキップ: ${want}`);
            }

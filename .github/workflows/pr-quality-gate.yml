name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  screenshot-check:
    runs-on: ubuntu-latest
    # Draft PRは作業中なのでスキップ
    if: github.event.pull_request.draft == false
    steps:
      - name: Check PR body for screenshots
        uses: actions/github-script@v9
        with:
          script: |
            // UI関連ファイルが変更されているか確認
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const uiFilePattern = /\.(svelte|svelte\.ts|svelte\.js|css|scss)$|^site\//;
            const hasUiFiles = files.some(f => uiFilePattern.test(f.filename));

            if (!hasUiFiles) {
              core.info('✅ UI関連ファイルの変更なし — スクリーンショット不要');
              return;
            }

            // UI変更あり: PR本文にスクリーンショットがあるか確認
            const body = context.payload.pull_request.body || '';

            // Markdown画像: ![alt](url) / HTML画像: <img ...>
            const hasImage = /!\[.*?\]\(.*?\)|<img\s/i.test(body);

            if (!hasImage) {
              core.setFailed(
                [
                  '❌ UI変更PRにはスクリーンショットの添付が必須です。',
                  '',
                  '以下のいずれかの方法でスクリーンショットを追加してください:',
                  '1. PR本文の「スクリーンショット / ビジュアルデモ」セクションに画像を貼り付け',
                  '2. Playwrightで取得したスクリーンショットを添付',
                  '',
                  '対象ファイル: src/routes/**, src/lib/ui/**, src/lib/features/**, site/**',
                  '',
                  'Draft PRではスキップされます。Ready for Review に変更する前に添付してください。',
                ].join('\n')
              );
            } else {
              core.info('✅ スクリーンショットが検出されました。');
            }

  design-doc-check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for design doc updates
        uses: actions/github-script@v9
        with:
          script: |
            const { execSync } = require('child_process');

            // PR の変更ファイル一覧を取得
            // core.quotepath=false で日本語ファイル名のエスケープを防ぐ
            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            const diffOutput = execSync(
              `git -c core.quotepath=false diff --name-only ${base}...${head}`,
              { encoding: 'utf8' }
            );
            const files = diffOutput.trim().split('\n').filter(Boolean);

            // src/routes/ の変更があるか
            const hasRouteChanges = files.some(f => f.startsWith('src/routes/'));
            // docs/design/ の変更があるか
            const hasDesignDocChanges = files.some(f => f.startsWith('docs/design/'));

            // 変更ファイルが全て「設計書更新不要なパターン」に合致するか判定
            // (PR 本文テキストによる免除は廃止 — ファイルパターンのみで判定)
            const allFilesExempt = files.every(f =>
              /(?:^|\/|\\)CLAUDE\.md$/.test(f) || // **/CLAUDE.md（任意の階層）
              f.startsWith('scripts/') ||           // scripts/ 配下（CI/CD スクリプト）
              f.startsWith('docs/') ||              // docs/ 配下（docs 自体が設計書）
              f.startsWith('infra/') ||             // infra/ 配下（インフラ設定のみ）
              f.startsWith('.github/') ||           // .github/ 配下（CI 設定等）
              f.startsWith('site/')                 // LP ファイル（設計書の管轄外）
            );
            const hasDesignDocExemption = allFilesExempt;

            if (hasRouteChanges && !hasDesignDocChanges) {
              if (hasDesignDocExemption) {
                core.info(
                  '✅ 変更ファイルが全て設計書更新不要なパターン（CLAUDE.md / scripts/ / docs/ / infra/ / .github/ / site/）のみです — チェックをスキップします (ADR-0003)'
                );
              } else {
                core.setFailed(
                  '❌ src/routes/ に変更がありますが、docs/design/ の更新がありません。\n' +
                  '設計書の同期更新が必要な場合は同一PR内で更新してください（ADR-0003）。\n' +
                  '設計書の更新が不要なパターン（CLAUDE.md のみ / scripts/ のみ / docs/ のみ等）でも\n' +
                  'このメッセージが出た場合は、設計書更新が必要な変更を含んでいます。'
                );
              }
            }

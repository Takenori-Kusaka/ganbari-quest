name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  screenshot-check:
    runs-on: ubuntu-latest
    # Draft PRは作業中なのでスキップ
    if: github.event.pull_request.draft == false
    steps:
      - name: "Check PR body for screenshots (legacy: 画像有無)"
        uses: actions/github-script@v9
        with:
          script: |
            // UI関連ファイルが変更されているか確認
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const uiFilePattern = /\.(svelte|svelte\.ts|svelte\.js|css|scss)$|^site\//;
            const hasUiFiles = files.some(f => uiFilePattern.test(f.filename));

            if (!hasUiFiles) {
              core.info('✅ UI関連ファイルの変更なし — スクリーンショット不要');
              return;
            }

            // #2017: 内部 refactor (atom-compound 階層化、visual diff ゼロ) の label exempt。
            // I1 (#1985) design-doc-check と同パターン。判定基準は ADR-0003 §4.1 (4 条件).
            const labels = (context.payload.pull_request.labels || []).map((l) => l.name);
            const INTERNAL_REFACTOR_LABEL = 'refactor:internal-no-doc-impact';
            const hasInternalRefactorLabel = labels.some(
              (l) => l.trim().toLowerCase() === INTERNAL_REFACTOR_LABEL,
            );
            if (hasInternalRefactorLabel) {
              core.info(
                `✅ PR ラベル '${INTERNAL_REFACTOR_LABEL}' により内部 refactor として exempt (#2017 / ADR-0003 §4) — SS 添付不要`,
              );
              return;
            }

            // UI変更あり: PR本文にスクリーンショットがあるか確認
            const body = context.payload.pull_request.body || '';

            // Markdown画像: ![alt](url) / HTML画像: <img ...>
            const hasImage = /!\[.*?\]\(.*?\)|<img\s/i.test(body);

            if (!hasImage) {
              core.setFailed(
                [
                  '❌ UI変更PRにはスクリーンショットの添付が必須です。',
                  '',
                  '以下のいずれかの方法でスクリーンショットを追加してください:',
                  '1. PR本文の「スクリーンショット / ビジュアルデモ」セクションに画像を貼り付け',
                  '2. Playwrightで取得したスクリーンショットを添付',
                  '',
                  '対象ファイル: src/routes/**, src/lib/ui/**, src/lib/features/**, site/**',
                  '',
                  '機能仕様変化なしの内部 refactor (atom-compound 階層化等) で SS 不要の場合は',
                  `PR ラベル '${INTERNAL_REFACTOR_LABEL}' を付与してください (#2017 / ADR-0003 §4)。`,
                  '',
                  'Draft PRではスキップされます。Ready for Review に変更する前に添付してください。',
                ].join('\n')
              );
            } else {
              core.info('✅ スクリーンショットが検出されました。');
            }

  # ============================================================
  # #1740 + #1741 — PR スクリーンショット品質チェック
  #   - #1741: ローカル相対パス (`tmp/`, `.tmp-screenshots/`) 参照を検出
  #   - #1740: 「修正前 / 修正後」両ラベル付き画像の存在を検証
  #   - 段階適用: SCREENSHOT_CHECK_MODE=warn (default) で warning として記録、
  #     dogfooding 期間後に env を `error` に変更して hard-fail に昇格する
  # ============================================================
  screenshot-quality-check:
    name: "SS 品質チェック (修正前/後 + ローカルパス禁止)"
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: scripts/check-pr-screenshot.mjs
          sparse-checkout-cone-mode: false

      - name: Run check-pr-screenshot.mjs
        env:
          # 段階適用 (#1740): 最初は warn-only、定着後に error 化
          SCREENSHOT_CHECK_MODE: warn
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # PR の変更ファイル一覧を取得
          PR_FILES=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json files --jq '.files[].path' | tr '\r' ' ')
          export PR_FILES
          # #2017: PR ラベル一覧を取得 (refactor:internal-no-doc-impact による exempt 判定用)
          PR_LABELS=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | join(",")')
          export PR_LABELS
          node scripts/check-pr-screenshot.mjs

  # ============================================================
  # #2063 — Before/After SS Blob SHA 同一性検証
  #   PR-2054 (#1912) で発生した「force-push rebase で実装 branch は更新されたが
  #   screenshots branch は更新されず Before/After SS が完全同一画像のまま」
  #   という偽装パターン (3 ラウンド連続) への構造的対策。
  #
  #   `gh api repos/.../contents/<path>?ref=screenshots` で Blob SHA を取得し
  #   before-* / after-* ペアの SHA が一致 (= 1 byte も違わない完全同一画像) なら fail。
  #
  #   選択肢 A (確立パターン: GitHub API + SHA 比較) を採用 (Issue #2063 OSS 先調査済)。
  #   段階適用: SS_BLOB_SHA_CHECK_MODE=error で初期から hard-fail (偽装は致命的なため
  #   warn 段階を経ずに即 hard-fail を採用、AC2 で false positive ゼロ確認済)。
  # ============================================================
  ss-blob-sha-uniqueness-check:
    name: "SS Blob SHA 同一性検証 (Before/After 偽装防止 #2063)"
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: scripts/check-ss-blob-sha-uniqueness.mjs
          sparse-checkout-cone-mode: false

      - name: Run check-ss-blob-sha-uniqueness.mjs
        env:
          # #2063: 偽装は致命的なため warn 段階を経ずに即 hard-fail (initial error 採用)。
          # false positive ゼロは Issue #2063 AC2 で 5 PR (PR-2050/2051/2053/2055/2056) 空走確認済。
          CHECK_MODE: error
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # #2063 AC3: PR ラベル一覧を取得 (refactor:internal-no-doc-impact による exempt 判定用)
          PR_LABELS=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | join(",")')
          export PR_LABELS
          node scripts/check-ss-blob-sha-uniqueness.mjs

  # ============================================================
  # #3012 — SS render 健全性検証 (500 / error ページ混入検出)
  #   PR #3006 で 500 エラーページが「実画面 SS」として screenshots branch に
  #   2 度 push され、既存 gate (blob SHA 一意性 / ローカルパス禁止) を素通りした
  #   事故への補完 gate。根本層は capture.mjs / capture-app-baseline.mjs の
  #   撮影時 assert (scripts/lib/screenshot-helpers.mjs checkRenderHealth) が担い、
  #   本 job は screenshots branch pr-<N>/ の .dom.html (#1766 DOM snapshot) を
  #   text scan して error ページ marker を検出する軽量 heuristic 1 つに限定
  #   (画像解析は不採用、ADR-0010 Pre-PMF)。
  #   CHECK_MODE=error: error ページ混入は顧客提示物の毀損で致命的なため
  #   #2063 と同様 warn 段階を経ず hard-fail。marker は src/routes/+error.svelte /
  #   infra/error-pages 固有の class / 文言で false positive リスク ~0、
  #   正当な error ページ SS には 'ss:error-page-intended' ラベル exempt あり。
  # ============================================================
  ss-render-health-check:
    name: "SS render 健全性検証 (error ページ混入検出 #3012)"
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/check-ss-render-health.mjs
            scripts/lib/screenshot-helpers.mjs
          sparse-checkout-cone-mode: false

      - name: Run check-ss-render-health.mjs
        env:
          CHECK_MODE: error
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PR_LABELS=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | join(",")')
          export PR_LABELS
          node scripts/check-ss-render-health.mjs

  design-doc-check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # #1985: 判定ロジックは scripts/check-design-doc-sync.mjs (純粋関数 + unit test 完備) に集約。
      # 旧 inline script は廃止し、ファイルパターン exempt + label exempt (refactor:internal-no-doc-impact)
      # の OR 結合判定を 1 ファイルで管理する。
      - name: Check for design doc updates
        uses: actions/github-script@v9
        with:
          script: |
            const { execSync } = require('child_process');

            // PR の変更ファイル一覧を取得
            // core.quotepath=false で日本語ファイル名のエスケープを防ぐ
            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            const diffOutput = execSync(
              `git -c core.quotepath=false diff --name-only ${base}...${head}`,
              { encoding: 'utf8' }
            );
            const files = diffOutput.trim().split('\n').filter(Boolean);

            // PR ラベル一覧 (#1985: refactor:internal-no-doc-impact による exempt 判定用)
            const labels = (context.payload.pull_request.labels || []).map((l) => l.name);

            // scripts/check-design-doc-sync.mjs の純粋関数を直接呼ぶ
            // (CLI subprocess を経由しないことで stderr / stdout の改行 / encoding 起因の誤検知を回避)
            const { checkDesignDocSync } = await import(
              `${process.env.GITHUB_WORKSPACE}/scripts/check-design-doc-sync.mjs`
            );
            const result = checkDesignDocSync({ files, labels });

            if (result.status === 'skip') {
              core.info(`✅ ${result.reason}`);
              return;
            }
            if (result.status === 'pass') {
              core.info(`✅ ${result.reason}`);
              return;
            }
            // status === 'fail'
            core.setFailed(`❌ ${result.reason}`);

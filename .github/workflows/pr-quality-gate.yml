name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  screenshot-check:
    runs-on: ubuntu-latest
    # Draft PRは作業中なのでスキップ
    if: github.event.pull_request.draft == false
    steps:
      - name: Check PR body for screenshots
        uses: actions/github-script@v9
        with:
          script: |
            // UI関連ファイルが変更されているか確認
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const uiFilePattern = /\.(svelte|svelte\.ts|svelte\.js|css|scss)$|^site\//;
            const hasUiFiles = files.some(f => uiFilePattern.test(f.filename));

            if (!hasUiFiles) {
              core.info('✅ UI関連ファイルの変更なし — スクリーンショット不要');
              return;
            }

            // UI変更あり: PR本文にスクリーンショットがあるか確認
            const body = context.payload.pull_request.body || '';

            // Markdown画像: ![alt](url) / HTML画像: <img ...>
            const hasImage = /!\[.*?\]\(.*?\)|<img\s/i.test(body);

            if (!hasImage) {
              core.setFailed(
                [
                  '❌ UI変更PRにはスクリーンショットの添付が必須です。',
                  '',
                  '以下のいずれかの方法でスクリーンショットを追加してください:',
                  '1. PR本文の「スクリーンショット / ビジュアルデモ」セクションに画像を貼り付け',
                  '2. Playwrightで取得したスクリーンショットを添付',
                  '',
                  '対象ファイル: src/routes/**, src/lib/ui/**, src/lib/features/**, site/**',
                  '',
                  'Draft PRではスキップされます。Ready for Review に変更する前に添付してください。',
                ].join('\n')
              );
            } else {
              core.info('✅ スクリーンショットが検出されました。');
            }

  design-doc-check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for design doc updates
        uses: actions/github-script@v9
        with:
          script: |
            const { execSync } = require('child_process');

            // PR の変更ファイル一覧を取得
            // core.quotepath=false で日本語ファイル名のエスケープを防ぐ
            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            const diffOutput = execSync(
              `git -c core.quotepath=false diff --name-only ${base}...${head}`,
              { encoding: 'utf8' }
            );
            const files = diffOutput.trim().split('\n').filter(Boolean);

            // src/routes/ の変更があるか
            const hasRouteChanges = files.some(f => f.startsWith('src/routes/'));
            // docs/design/ の変更があるか
            const hasDesignDocChanges = files.some(f => f.startsWith('docs/design/'));

            if (hasRouteChanges && !hasDesignDocChanges) {
              // PR 本文に設計書更新不要の理由が記載されているかを確認
              const body = context.payload.pull_request.body || '';
              const hasDesignDocExemption =
                /##\s*設計書(更新について|[^\n]*不要)/.test(body) ||
                /設計書の更新は?不要/.test(body) ||
                /設計書更新.*不要/.test(body);

              if (hasDesignDocExemption) {
                core.info(
                  '✅ PR 本文に設計書更新不要の理由が記載されています — チェックをスキップします (ADR-0003)'
                );
              } else {
                core.setFailed(
                  '❌ src/routes/ に変更がありますが、docs/design/ の更新がありません。\n' +
                  '設計書の同期更新が必要な場合は同一PR内で更新してください（ADR-0003）。\n' +
                  '設計書の更新が不要と判断した場合は PR 本文の「設計書」セクションに理由を明記してください。'
                );
              }
            }

name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
    paths:
      # ビジュアル変更を含むファイル種別のみに絞る（バックエンド .ts / API endpoint は除外）。
      # 過去の `src/routes/**` 全体マッチは `+page.server.ts` や `api/.../+server.ts` でも
      # 発火してしまい、backend-only PR で false-positive を出す不具合があった。
      - "src/routes/**/*.svelte"
      - "src/routes/**/*.svelte.ts"
      - "src/routes/**/*.svelte.js"
      - "src/routes/**/*.css"
      - "src/routes/**/*.scss"
      - "src/lib/ui/**/*.svelte"
      - "src/lib/ui/**/*.svelte.ts"
      - "src/lib/ui/**/*.svelte.js"
      - "src/lib/ui/**/*.css"
      - "src/lib/ui/**/*.scss"
      - "src/lib/features/**/*.svelte"
      - "src/lib/features/**/*.svelte.ts"
      - "src/lib/features/**/*.svelte.js"
      - "src/lib/features/**/*.css"
      - "src/lib/features/**/*.scss"
      - "src/app.css"
      - "src/app.html"
      # LP (site/**) — 静的 HTML/CSS/JS/画像のビジュアル変更
      - "site/**/*.html"
      - "site/**/*.css"
      - "site/**/*.js"
      - "site/**/*.svg"
      - "site/**/*.png"
      - "site/**/*.jpg"
      - "site/**/*.jpeg"
      - "site/**/*.webp"

permissions:
  contents: read
  pull-requests: read

jobs:
  screenshot-check:
    runs-on: ubuntu-latest
    # Draft PRは作業中なのでスキップ
    if: github.event.pull_request.draft == false
    steps:
      - name: Check PR body for screenshots
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // スクリーンショット画像の検出
            // Markdown画像: ![alt](url) / HTML画像: <img ...>
            const hasImage = /!\[.*?\]\(.*?\)|<img\s/i.test(body);

            if (!hasImage) {
              core.setFailed(
                [
                  '❌ UI変更PRにはスクリーンショットの添付が必須です。',
                  '',
                  '以下のいずれかの方法でスクリーンショットを追加してください:',
                  '1. PR本文の「スクリーンショット / ビジュアルデモ」セクションに画像を貼り付け',
                  '2. Playwrightで取得したスクリーンショットを添付',
                  '',
                  '対象ファイル: src/routes/**, src/lib/ui/**, src/lib/features/**, site/**',
                  '',
                  'このチェックはUI関連ファイルを変更したPRでのみ実行されます。',
                  'Draft PRではスキップされます。Ready for Review に変更する前に添付してください。',
                ].join('\n')
              );
            } else {
              core.info('✅ スクリーンショットが検出されました。');
            }

  design-doc-check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for design doc updates
        uses: actions/github-script@v9
        with:
          script: |
            const { execSync } = require('child_process');

            // PR の変更ファイル一覧を取得
            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            const diffOutput = execSync(`git diff --name-only ${base}...${head}`, { encoding: 'utf8' });
            const files = diffOutput.trim().split('\n').filter(Boolean);

            // src/routes/ の変更があるか
            const hasRouteChanges = files.some(f => f.startsWith('src/routes/'));
            // docs/design/ の変更があるか
            const hasDesignDocChanges = files.some(f => f.startsWith('docs/design/'));

            if (hasRouteChanges && !hasDesignDocChanges) {
              core.setFailed(
                '❌ src/routes/ に変更がありますが、docs/design/ の更新がありません。\n' +
                '設計書の同期更新が必要な場合は同一PR内で更新してください（ADR-0003）。\n' +
                '設計書の更新が不要と判断した場合は PR 本文の「設計書」セクションに理由を明記してください。'
              );
            }

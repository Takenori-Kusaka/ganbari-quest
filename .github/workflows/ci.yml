name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # #1218: `ready_for_review` をトリガーに含めない。
    # 本 CI は Draft PR でも opened/synchronize で実行されるため、Draft→Ready 化で
    # 同一 SHA を再実行しても結果が変わらず、runtime（特に e2e-test）が無駄になる。
    # Draft スキップ系 workflow (pr-ui-check / pr-ac-verification-check / lp-metrics)
    # とは役割が異なる点に注意。
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      deps: ${{ steps.filter.outputs.deps }}
      site: ${{ steps.filter.outputs.site }}
      stories: ${{ steps.filter.outputs.stories }}
      cognito: ${{ steps.filter.outputs.cognito }}
      docker: ${{ steps.filter.outputs.docker }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'static/**'
              - 'tests/**'
              - 'infra/**'
              - 'scripts/**'
              - 'svelte.config.js'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'biome.json'
              - 'eslint.config.js'
              - 'playwright*.config.*'
              - 'vitest.config.*'
              - 'Dockerfile*'
              - '.github/workflows/ci.yml'
            deps:
              - 'package.json'
              - 'package-lock.json'
            site:
              - 'site/**'
              - 'scripts/check-site-html.mjs'
              - 'scripts/check-forbidden-terms.mjs'
            stories:
              - 'src/**/*.stories.*'
              - '.storybook/**'
              # #1557 (C4): stories ファイルが存在する UI コンポーネントディレクトリ
              # src/lib/server/** や src/routes/**/*.server.ts はストーリー非依存のため除外
              - 'src/lib/ui/**'
              - 'src/lib/features/**'
              - 'src/stories/**'
            # #1543: 認証・課金・プラン関連ファイルのみ e2e-cognito-dev を起動する
            cognito:
              # 認証コア
              - 'src/lib/server/auth/**'
              # Stripe クライアント・設定
              - 'src/lib/server/stripe/**'
              # サービス層: Stripe・ライセンス・プラン
              - 'src/lib/server/services/stripe-service.ts'
              - 'src/lib/server/services/stripe-metrics-service.ts'
              - 'src/lib/server/services/license-service.ts'
              - 'src/lib/server/services/license-key-service.ts'
              - 'src/lib/server/services/plan-limit-service.ts'
              # プランデバッグ・定数
              - 'src/lib/server/debug-plan.ts'
              - 'src/lib/domain/constants/license-plan.ts'
              - 'src/lib/domain/constants/subscription-status.ts'
              - 'src/lib/domain/constants/auth-license-status.ts'
              - 'src/lib/domain/constants/license-key-status.ts'
              # 認証・ライセンス UI ルート
              - 'src/routes/auth/**'
              - 'src/routes/api/stripe/**'
              - 'src/routes/(parent)/admin/license/**'
              # cognito-dev spec ファイル群
              - 'tests/e2e/cognito-auth.spec.ts'
              - 'tests/e2e/plan-*.spec.ts'
              - 'tests/e2e/upgrade-*.spec.ts'
              - 'tests/e2e/trial-*.spec.ts'
              - 'tests/e2e/ops-license*.spec.ts'
              - 'tests/e2e/premium-welcome.spec.ts'
              - 'tests/e2e/pricing-*.spec.ts'
              - 'tests/e2e/account-deletion.spec.ts'
              - 'tests/e2e/auth.setup.ts'
              - 'playwright.cognito-dev.config.ts'
              # CI 設定自体の変更
              - '.github/workflows/ci.yml'
            # #1551: docker-build は src/ / Dockerfile / config の変更時のみ実行。
            # tests/ / docs/ / scripts/ 等のビルド結果に影響しない変更ではスキップ。
            docker:
              - 'src/**'
              - 'static/**'
              - 'svelte.config.js'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'Dockerfile*'
              - '.dockerignore'
            # #2259 C4 fix: docs / scripts 変更でも lint-and-test (check-doc-code-references)
            # と scripts/ node:test を走らせる。本機構は「docs 内パス参照の実在性」を検証する
            # ため、docs-only PR でも CI gate に通す必要がある。
            docs:
              - 'docs/**'
              - 'CLAUDE.md'
              - 'DESIGN.md'
              - '**/CLAUDE.md'
              - 'scripts/check-doc-code-references.mjs'
              - 'scripts/doc-code-references-baseline.json'
              - 'scripts/__tests__/**'
              - '.github/workflows/ci.yml'

  lint-and-test:
    needs: changes
    # #923 Phase 1 Copilot指摘: .storybook/** だけ変更された PR でも
    # lint-and-test 内の Storybook build check を走らせるため stories を含める
    # #2259 C4 fix: docs-only PR でも check-doc-code-references を走らせるため docs を含める
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true' || needs.changes.outputs.stories == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # #2097 ADR-0048 week 4 / #2476: infra/ 配下も install。
      # root devDeps は aws-cdk-lib を持たず (lockfile 不整合回避)、infra/package.json SSOT で分離。
      # tests/unit/infra/multi-lambda-cdk.test.ts が aws-cdk-lib を import し、
      # vitest の module resolution が infra/node_modules を経由して解決する (vite.config.ts alias は不使用)。
      - name: Install infra dependencies (#2097 ADR-0048 / #2476)
        run: cd infra && npm ci

      - name: Biome lint (#1432 — warning=error)
        run: npx biome check --error-on-warnings .

      - name: Parallel implementation sync check (#565 / #1739 SSOT key-set diff)
        # #1739: scripts/check-ssot-parallel-impl.mjs が labels.ts ⇄ shared-labels.js の
        # key-set 比較で silent drift (parser 未対応 namespace) を検出する。
        # generate-lp-labels.mjs --check は full text 比較のため、両者を並べて
        # 「parser バグ」と「反映漏れ」の両面を捕捉する。
        run: npm run lint:parallel

      - name: No plan/status literal direct write check (#972)
        run: node scripts/check-no-plan-literals.mjs

      - name: Internal terms UI exposure check (#2288 AN-5 #2180 補強)
        # 親 UI (admin / 親管理画面) で内部用語 (DynamoDB / Pre-PMF Bucket A /
        # アクティベーションファネル / リテンションコホート / テナント等) の UI 露出を検知。
        # baseline pin 機構で新規違反 1 件で fail。
        # AN-5 (#2180) 観察「内部用語 UI 露出 = 3 EPIC 連続発見」の構造的解消 (EPIC #2283 ⑤)。
        run: node scripts/check-internal-terms.mjs

      - name: No direct process.env access check (#1202 / ADR-0040 P1)
        run: node scripts/check-no-direct-env-access.mjs

      - name: DynamoDB stub/no-op implementation check (#1021 / ADR-0034)
        run: node scripts/check-dynamodb-stub.mjs

      - name: No waitForTimeout in scripts/ check (#1208)
        run: node scripts/check-no-waitfortimeout.mjs

      - name: Hardcoded JP text baseline check (#1452 Phase A / #1465 Phase A)
        run: node scripts/check-hardcoded-strings.mjs

      - name: Document code references check (#2215 / #2240 Split A)
        # ドキュメント内に書かれた実装コードパス参照が実在するかを baseline モデルで検証。
        # 新規違反 1 件で fail。意図的増減時のみ `--update-baseline` 実行。
        # 既存 72 件 (40 ファイル) は scripts/doc-code-references-baseline.json で pin (#2240 Split C skip 判定 / #2259 C1 で path 配列化)。
        run: node scripts/check-doc-code-references.mjs

      - name: Scripts unit tests (node:test for check-doc-code-references.mjs) (#2259 C3)
        # #2259 C3 fix: vitest config は tests/unit/** / tests/integration/** のみで
        # scripts/__tests__/*.test.mjs は vitest 対象外。node --test を CI gate に組み込む。
        # 本 step は scripts/check-doc-code-references.mjs の CLI 動作 (path-set diff /
        # sandbox 隔離 / Deprecated marker / fenced code 除外 / inline/bare 区別) を検証する。
        run: node --test scripts/__tests__/check-doc-code-references.test.mjs

      - name: LP SSOT HTML baseline check (#1465 Phase A)
        run: node scripts/check-lp-ssot.mjs

      - name: No demo route duplication check (ADR-0039 / #1180)
        run: npm run check:no-demo-route-dup

      - name: Spell check (cspell) (#1432 — warning=error)
        run: npm run cspell

      - name: Stylelint (CSS hex check)
        run: npx stylelint "src/**/*.css"

      - name: Color usage report
        run: node scripts/lint-color-classes.mjs || true

      - name: ESLint SonarJS (duplicate strings / cognitive complexity, #977)
        continue-on-error: true
        run: npx eslint "src/**/*.ts"

      - name: ESLint Playwright (no-networkidle / no-wait-for-timeout, #1259)
        run: npx eslint "tests/**/*.ts"

      - name: Knip (unused exports/files/deps detection, #970)
        continue-on-error: true
        run: npx knip

      - name: Svelte check (#1432 — warning=error)
        run: npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json --threshold warning

      - name: Type coverage ratchet check (#978)
        run: npm run type-coverage

      - name: Build
        run: npm run build

      - name: Storybook build check
        # #923 Phase 1: stories / .storybook 配下が変更された PR でのみ実行 (-13s)
        if: needs.changes.outputs.stories == 'true'
        run: npm run build-storybook -- --quiet

  # #2374 / ADR-0052 / AN-5 #2180 補強 7:
  # Marketplace Registry 完整性 CI 検知。MARKETPLACE_TYPE_CODES の全 type が
  # Registry に register 済 + Strategy / Schema / types module / index.ts side-effect import
  # が揃っているかを構造的に検証。新 type 追加時の register 漏れを PR 段階で hard-fail
  # (challenge-set 型漏れ 1 ヶ月放置の再発防止)。
  # 軽量 (Node script + fs.readFileSync のみ、npm ci 不要) のため独立並列 job 化。
  marketplace-registry-integrity-check:
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Marketplace Registry integrity check (#2374 / ADR-0052)
        run: node scripts/check-marketplace-registry-integrity.mjs

  # #1006 Phase 2: vitest を 2 shard に分割して並列化 (1m 23s → ~40s 目標)
  # 各 shard は coverage を出力し、unit-test-merge で合算してラチェットチェック。
  # shard 実行時は threshold 未達でも fail しない (部分カバレッジのため不正確)。
  # threshold enforcement は merge 後に行う。
  unit-test:
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # #2097 ADR-0048 week 4 / #2476: tests/unit/infra/multi-lambda-cdk.test.ts が
      # aws-cdk-lib (infra/package.json SSOT) を import するため infra/ 配下にも install。
      # vitest の module resolution が infra/node_modules を経由して解決する (vite.config.ts alias は不使用)。
      - name: Install infra dependencies (#2097 ADR-0048 / #2476)
        run: cd infra && npm ci

      - name: Unit tests with coverage (shard ${{ matrix.shard }}/2)
        # shard 単体では全テストの一部しか走らないため coverage threshold は必ず未達になる。
        # threshold は unit-test-merge の --merge-reports 時に vite.config.ts の値で検証する。
        run: >-
          npx vitest run
          --reporter=blob
          --coverage.enabled
          --coverage.reporter=json
          --coverage.thresholds.lines=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.statements=0
          --shard=${{ matrix.shard }}/2

      - name: Upload vitest blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: .vitest-reports/
          include-hidden-files: true
          retention-days: 3

  # #1006: shard 分割された vitest 結果を merge してラチェット検証
  unit-test-merge:
    needs: [unit-test]
    if: always() && (needs.unit-test.result == 'success' || needs.unit-test.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # #2097 ADR-0048 week 4 / #2476: merge 時の coverage 再評価で multi-lambda-cdk.test.ts が
      # 再 import 解決される可能性があるため、infra/ 依存も install して整合させる。
      # 解決経路は vitest module resolution → infra/node_modules (vite.config.ts alias は不使用)。
      - name: Install infra dependencies (#2097 ADR-0048 / #2476)
        run: cd infra && npm ci

      - name: Download vitest blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: vitest-blob-*
          path: .vitest-reports
          merge-multiple: true

      - name: Merge vitest reports and validate coverage
        run: npx vitest --merge-reports --coverage

      - name: Coverage threshold ratchet check
        if: github.event_name == 'pull_request'
        run: node scripts/check-coverage-threshold.js

      - name: Test anti-pattern check
        if: github.event_name == 'pull_request'
        run: node scripts/check-test-antipatterns.js

  # #1168: Storybook browser test を CI 必須化（従来はローカルのみ flaky 運用で品質ゲート外だった）。
  # playwright/chromium をインストールして npm run test:storybook を実行する。
  # #1557 (C4): stories フィルター精緻化。src/lib/ui/** / src/lib/features/** / .storybook 変更時のみ実行。
  # src/lib/server/** や src/routes/**/*.server.ts のみ変更の場合は skip される。
  storybook-test:
    needs: changes
    if: needs.changes.outputs.deps == 'true' || needs.changes.outputs.stories == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Storybook tests
        run: npm run test:storybook

  e2e-test:
    runs-on: ubuntu-latest
    # #923 Phase 1: lint-and-test 依存を外して並列化 (-2m 44s)。
    # lint 失敗時も e2e は走るが、ci-gate が両方の結果を集約するので問題なし。
    # #1006 Phase 2: --shard matrix で 3 並列化 (7m 37s → ~3m 目標)
    needs: [changes]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for E2E (preview mode)
        run: npm run build

      - name: Run E2E tests (shard ${{ matrix.shard }}/3)
        # #806: vite preview は NODE_ENV=production で起動するため、
        # hooks.server.ts の assertLicenseKeyConfigured() が AWS_LICENSE_SECRET を要求する。
        # E2E はダミーの固定値で良い（本番シークレットとは別物）。
        # #2310 / #2337 / ADR-0050: parent-gate-session.ts の getSecret() が production で
        # 必須要求するため同じくダミー値で注入する (length >= 16 satisfy)。
        env:
          AWS_LICENSE_SECRET: e2e-test-secret-do-not-use-in-production
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
        run: npx playwright test --shard=${{ matrix.shard }}/3

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  # #1006: shard 分割された E2E blob レポートを集約し、HTML レポートを生成
  e2e-merge-reports:
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: always() && (needs.e2e-test.result == 'success' || needs.e2e-test.result == 'failure')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: e2e-blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v7
        with:
          name: e2e-html-report
          path: playwright-report/
          retention-days: 7

  # #1500: cognito-dev モード（AUTH_MODE=cognito COGNITO_DEV_MODE=true）での統合テスト。
  # plan 別 storageState（setup プロジェクト）を使って認証を高速化。
  # #1543: cognito フィルターに一致する変更（認証・課金・プラン関連）か、deps 変更時のみ実行。
  # スタンプ・活動・UI のみの変更では起動しない。
  # #1549-C6: ci-gate の needs に組み込み済み。skip 時は ci-gate がブロックしない。
  e2e-cognito-dev:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.cognito == 'true' || needs.changes.outputs.deps == 'true'
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache-cognito
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache-cognito.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache-cognito.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for cognito-dev E2E (preview mode)
        env:
          AUTH_MODE: cognito
          COGNITO_DEV_MODE: "true"
          AWS_LICENSE_SECRET: e2e-test-secret-do-not-use-in-production
          # #2310 / #2337 / ADR-0050: parent-gate-session.ts E2E requirement
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
        run: npm run build

      - name: Run cognito-dev E2E tests
        env:
          AUTH_MODE: cognito
          COGNITO_DEV_MODE: "true"
          AWS_LICENSE_SECRET: e2e-test-secret-do-not-use-in-production
          # #2310 / #2337 / ADR-0050: parent-gate-session.ts E2E requirement
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
          CI: "true"
        run: npx playwright test --config playwright.cognito-dev.config.ts

      - name: Upload cognito-dev E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-cognito-dev-results
          path: test-results/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    # #923 Phase 1: lint-and-test 依存を外して並列化 (e2e-test と同じ理由)
    # #1551: docker フィルターで絞り込み。tests/ / docs/ のみ変更時はスキップ。
    needs: [changes]
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.deps == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (NUC)
        run: docker build -t ganbari-quest:test .

      - name: Build Lambda Docker image (AWS)
        run: docker build -f Dockerfile.lambda -t ganbari-quest-lambda:test .

  # #2205: demo Lambda 専用 E2E (AUTH_MODE=anonymous + DATA_SOURCE=demo)
  # ADR-0048 Multi-Lambda Demo Deployment 整合性検証。
  # `area:demo` ラベル付き PR、または main push、または手動実行のみ走らせる
  # (毎 PR には不要、demo Lambda subdomain 影響範囲のみ)。
  e2e-demo-lambda:
    runs-on: ubuntu-latest
    needs: [changes]
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'push'
      || (github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'area:demo'))
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache-demo
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache-demo.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache-demo.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for demo Lambda E2E (preview mode)
        env:
          AUTH_MODE: anonymous
          DATA_SOURCE: demo
          AWS_LICENSE_SECRET: e2e-test-secret-do-not-use-in-production
          # #2310 / #2337 / ADR-0050: AUTH_MODE=anonymous で PIN gate は無効だが
          # parent-gate-session.ts module load 時に process.env.NODE_ENV='production'
          # 環境では getSecret() がデフォルト fallback で警告のみ。env 注入は不要。
          # ただし demo build の整合性確認のためダミー値で揃える。
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
        run: npm run build

      - name: Run demo Lambda E2E tests
        env:
          AUTH_MODE: anonymous
          DATA_SOURCE: demo
          AWS_LICENSE_SECRET: e2e-test-secret-do-not-use-in-production
          # #2310 / #2337 / ADR-0050: 同上
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
          CI: "true"
        run: npm run test:e2e:demo

      - name: Upload demo E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-demo-lambda-results
          path: |
            playwright-report-demo/
            test-results/
          retention-days: 7

  # #1545-C3 調査結果: app トリガーは除去不可
  # check-forbidden-terms.mjs の SEARCH_ROOTS に 'src' が含まれるため、
  # src/ 変更時にも禁止語（旧プラン名・旧年齢用語等）の混入を検知する必要がある。
  # check-site-html.mjs は site/ のみを検証するが、
  # check-forbidden-terms.mjs が src/ 全体をスキャン対象とするため
  # `app == 'true'` トリガーを維持する。
  # 将来最適化案: check-forbidden-terms.mjs の SEARCH_ROOTS から 'src' を除外し
  # src の禁止語チェックを biome/ESLint に移管すれば site-only トリガーに絞れる。
  site-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.site == 'true' || needs.changes.outputs.app == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Site internal links & required elements (#710)
        run: node scripts/check-site-html.mjs

      - name: Forbidden terms check (includes site/)
        run: node scripts/check-forbidden-terms.mjs

  # ADR-0029 / #914: 新規必須 env / secret 追加チェック
  # PR diff から `assert*Configured()` / `throw new Error('...required...')` 等を検出し、
  # PR 本文に「配布済み: <ENV>」証跡が無い場合は CI を red にする。
  # Pre-PMF 1 人体制で Assertion Erosion (#911 のような assertion 追加 → 配布忘れ →
  # 連続デプロイ失敗) を機械的に止めるためのゲート。
  new-env-distribution-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check new required env / secret distribution evidence (ADR-0029)
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-new-required-env.mjs

  # archive ADR-0031 (旧 schema-change-compat-testing) / #963: スキーマ変更時のテスト追加 warn チェック
  # 注: 本ジョブが参照する旧 ADR-0031 は archive 済 (`docs/decisions/archive/0031-schema-change-compat-testing.md`)。
  # 現役 ADR-0031 は ADR-0023 廃案 + 帰属マップ (#1780) で番号が再採番されている。
  # src/lib/server/db/schema.ts が変更された PR で、tests/unit/db|services/ に
  # テスト追加/変更が無い場合 warn を出す (exit 0 で blocker にはしない)。
  # Issue #962 (is_archived NULL 混在で本番全停止) の再発防止。
  schema-change-tests-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check schema change has tests (archive ADR-0031 schema-change-compat-testing, warn only)
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-schema-change-tests.mjs

  # #2520 AC6/AC7 / #2507 予告実装 (最小版): schema 破壊的変更時の lazy migration 同期 blocker。
  # schema.ts diff が DROP COLUMN / FK target 変更 / NOT NULL 変更 / cross-table flip を含む
  # ときだけ、lazy-startup-migrations.ts に同期 diff があるかを検証する (無ければ exit 1)。
  # 通常の ADD COLUMN は破壊的でないため素通り (上の warn ジョブの責務)。
  # Issue #2508 (NUC startup failure: 既存 DB を新 schema に上げられず起動 block) の再発防止。
  # #2519 (runtime data orphan gate、data 側 startup assert) とは別軸 (本ジョブは PR 時の static schema diff)。
  schema-migration-completeness-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check destructive schema change syncs lazy-startup-migrations (#2520 AC6/AC7)
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-schema-migration-completeness.mjs

  # Gate job: always runs and reports overall CI status.
  # Required by branch ruleset instead of individual jobs,
  # so skipped jobs (via path filter) don't block merges.
  ci-gate:
    if: always()
    permissions:
      contents: read
    needs:
      [
        changes,
        lint-and-test,
        marketplace-registry-integrity-check,
        unit-test,
        unit-test-merge,
        storybook-test,
        e2e-test,
        e2e-merge-reports,
        e2e-cognito-dev,
        e2e-demo-lambda,
        docker-build,
        site-check,
        new-env-distribution-check,
        schema-change-tests-check,
        schema-migration-completeness-check,
      ]
    runs-on: ubuntu-latest
    steps:
      # #926: needs を toJSON で一括チェックし、新規 job 追加時に results 配列の更新忘れで
      # ゲートが素通りする事故を防ぐ。`needs:` リストへの追加だけで自動的にゲート対象になる。
      - name: Check CI results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "Job results:"
          echo "$NEEDS" | jq -r 'to_entries[] | "  \(.key): \(.value.result)"'
          failed=$(echo "$NEEDS" | jq -r '[to_entries[] | select(.value.result == "failure" or .value.result == "cancelled")] | length')
          if [ "$failed" -gt 0 ]; then
            echo "CI failed: $failed job(s) failed or cancelled"
            exit 1
          fi
          echo "CI passed"

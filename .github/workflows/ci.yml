name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    # #2931 / branch-strategy.md §4: develop 二層化。develop 向け PR = 軽量レーン
    # (重量 job は `github.base_ref != 'develop'` 条件で skip)、main 向け PR = 重量レーン。
    branches: [main, develop]
    # #1218: `ready_for_review` をトリガーに含めない。
    # 本 CI は Draft PR でも opened/synchronize で実行されるため、Draft→Ready 化で
    # 同一 SHA を再実行しても結果が変わらず、runtime（特に e2e-test）が無駄になる。
    # Draft スキップ系 workflow (pr-ui-check / pr-ac-verification-check / lp-metrics)
    # とは役割が異なる点に注意。
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      deps: ${{ steps.filter.outputs.deps }}
      dependabot: ${{ steps.filter.outputs.dependabot }}
      site: ${{ steps.filter.outputs.site }}
      stories: ${{ steps.filter.outputs.stories }}
      cognito: ${{ steps.filter.outputs.cognito }}
      docker: ${{ steps.filter.outputs.docker }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'static/**'
              - 'tests/**'
              - 'infra/**'
              - 'scripts/**'
              - 'svelte.config.js'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'biome.json'
              - 'eslint.config.js'
              - 'playwright*.config.*'
              - 'vitest.config.*'
              - 'Dockerfile*'
              - '.github/workflows/ci.yml'
            deps:
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/native-dep-smoke.mjs'
            # #3191: dependabot 設定 (main 直行封鎖 regression guard) の変更検出
            dependabot:
              - '.github/dependabot.yml'
              - 'scripts/check-dependabot-target-branch.mjs'
            site:
              - 'site/**'
              - 'scripts/check-site-html.mjs'
              - 'scripts/check-forbidden-terms.mjs'
            stories:
              - 'src/**/*.stories.*'
              - '.storybook/**'
              # #1557 (C4): stories ファイルが存在する UI コンポーネントディレクトリ
              # src/lib/server/** や src/routes/**/*.server.ts はストーリー非依存のため除外
              - 'src/lib/ui/**'
              - 'src/lib/features/**'
              - 'src/stories/**'
            # #1543: 認証・課金・プラン関連ファイルのみ e2e-cognito-dev を起動する
            cognito:
              # 認証コア
              - 'src/lib/server/auth/**'
              # Stripe クライアント・設定
              - 'src/lib/server/stripe/**'
              # サービス層: Stripe・ライセンス・プラン
              - 'src/lib/server/services/stripe-service.ts'
              - 'src/lib/server/services/stripe-metrics-service.ts'
              - 'src/lib/server/services/license-service.ts'
              - 'src/lib/server/services/license-key-service.ts'
              - 'src/lib/server/services/plan-limit-service.ts'
              # プランデバッグ・定数
              - 'src/lib/server/debug-plan.ts'
              - 'src/lib/domain/constants/subscription-plan.ts'
              - 'src/lib/domain/constants/subscription-status.ts'
              - 'src/lib/domain/constants/auth-license-status.ts'
              - 'src/lib/domain/constants/license-key-status.ts'
              # 認証・ライセンス UI ルート
              - 'src/routes/auth/**'
              - 'src/routes/api/stripe/**'
              - 'src/routes/(parent)/admin/license/**'
              # cognito-dev spec ファイル群
              - 'tests/e2e/cognito-auth.spec.ts'
              - 'tests/e2e/plan-*.spec.ts'
              - 'tests/e2e/upgrade-*.spec.ts'
              - 'tests/e2e/trial-*.spec.ts'
              - 'tests/e2e/ops-license*.spec.ts'
              - 'tests/e2e/premium-welcome.spec.ts'
              - 'tests/e2e/pricing-*.spec.ts'
              - 'tests/e2e/account-deletion.spec.ts'
              - 'tests/e2e/auth.setup.ts'
              - 'playwright.cognito-dev.config.ts'
              # CI 設定自体の変更
              - '.github/workflows/ci.yml'
            # #1551: docker-build は src/ / Dockerfile / config の変更時のみ実行。
            # tests/ / docs/ / scripts/ 等のビルド結果に影響しない変更ではスキップ。
            docker:
              - 'src/**'
              - 'static/**'
              - 'svelte.config.js'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'Dockerfile*'
              - '.dockerignore'
            # #2259 C4 fix: docs / scripts 変更でも lint-and-test (check-doc-code-references)
            # と scripts/ node:test を走らせる。本機構は「docs 内パス参照の実在性」を検証する
            # ため、docs-only PR でも CI gate に通す必要がある。
            docs:
              - 'docs/**'
              - 'CLAUDE.md'
              - 'DESIGN.md'
              - '**/CLAUDE.md'
              - 'scripts/check-doc-code-references.mjs'
              - 'scripts/doc-code-references-baseline.json'
              - 'scripts/__tests__/**'
              - '.github/workflows/ci.yml'

  lint-and-test:
    needs: changes
    # #923 Phase 1 Copilot指摘: .storybook/** だけ変更された PR でも
    # lint-and-test 内の Storybook build check を走らせるため stories を含める
    # #2259 C4 fix: docs-only PR でも check-doc-code-references を走らせるため docs を含める
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true' || needs.changes.outputs.stories == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # #2097 ADR-0048 week 4 / #2476: infra/ 配下も install。
      # root devDeps は aws-cdk-lib を持たず (lockfile 不整合回避)、infra/package.json SSOT で分離。
      # tests/unit/infra/multi-lambda-cdk.test.ts が aws-cdk-lib を import し、
      # vitest の module resolution が infra/node_modules を経由して解決する (vite.config.ts alias は不使用)。
      - name: Install infra dependencies (#2097 ADR-0048 / #2476)
        run: cd infra && npm ci

      - name: Biome lint (#1432 — warning=error)
        run: npx biome check --error-on-warnings .

      - name: Parallel implementation sync check (#565 / #1739 SSOT key-set diff)
        # #1739: scripts/check-ssot-parallel-impl.mjs が labels.ts ⇄ shared-labels.js の
        # key-set 比較で silent drift (parser 未対応 namespace) を検出する。
        # generate-lp-labels.mjs --check は full text 比較のため、両者を並べて
        # 「parser バグ」と「反映漏れ」の両面を捕捉する。
        run: npm run lint:parallel

      - name: No plan/status literal direct write check (#972)
        run: node scripts/check-no-plan-literals.mjs

      - name: License key re-introduction guard (#2836 / Epic #2525 Phase 7 PR-L4)
        # license key 全廃 (Phase 1 補強 3 #2788) の再導入防止。allowlist 外のコード行に
        # ライセンスキー / licenseKey / license-key / LICENSE_KEY 参照を検出したら fail。
        # DB 層 / LEGACY_URL_MAP entry は PR-L5 担当の FILE_ALLOWLIST、履歴コメントは許容。
        run: node scripts/check-license-key-leak.mjs

      - name: Internal terms UI exposure check (#2288 AN-5 #2180 補強)
        # 親 UI (admin / 親管理画面) で内部用語 (DynamoDB / Pre-PMF Bucket A /
        # アクティベーションファネル / リテンションコホート / テナント等) の UI 露出を検知。
        # baseline pin 機構で新規違反 1 件で fail。
        # AN-5 (#2180) 観察「内部用語 UI 露出 = 3 EPIC 連続発見」の構造的解消 (EPIC #2283 ⑤)。
        run: node scripts/check-internal-terms.mjs

      - name: No direct process.env access check (#1202 / ADR-0040 P1)
        run: node scripts/check-no-direct-env-access.mjs

      - name: DynamoDB stub/no-op implementation check (#1021 / ADR-0034)
        run: node scripts/check-dynamodb-stub.mjs

      - name: DynamoDB stub parity guard (#2824 / ADR-0055)
        # helper 経由 stub (return notImplemented(...) / warnRead(...) / warnWrite(...)) を
        # inventory 化し、baseline を超える新規 stub 追加を block する。
        # check-dynamodb-stub.mjs が拾えない helper indirection pattern を補完。
        run: node scripts/check-dynamodb-stub-parity.mjs

      - name: No waitForTimeout in scripts/ check (#1208)
        run: node scripts/check-no-waitfortimeout.mjs

      - name: Hardcoded JP text baseline check (#1452 Phase A / #1465 Phase A)
        run: node scripts/check-hardcoded-strings.mjs

      - name: Document code references check (#2215 / #2240 Split A)
        # ドキュメント内に書かれた実装コードパス参照が実在するかを baseline モデルで検証。
        # 新規違反 1 件で fail。意図的増減時のみ `--update-baseline` 実行。
        # 既存 72 件 (40 ファイル) は scripts/doc-code-references-baseline.json で pin (#2240 Split C skip 判定 / #2259 C1 で path 配列化)。
        run: node scripts/check-doc-code-references.mjs

      - name: Terminology coherence check (#2555 / #2815 D-3 C+)
        # pre-ready Step 11 と同一検査の CI 化 (#2815 D-3 敵対的レビュー所見:
        # pre-ready 12 step 中、本 step だけ CI のどの workflow にも非搭載で
        # 「ローカル self-report と CI の乖離を CI green が吸収する」前提が破れていた)。
        # 用語不統一・add 経路重複 (Hick's Law ≤4) を warning 0 で gate (CX-DoR 条件 3/4)。
        run: npx tsx scripts/check-terminology-coherence.ts

      - name: Scripts unit tests (node:test for check-doc-code-references.mjs) (#2259 C3)
        # #2259 C3 fix: vitest config は tests/unit/** / tests/integration/** のみで
        # scripts/__tests__/*.test.mjs は vitest 対象外。node --test を CI gate に組み込む。
        # 本 step は scripts/check-doc-code-references.mjs の CLI 動作 (path-set diff /
        # sandbox 隔離 / Deprecated marker / fenced code 除外 / inline/bare 区別) を検証する。
        run: node --test scripts/__tests__/check-doc-code-references.test.mjs

      - name: LP SSOT HTML baseline check (#1465 Phase A)
        run: node scripts/check-lp-ssot.mjs

      - name: No demo route duplication check (ADR-0039 / #1180)
        run: npm run check:no-demo-route-dup

      - name: Spell check (cspell) (#1432 — warning=error)
        run: npm run cspell

      - name: Stylelint (CSS hex check)
        run: npx stylelint "src/**/*.css"

      - name: Color usage report
        run: node scripts/lint-color-classes.mjs || true

      - name: ESLint SonarJS (duplicate strings / cognitive complexity, #977)
        continue-on-error: true
        run: npx eslint "src/**/*.ts"

      - name: ESLint Playwright (no-networkidle / no-wait-for-timeout, #1259)
        run: npx eslint "tests/**/*.ts"

      - name: Knip (unused exports/files/deps detection, #970)
        continue-on-error: true
        run: npx knip

      - name: Svelte check (#1432 — warning=error)
        run: npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json --threshold warning

      - name: Type coverage ratchet check (#978)
        run: npm run type-coverage

      - name: Build
        run: npm run build

      - name: Storybook build check
        # #923 Phase 1: stories / .storybook 配下が変更された PR でのみ実行 (-13s)
        if: needs.changes.outputs.stories == 'true'
        run: npm run build-storybook -- --quiet

  # #2374 / ADR-0052 / AN-5 #2180 補強 7:
  # Marketplace Registry 完整性 CI 検知。MARKETPLACE_TYPE_CODES の全 type が
  # Registry に register 済 + Strategy / Schema / types module / index.ts side-effect import
  # が揃っているかを構造的に検証。新 type 追加時の register 漏れを PR 段階で hard-fail
  # (challenge-set 型漏れ 1 ヶ月放置の再発防止)。
  # 軽量 (Node script + fs.readFileSync のみ、npm ci 不要) のため独立並列 job 化。
  marketplace-registry-integrity-check:
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Marketplace Registry integrity check (#2374 / ADR-0052)
        run: node scripts/check-marketplace-registry-integrity.mjs

  # #3191: deps 供給線の監査すり抜け 3 穴 (dependabot main 直行 / native dep crash の
  # shift-left 欠如) を機械で塞ぐ。#3190 (better-sqlite3 12.11.1 SIGSEGV) の再発防止。
  deps-supply-chain-check:
    needs: changes
    if: needs.changes.outputs.deps == 'true' || needs.changes.outputs.dependabot == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # dependabot main 直行 regression guard は yaml parse のみ (#3191 AC1)
      - run: npm ci

      - name: Dependabot target-branch=develop regression guard (#3072 / #3191)
        run: node scripts/check-dependabot-target-branch.mjs

      # native dep (better-sqlite3 / bcrypt / sharp) の ABI/バージョン不整合 crash を
      # 軽量レーンで捕捉する shift-left smoke (#3190 SIGSEGV class、#3191 AC3)
      - name: Native dependency smoke (SQLite/bcrypt/sharp binding 健全性)
        run: node scripts/native-dep-smoke.mjs

  # #1006 Phase 2: vitest を 2 shard に分割して並列化 (1m 23s → ~40s 目標)
  # 各 shard は coverage を出力し、unit-test-merge で合算してラチェットチェック。
  # shard 実行時は threshold 未達でも fail しない (部分カバレッジのため不正確)。
  # threshold enforcement は merge 後に行う。
  unit-test:
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # #2097 ADR-0048 week 4 / #2476: tests/unit/infra/multi-lambda-cdk.test.ts が
      # aws-cdk-lib (infra/package.json SSOT) を import するため infra/ 配下にも install。
      # vitest の module resolution が infra/node_modules を経由して解決する (vite.config.ts alias は不使用)。
      - name: Install infra dependencies (#2097 ADR-0048 / #2476)
        run: cd infra && npm ci

      - name: Unit tests with coverage (shard ${{ matrix.shard }}/2)
        # shard 単体では全テストの一部しか走らないため coverage threshold は必ず未達になる。
        # threshold は unit-test-merge の --merge-reports 時に vite.config.ts の値で検証する。
        run: >-
          npx vitest run
          --reporter=blob
          --coverage.enabled
          --coverage.reporter=json
          --coverage.thresholds.lines=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.statements=0
          --shard=${{ matrix.shard }}/2

      - name: Upload vitest blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: .vitest-reports/
          include-hidden-files: true
          retention-days: 3

  # #1006: shard 分割された vitest 結果を merge してラチェット検証
  unit-test-merge:
    needs: [unit-test]
    if: always() && (needs.unit-test.result == 'success' || needs.unit-test.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # #2097 ADR-0048 week 4 / #2476: merge 時の coverage 再評価で multi-lambda-cdk.test.ts が
      # 再 import 解決される可能性があるため、infra/ 依存も install して整合させる。
      # 解決経路は vitest module resolution → infra/node_modules (vite.config.ts alias は不使用)。
      - name: Install infra dependencies (#2097 ADR-0048 / #2476)
        run: cd infra && npm ci

      - name: Download vitest blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: vitest-blob-*
          path: .vitest-reports
          merge-multiple: true

      - name: Merge vitest reports and validate coverage
        # #2874: json-summary reporter を追加し coverage/coverage-summary.json を出力する
        # (integration-evidence job の §3.5 #4 カバレッジエビデンス入力)。
        # threshold 検証は reporter に依らず vite.config.ts thresholds で行われる。
        run: >-
          npx vitest --merge-reports --coverage
          --coverage.reporter=text
          --coverage.reporter=html
          --coverage.reporter=lcov
          --coverage.reporter=json-summary

      # #2874: coverage summary を artifact 化し integration-evidence job で download する。
      # threshold 未達 (step 失敗) でも summary 自体は出力済みのため if: always() で upload。
      - name: Upload coverage summary (#2874)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Coverage threshold ratchet check
        if: github.event_name == 'pull_request'
        run: node scripts/check-coverage-threshold.js

      - name: Test anti-pattern check
        if: github.event_name == 'pull_request'
        run: node scripts/check-test-antipatterns.js

  # #1168: Storybook browser test を CI 必須化（従来はローカルのみ flaky 運用で品質ゲート外だった）。
  # playwright/chromium をインストールして npm run test:storybook を実行する。
  # #1557 (C4): stories フィルター精緻化。src/lib/ui/** / src/lib/features/** / .storybook 変更時のみ実行。
  # src/lib/server/** や src/routes/**/*.server.ts のみ変更の場合は skip される。
  storybook-test:
    needs: changes
    # #2931 / branch-strategy.md §4: 重量レーン。develop 向け PR では skip (main 向け PR / push で実行)。
    # #2874: 統合 PR (develop → main) では paths filter に依らず保証発火する。
    # integration 判定 (base==main && head==develop) は scripts/pr-lane.mjs rule 2 が SSOT。
    # composite action (actions/pr-lane) 経由の needs 化は main push 経路 (base_ref 空) を壊すため
    # inline 式で OR する (handoff spec 承認済 / A-6 #2948 で対応表化予定)。
    if: >-
      (github.base_ref == 'main' && (github.head_ref == 'develop' || startsWith(github.head_ref, 'release/')))
      || (github.base_ref != 'develop' && (needs.changes.outputs.deps == 'true' || needs.changes.outputs.stories == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Storybook tests
        run: npm run test:storybook

  e2e-test:
    runs-on: ubuntu-latest
    # #923 Phase 1: lint-and-test 依存を外して並列化 (-2m 44s)。
    # lint 失敗時も e2e は走るが、ci-gate が両方の結果を集約するので問題なし。
    # #1006 Phase 2: --shard matrix で 3 並列化 (7m 37s → ~3m 目標)
    # #2931 / branch-strategy.md §4: 重量レーン。develop 向け PR では skip。
    # #2874: 統合 PR (develop → main) では paths filter に依らず保証発火 (pr-lane.mjs rule 2 SSOT)。
    needs: [changes]
    if: >-
      (github.base_ref == 'main' && (github.head_ref == 'develop' || startsWith(github.head_ref, 'release/')))
      || (github.base_ref != 'develop' && (needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'))
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for E2E (preview mode)
        run: npm run build

      - name: Run E2E tests (shard ${{ matrix.shard }}/3)
        # #806: vite preview は NODE_ENV=production で起動するため、
        # E2E はダミーの固定値で良い（本番シークレットとは別物）。
        # #2310 / #2337 / ADR-0050: parent-gate-session.ts の getSecret() が production で
        # 必須要求するため同じくダミー値で注入する (length >= 16 satisfy)。
        env:
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
        run: npx playwright test --shard=${{ matrix.shard }}/3

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  # CX-DoR #10 Accessibility — axe-core WCAG 2.2 AA gate (A-5)
  # critical CUJ (marketplace 一覧/詳細 + 受領 admin 3 page + 子供 home 2 mode) を
  # @axe-core/playwright で scan し、critical / serious 違反 0 件を機械検証する。
  # Pre-PMF (ADR-0010): 重い full-matrix でなく a11y-critical-cuj.spec.ts 1 本のみ実行。
  # 既知違反は tests/e2e/a11y-baseline.json に rule id 単位で pin (silent cap 禁止、log で件数明示)。
  a11y:
    runs-on: ubuntu-latest
    needs: [changes]
    # #2931 / branch-strategy.md §4: 重量レーン。develop 向け PR では skip。
    # #2874: 統合 PR (develop → main) では paths filter に依らず保証発火 (pr-lane.mjs rule 2 SSOT)。
    if: >-
      (github.base_ref == 'main' && (github.head_ref == 'develop' || startsWith(github.head_ref, 'release/')))
      || (github.base_ref != 'develop' && (needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'))
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for E2E (preview mode)
        run: npm run build

      - name: Run a11y critical CUJ scan (WCAG 2.2 AA)
        # E2E と同じくダミー固定 secret を注入 (vite preview NODE_ENV=production 要求)。
        env:
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
        run: npx playwright test tests/e2e/a11y-critical-cuj.spec.ts

      - name: Upload a11y test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-test-results
          path: test-results/
          retention-days: 7

  # #1006: shard 分割された E2E blob レポートを集約し、HTML レポートを生成
  e2e-merge-reports:
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: always() && (needs.e2e-test.result == 'success' || needs.e2e-test.result == 'failure')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: e2e-blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v7
        with:
          name: e2e-html-report
          path: playwright-report/
          retention-days: 7

  # #2874 (G-E2E-MATRIX): ADR-0040 mode×plan matrix E2E (playwright.matrix.config.ts) の
  # 重量レーン CI 組込。4 project (demo-free 5201 / local-debug-family 5202 /
  # aws-prod-trial-expired 5203 / nuc-prod-trust-based 5204) × smoke spec を workers:1 で実行し、
  # 3 層アーキテクチャ (env.ts → evaluation-context.ts → capabilities.ts) の境界条件を
  # 統合 PR / main 向け PR / main push で機械検証する。
  # 注: 「5 年齢モード matrix」ではない (gap-list G-E2E-MATRIX の記載は実体と乖離、#2874 で是正)。
  # 5 年齢モード横断は通常 E2E (multi-age-mode.spec.ts 等、e2e-test job) が重量レーンで既カバー。
  # paths filter は意図的に置かない (統合 PR での保証発火、pr-lane.mjs rule 2 SSOT)。
  e2e-matrix:
    runs-on: ubuntu-latest
    needs: [changes]
    # 重量レーン: develop 向け PR では skip。main 向け PR (integration / hotfix) + main push で実行。
    if: github.base_ref != 'develop'
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache-matrix
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache-matrix.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache-matrix.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run mode×plan matrix E2E (4 project, port 5201-5204)
        # dev server 4 本同時起動 (playwright.matrix.config.ts webServer)。
        # PARENT_GATE_COOKIE_SECRET は e2e-test job と同じダミー固定値 (#806 / ADR-0050)。
        env:
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
          CI: "true"
        run: npm run test:e2e:matrix

      - name: Upload matrix E2E results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-matrix-results
          path: test-results/
          retention-days: 7

  # #1500: cognito-dev モード（AUTH_MODE=cognito COGNITO_DEV_MODE=true）での統合テスト。
  # plan 別 storageState（setup プロジェクト）を使って認証を高速化。
  # #1543: cognito フィルターに一致する変更（認証・課金・プラン関連）か、deps 変更時のみ実行。
  # スタンプ・活動・UI のみの変更では起動しない。
  # #1549-C6: ci-gate の needs に組み込み済み。skip 時は ci-gate がブロックしない。
  e2e-cognito-dev:
    runs-on: ubuntu-latest
    needs: [changes]
    # #2931 / branch-strategy.md §4: 重量レーン。develop 向け PR では skip。
    # #2874: 統合 PR (develop → main) では paths filter に依らず保証発火 (pr-lane.mjs rule 2 SSOT)。
    if: >-
      (github.base_ref == 'main' && (github.head_ref == 'develop' || startsWith(github.head_ref, 'release/')))
      || (github.base_ref != 'develop' && (needs.changes.outputs.cognito == 'true' || needs.changes.outputs.deps == 'true'))
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache-cognito
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache-cognito.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache-cognito.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for cognito-dev E2E (preview mode)
        env:
          AUTH_MODE: cognito
          COGNITO_DEV_MODE: "true"
          # #2310 / #2337 / ADR-0050: parent-gate-session.ts E2E requirement
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
        run: npm run build

      - name: Run cognito-dev E2E tests
        env:
          AUTH_MODE: cognito
          COGNITO_DEV_MODE: "true"
          # #2310 / #2337 / ADR-0050: parent-gate-session.ts E2E requirement
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
          CI: "true"
        run: npx playwright test --config playwright.cognito-dev.config.ts

      - name: Upload cognito-dev E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-cognito-dev-results
          path: test-results/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    # #923 Phase 1: lint-and-test 依存を外して並列化 (e2e-test と同じ理由)
    # #1551: docker フィルターで絞り込み。tests/ / docs/ のみ変更時はスキップ。
    # #2931 / branch-strategy.md §4: 重量レーン。develop 向け PR では skip。
    # #2874: 統合 PR (develop → main) では paths filter に依らず保証発火 (pr-lane.mjs rule 2 SSOT)。
    needs: [changes]
    if: >-
      (github.base_ref == 'main' && (github.head_ref == 'develop' || startsWith(github.head_ref, 'release/')))
      || (github.base_ref != 'develop' && (needs.changes.outputs.docker == 'true' || needs.changes.outputs.deps == 'true'))
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (NUC)
        run: docker build -t ganbari-quest:test .

      - name: Build Lambda Docker image (AWS)
        run: docker build -f Dockerfile.lambda -t ganbari-quest-lambda:test .

  # #2205: demo Lambda 専用 E2E (AUTH_MODE=anonymous + DATA_SOURCE=demo)
  # ADR-0048 Multi-Lambda Demo Deployment 整合性検証。
  # `area:demo` ラベル付き PR、または main push、または手動実行のみ走らせる
  # (毎 PR には不要、demo Lambda subdomain 影響範囲のみ)。
  e2e-demo-lambda:
    runs-on: ubuntu-latest
    needs: [changes]
    # #2931 / branch-strategy.md §4: 重量レーン。develop 向け PR では skip (area:demo label があっても)。
    # #2874: 統合 PR (develop → main) では area:demo label 条件を bypass して保証発火
    # (pr-lane.mjs rule 2 SSOT。統合 PR は label 有無に依らず demo Lambda 等価性を最終検証する)。
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'push'
      || (github.event_name == 'pull_request'
          && github.base_ref == 'main'
          && (github.head_ref == 'develop' || startsWith(github.head_ref, 'release/')))
      || (github.event_name == 'pull_request'
          && github.base_ref != 'develop'
          && contains(github.event.pull_request.labels.*.name, 'area:demo'))
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache-demo
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache-demo.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache-demo.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for demo Lambda E2E (preview mode)
        env:
          AUTH_MODE: anonymous
          DATA_SOURCE: demo
          # #2310 / #2337 / ADR-0050: AUTH_MODE=anonymous で PIN gate は無効だが
          # parent-gate-session.ts module load 時に process.env.NODE_ENV='production'
          # 環境では getSecret() がデフォルト fallback で警告のみ。env 注入は不要。
          # ただし demo build の整合性確認のためダミー値で揃える。
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
        run: npm run build

      - name: Run demo Lambda E2E tests
        env:
          AUTH_MODE: anonymous
          DATA_SOURCE: demo
          # #2310 / #2337 / ADR-0050: 同上
          PARENT_GATE_COOKIE_SECRET: e2e-test-parent-gate-secret-do-not-use
          CI: "true"
        run: npm run test:e2e:demo

      - name: Upload demo E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-demo-lambda-results
          path: |
            playwright-report-demo/
            test-results/
          retention-days: 7

  # #1545-C3 調査結果: app トリガーは除去不可
  # check-forbidden-terms.mjs の SEARCH_ROOTS に 'src' が含まれるため、
  # src/ 変更時にも禁止語（旧プラン名・旧年齢用語等）の混入を検知する必要がある。
  # check-site-html.mjs は site/ のみを検証するが、
  # check-forbidden-terms.mjs が src/ 全体をスキャン対象とするため
  # `app == 'true'` トリガーを維持する。
  # 将来最適化案: check-forbidden-terms.mjs の SEARCH_ROOTS から 'src' を除外し
  # src の禁止語チェックを biome/ESLint に移管すれば site-only トリガーに絞れる。
  site-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.site == 'true' || needs.changes.outputs.app == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Site internal links & required elements (#710)
        run: node scripts/check-site-html.mjs

      - name: Forbidden terms check (includes site/)
        run: node scripts/check-forbidden-terms.mjs

  # ADR-0029 / #914: 新規必須 env / secret 追加チェック
  # PR diff から `assert*Configured()` / `throw new Error('...required...')` 等を検出し、
  # PR 本文に「配布済み: <ENV>」証跡が無い場合は CI を red にする。
  # Pre-PMF 1 人体制で Assertion Erosion (#911 のような assertion 追加 → 配布忘れ →
  # 連続デプロイ失敗) を機械的に止めるためのゲート。
  new-env-distribution-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check new required env / secret distribution evidence (ADR-0029)
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-new-required-env.mjs

  # archive ADR-0031 (旧 schema-change-compat-testing) / #963: スキーマ変更時のテスト追加 warn チェック
  # 注: 本ジョブが参照する旧 ADR-0031 は archive 済 (`docs/decisions/archive/0031-schema-change-compat-testing.md`)。
  # 現役 ADR-0031 は ADR-0023 廃案 + 帰属マップ (#1780) で番号が再採番されている。
  # src/lib/server/db/schema.ts が変更された PR で、tests/unit/db|services/ に
  # テスト追加/変更が無い場合 warn を出す (exit 0 で blocker にはしない)。
  # Issue #962 (is_archived NULL 混在で本番全停止) の再発防止。
  schema-change-tests-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check schema change has tests (archive ADR-0031 schema-change-compat-testing, warn only)
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-schema-change-tests.mjs

  # #2520 AC6/AC7 / #2507 予告実装 (最小版): schema 破壊的変更時の lazy migration 同期 blocker。
  # schema.ts diff が DROP COLUMN / FK target 変更 / NOT NULL 変更 / cross-table flip を含む
  # ときだけ、lazy-startup-migrations.ts に同期 diff があるかを検証する (無ければ exit 1)。
  # 通常の ADD COLUMN は破壊的でないため素通り (上の warn ジョブの責務)。
  # Issue #2508 (NUC startup failure: 既存 DB を新 schema に上げられず起動 block) の再発防止。
  # #2519 (runtime data orphan gate、data 側 startup assert) とは別軸 (本ジョブは PR 時の static schema diff)。
  schema-migration-completeness-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check destructive schema change syncs lazy-startup-migrations (#2520 AC6/AC7)
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-schema-migration-completeness.mjs

  # #2931 / branch-strategy.md §7-1: main 向け PR の base/head 検査 gate。
  # 「main へ PR を出せるのは develop（統合 PR）と fix/*（hotfix、§5）のみ」を機械強制する。
  # Branch Ruleset は head branch の base 制限を直接持たないため workflow gate で補完する。
  #
  # 有効化は repository variable `BRANCH_STRATEGY_CUTOVER_AT`（ISO 8601 日時、ユーザー手動設定 = §8 step 5）:
  #   - 未設定: gate inactive（既存 open PR を block しない、§8 step 6 の無停止 cutover）
  #   - 設定後: 設定日時より後に作成された main 向け PR のみ enforce
  #     （設定日時より前に作成された open PR は grandfather 免除 = §8 step 6「retarget しない」）
  # bot（dependabot / renovate）は exempt（dependabot.yml の target-branch 切替は cutover 完了時に別途）。
  main-pr-base-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    permissions:
      contents: read
    steps:
      - name: Check head branch is develop, release/* or fix/* (branch-strategy.md §3 / §7-1)
        env:
          CUTOVER_AT: ${{ vars.BRANCH_STRATEGY_CUTOVER_AT }}
          HEAD_REF: ${{ github.head_ref }}
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
          PR_ACTOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ -z "$CUTOVER_AT" ]; then
            echo "BRANCH_STRATEGY_CUTOVER_AT 未設定 → gate inactive（cutover 前、§8 step 6）"
            exit 0
          fi
          case "$PR_ACTOR" in
            dependabot\[bot\]|renovate\[bot\])
              echo "bot PR ($PR_ACTOR) → exempt"
              exit 0 ;;
          esac
          # ISO 8601 UTC (YYYY-MM-DDTHH:MM:SSZ) 同士の辞書順比較
          if [[ "$PR_CREATED_AT" < "$CUTOVER_AT" ]]; then
            echo "PR 作成 ($PR_CREATED_AT) < cutover ($CUTOVER_AT) → grandfather 免除（§8 step 6）"
            exit 0
          fi
          if [ "$HEAD_REF" = "develop" ] || [[ "$HEAD_REF" == release/* ]] || [[ "$HEAD_REF" == fix/* ]]; then
            echo "head=$HEAD_REF → OK（develop/release 統合 PR または hotfix）"
            exit 0
          fi
          echo "::error::main 向け PR の head は develop / release/*（統合 PR）または fix/*（hotfix、ADR-0002 重量 gate 必須）のみ許可されています。head=$HEAD_REF は develop 向けに PR を出し直してください（docs/sessions/branch-strategy.md §3 / §5）。"
          exit 1

  # Gate job: always runs and reports overall CI status.
  # Required by branch ruleset instead of individual jobs,
  # so skipped jobs (via path filter) don't block merges.
  ci-gate:
    if: always()
    permissions:
      contents: read
    needs:
      [
        changes,
        lint-and-test,
        marketplace-registry-integrity-check,
        deps-supply-chain-check,
        unit-test,
        unit-test-merge,
        storybook-test,
        e2e-test,
        e2e-matrix,
        a11y,
        e2e-merge-reports,
        e2e-cognito-dev,
        e2e-demo-lambda,
        docker-build,
        site-check,
        new-env-distribution-check,
        schema-change-tests-check,
        schema-migration-completeness-check,
        main-pr-base-guard,
      ]
    runs-on: ubuntu-latest
    steps:
      # #926: needs を toJSON で一括チェックし、新規 job 追加時に results 配列の更新忘れで
      # ゲートが素通りする事故を防ぐ。`needs:` リストへの追加だけで自動的にゲート対象になる。
      - name: Check CI results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "Job results:"
          echo "$NEEDS" | jq -r 'to_entries[] | "  \(.key): \(.value.result)"'
          failed=$(echo "$NEEDS" | jq -r '[to_entries[] | select(.value.result == "failure" or .value.result == "cancelled")] | length')
          if [ "$failed" -gt 0 ]; then
            echo "CI failed: $failed job(s) failed or cancelled"
            exit 1
          fi
          echo "CI passed"

  # #2874 (G-API-COV / G-COV-MAP): 統合 PR (develop → main) のマージ判定エビデンス自動生成。
  # audit-team.md §3.5 の #3 (テスト結果表) / #4 (カバレッジ + API 突合) を artifact 化する。
  # - ci-gate の needs には入れない (gate ではない。merge 判定は ci-gate + audit-manager の責務)。
  # - if: always() で fail run でも表を残す = §3.6 全件発露の入力 (handoff spec 承認済設計判断)。
  # - integration 判定は inline 式 (pr-lane.mjs rule 2 SSOT。composite action 経由 needs は
  #   main push 経路を壊すため不採用)。
  # - §3.5 #1 (含有 PR 一覧) / #2 (変更×テスト突合) は B-1 (#2950) 領域 —
  #   evidence template に placeholder 行で境界明示済。
  integration-evidence:
    needs:
      [
        changes,
        lint-and-test,
        marketplace-registry-integrity-check,
        deps-supply-chain-check,
        unit-test,
        unit-test-merge,
        storybook-test,
        e2e-test,
        e2e-matrix,
        a11y,
        e2e-merge-reports,
        e2e-cognito-dev,
        e2e-demo-lambda,
        docker-build,
        site-check,
        new-env-distribution-check,
        schema-change-tests-check,
        schema-migration-completeness-check,
        main-pr-base-guard,
      ]
    if: >-
      always()
      && github.event_name == 'pull_request'
      && github.base_ref == 'main'
      && (github.head_ref == 'develop' || startsWith(github.head_ref, 'release/'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # unit-test-merge job が upload した coverage summary を取得 (欠落許容 —
      # scripts 側が「未取得」を明示して warn-only で続行する)。
      - name: Download coverage summary
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: coverage-summary
          path: coverage/

      - name: Generate integration PR evidence (audit-team.md §3.5 #3/#4)
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: >-
          node scripts/audit/generate-integration-evidence.mjs
          --run-id "${{ github.run_id }}"
          --pr "${{ github.event.pull_request.number }}"
          --out integration-evidence

      - name: Write GITHUB_STEP_SUMMARY (≤ 1MiB)
        run: head -c 1000000 integration-evidence/evidence.md >> "$GITHUB_STEP_SUMMARY"

      # B-4 (#2876): マージ判定 advisory 評価 (NG-0 + coverage ratchet)。
      # **advisory 先行**: continue-on-error で hard fail させず、ci-gate needs に入れず、
      # required_status_checks にも登録しない。NG の最終確定は audit-manager の人間判定が正本。
      # required 昇格は別 Issue / 段階導入 (deploy-aws-staging.yml 先例同型)。
      - name: Advisory merge-readiness evaluation (#2876、非 block)
        continue-on-error: true
        run: |
          set -uo pipefail
          ADVISORY=$(node -e "const e=require('./integration-evidence/evidence.json');const a=e.mergeReadinessAdvisory||{};console.log(JSON.stringify(a))")
          echo "advisory: $ADVISORY"
          PASS=$(node -e "const a=$ADVISORY;console.log(a.advisoryPass===true)")
          {
            echo '## マージ判定 advisory (#2876、非 block / required 未登録)';
            echo '';
            echo "- advisoryPass: ${PASS}";
            echo '';
            echo '> 本 step は continue-on-error の advisory であり merge を block しません。';
            echo '> required 昇格は別 Issue / 段階導入で判断します (deploy-aws-staging.yml 先例同型)。';
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$PASS" != "true" ]; then
            echo "::warning::マージ判定 advisory が PASS していません (NG / coverage / job 緑のいずれか未達)。block はしませんが audit-manager 判定で確認してください。"
          fi

      - name: Upload integration PR evidence
        uses: actions/upload-artifact@v7
        with:
          name: integration-pr-evidence-${{ github.run_id }}
          path: integration-evidence/
          retention-days: 30

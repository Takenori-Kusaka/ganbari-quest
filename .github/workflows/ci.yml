name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # #1218: `ready_for_review` をトリガーに含めない。
    # 本 CI は Draft PR でも opened/synchronize で実行されるため、Draft→Ready 化で
    # 同一 SHA を再実行しても結果が変わらず、runtime（特に e2e-test）が無駄になる。
    # Draft スキップ系 workflow (pr-ui-check / pr-ac-verification-check / lp-metrics)
    # とは役割が異なる点に注意。
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      deps: ${{ steps.filter.outputs.deps }}
      site: ${{ steps.filter.outputs.site }}
      stories: ${{ steps.filter.outputs.stories }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'static/**'
              - 'tests/**'
              - 'infra/**'
              - 'scripts/**'
              - 'svelte.config.js'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'biome.json'
              - 'eslint.config.js'
              - 'playwright*.config.*'
              - 'vitest.config.*'
              - 'Dockerfile*'
              - '.github/workflows/ci.yml'
            deps:
              - 'package.json'
              - 'package-lock.json'
            site:
              - 'site/**'
              - 'scripts/check-site-html.mjs'
              - 'scripts/check-forbidden-terms.mjs'
            stories:
              - 'src/**/*.stories.*'
              - '.storybook/**'

  lint-and-test:
    needs: changes
    # #923 Phase 1 Copilot指摘: .storybook/** だけ変更された PR でも
    # lint-and-test 内の Storybook build check を走らせるため stories を含める
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true' || needs.changes.outputs.stories == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Biome lint (#1432 — warning=error)
        run: npx biome check --error-on-warnings .

      - name: Parallel implementation sync check (#565)
        run: npm run lint:parallel

      - name: No plan/status literal direct write check (#972)
        run: node scripts/check-no-plan-literals.mjs

      - name: No direct process.env access check (#1202 / ADR-0040 P1)
        run: node scripts/check-no-direct-env-access.mjs

      - name: DynamoDB stub/no-op implementation check (#1021 / ADR-0034)
        run: node scripts/check-dynamodb-stub.mjs

      - name: No waitForTimeout in scripts/ check (#1208)
        run: node scripts/check-no-waitfortimeout.mjs

      - name: Hardcoded JP text baseline check (#1452 Phase A / #1465 Phase A)
        run: node scripts/check-hardcoded-strings.mjs

      - name: LP SSOT HTML baseline check (#1465 Phase A)
        run: node scripts/check-lp-ssot.mjs

      - name: No demo route duplication check (ADR-0039 / #1180)
        run: npm run check:no-demo-route-dup

      - name: Spell check (cspell) (#1432 — warning=error)
        run: npm run cspell

      - name: Stylelint (CSS hex check)
        run: npx stylelint "src/**/*.css"

      - name: Color usage report
        run: node scripts/lint-color-classes.mjs || true

      - name: ESLint SonarJS (duplicate strings / cognitive complexity, #977)
        continue-on-error: true
        run: npx eslint "src/**/*.ts"

      - name: ESLint Playwright (no-networkidle / no-wait-for-timeout, #1259)
        run: npx eslint "tests/**/*.ts"

      - name: Knip (unused exports/files/deps detection, #970)
        continue-on-error: true
        run: npx knip

      - name: Svelte check (#1432 — warning=error)
        run: npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json --threshold warning

      - name: Type coverage ratchet check (#978)
        run: npm run type-coverage

      - name: Build
        run: npm run build

      - name: Storybook build check
        # #923 Phase 1: stories / .storybook 配下が変更された PR でのみ実行 (-13s)
        if: needs.changes.outputs.stories == 'true'
        run: npm run build-storybook -- --quiet

  # #1006 Phase 2: vitest を 2 shard に分割して並列化 (1m 23s → ~40s 目標)
  # 各 shard は coverage を出力し、unit-test-merge で合算してラチェットチェック。
  # shard 実行時は threshold 未達でも fail しない (部分カバレッジのため不正確)。
  # threshold enforcement は merge 後に行う。
  unit-test:
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit tests with coverage (shard ${{ matrix.shard }}/2)
        # shard 単体では全テストの一部しか走らないため coverage threshold は必ず未達になる。
        # threshold は unit-test-merge の --merge-reports 時に vite.config.ts の値で検証する。
        run: >-
          npx vitest run
          --reporter=blob
          --coverage.enabled
          --coverage.reporter=json
          --coverage.thresholds.lines=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.statements=0
          --shard=${{ matrix.shard }}/2

      - name: Upload vitest blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: .vitest-reports/
          include-hidden-files: true
          retention-days: 3

  # #1006: shard 分割された vitest 結果を merge してラチェット検証
  unit-test-merge:
    needs: [unit-test]
    if: always() && (needs.unit-test.result == 'success' || needs.unit-test.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download vitest blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: vitest-blob-*
          path: .vitest-reports
          merge-multiple: true

      - name: Merge vitest reports and validate coverage
        run: npx vitest --merge-reports --coverage

      - name: Coverage threshold ratchet check
        if: github.event_name == 'pull_request'
        run: node scripts/check-coverage-threshold.js

      - name: Test anti-pattern check
        if: github.event_name == 'pull_request'
        run: node scripts/check-test-antipatterns.js

  # #1168: Storybook browser test を CI 必須化（従来はローカルのみ flaky 運用で品質ゲート外だった）。
  # playwright/chromium をインストールして npm run test:storybook を実行する。
  # stories / primitives / components / .storybook のいずれか変更時に走る。
  storybook-test:
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true' || needs.changes.outputs.stories == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Storybook tests
        run: npm run test:storybook

  e2e-test:
    runs-on: ubuntu-latest
    # #923 Phase 1: lint-and-test 依存を外して並列化 (-2m 44s)。
    # lint 失敗時も e2e は走るが、ci-gate が両方の結果を集約するので問題なし。
    # #1006 Phase 2: --shard matrix で 3 並列化 (7m 37s → ~3m 目標)
    needs: [changes]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for E2E (preview mode)
        run: npm run build

      - name: Run E2E tests (shard ${{ matrix.shard }}/3)
        # #806: vite preview は NODE_ENV=production で起動するため、
        # hooks.server.ts の assertLicenseKeyConfigured() が AWS_LICENSE_SECRET を要求する。
        # E2E はダミーの固定値で良い（本番シークレットとは別物）。
        env:
          AWS_LICENSE_SECRET: e2e-test-secret-do-not-use-in-production
        run: npx playwright test --shard=${{ matrix.shard }}/3

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  # #1006: shard 分割された E2E blob レポートを集約し、HTML レポートを生成
  e2e-merge-reports:
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: always() && (needs.e2e-test.result == 'success' || needs.e2e-test.result == 'failure')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: e2e-blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v7
        with:
          name: e2e-html-report
          path: playwright-report/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    # #923 Phase 1: lint-and-test 依存を外して並列化 (e2e-test と同じ理由)
    needs: [changes]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (NUC)
        run: docker build -t ganbari-quest:test .

      - name: Build Lambda Docker image (AWS)
        run: docker build -f Dockerfile.lambda -t ganbari-quest-lambda:test .

  site-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.site == 'true' || needs.changes.outputs.app == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Site internal links & required elements (#710)
        run: node scripts/check-site-html.mjs

      - name: Forbidden terms check (includes site/)
        run: node scripts/check-forbidden-terms.mjs

  # ADR-0029 / #914: 新規必須 env / secret 追加チェック
  # PR diff から `assert*Configured()` / `throw new Error('...required...')` 等を検出し、
  # PR 本文に「配布済み: <ENV>」証跡が無い場合は CI を red にする。
  # Pre-PMF 1 人体制で Assertion Erosion (#911 のような assertion 追加 → 配布忘れ →
  # 連続デプロイ失敗) を機械的に止めるためのゲート。
  new-env-distribution-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check new required env / secret distribution evidence (ADR-0029)
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-new-required-env.mjs

  # ADR-0031 / #963: スキーマ変更時のテスト追加 warn チェック
  # src/lib/server/db/schema.ts が変更された PR で、tests/unit/db|services/ に
  # テスト追加/変更が無い場合 warn を出す (exit 0 で blocker にはしない)。
  # Issue #962 (is_archived NULL 混在で本番全停止) の再発防止。
  schema-change-tests-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Check schema change has tests (ADR-0031, warn only)
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-schema-change-tests.mjs

  # Gate job: always runs and reports overall CI status.
  # Required by branch ruleset instead of individual jobs,
  # so skipped jobs (via path filter) don't block merges.
  ci-gate:
    if: always()
    permissions:
      contents: read
    needs:
      [
        changes,
        lint-and-test,
        unit-test,
        unit-test-merge,
        storybook-test,
        e2e-test,
        e2e-merge-reports,
        docker-build,
        site-check,
        new-env-distribution-check,
        schema-change-tests-check,
      ]
    runs-on: ubuntu-latest
    steps:
      # #926: needs を toJSON で一括チェックし、新規 job 追加時に results 配列の更新忘れで
      # ゲートが素通りする事故を防ぐ。`needs:` リストへの追加だけで自動的にゲート対象になる。
      - name: Check CI results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "Job results:"
          echo "$NEEDS" | jq -r 'to_entries[] | "  \(.key): \(.value.result)"'
          failed=$(echo "$NEEDS" | jq -r '[to_entries[] | select(.value.result == "failure" or .value.result == "cancelled")] | length')
          if [ "$failed" -gt 0 ]; then
            echo "CI failed: $failed job(s) failed or cancelled"
            exit 1
          fi
          echo "CI passed"

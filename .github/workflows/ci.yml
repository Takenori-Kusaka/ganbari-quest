name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      deps: ${{ steps.filter.outputs.deps }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'static/**'
              - 'tests/**'
              - 'svelte.config.js'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'biome.json'
              - 'playwright*.config.*'
              - 'vitest.config.*'
              - 'Dockerfile*'
            deps:
              - 'package.json'
              - 'package-lock.json'
            site:
              - 'site/**'
              - 'scripts/check-site-html.mjs'
              - 'scripts/check-forbidden-terms.mjs'

  lint-and-test:
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Biome lint
        run: npx biome check .

      - name: Parallel implementation sync check (#565)
        run: npm run lint:parallel

      - name: Stylelint (CSS hex check)
        run: npx stylelint "src/**/*.css"

      - name: Color usage report
        run: node scripts/lint-color-classes.mjs || true

      - name: Svelte check
        run: npx svelte-kit sync && npx svelte-check --tsconfig ./tsconfig.json

      - name: Unit tests with coverage enforcement
        run: npx vitest run --coverage

      - name: Coverage threshold ratchet check
        if: github.event_name == 'pull_request'
        run: node scripts/check-coverage-threshold.js

      - name: Test anti-pattern check
        if: github.event_name == 'pull_request'
        run: node scripts/check-test-antipatterns.js

      - name: Build
        run: npm run build

      - name: Storybook build check
        run: npm run build-storybook -- --quiet

  e2e-test:
    runs-on: ubuntu-latest
    needs: [changes, lint-and-test]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for E2E (preview mode)
        run: npm run build

      - name: Run E2E tests
        # #806: vite preview は NODE_ENV=production で起動するため、
        # hooks.server.ts の assertLicenseKeyConfigured() が AWS_LICENSE_SECRET を要求する。
        # E2E はダミーの固定値で良い（本番シークレットとは別物）。
        env:
          AWS_LICENSE_SECRET: e2e-test-secret-do-not-use-in-production
        run: npx playwright test

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: [changes, lint-and-test]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.deps == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (NUC)
        run: docker build -t ganbari-quest:test .

      - name: Build Lambda Docker image (AWS)
        run: docker build -f Dockerfile.lambda -t ganbari-quest-lambda:test .

  site-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.site == 'true' || needs.changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Site internal links & required elements (#710)
        run: node scripts/check-site-html.mjs

      - name: Forbidden terms check (includes site/)
        run: node scripts/check-forbidden-terms.mjs

  # Gate job: always runs and reports overall CI status.
  # Required by branch ruleset instead of individual jobs,
  # so skipped jobs (via path filter) don't block merges.
  ci-gate:
    if: always()
    needs: [changes, lint-and-test, e2e-test, docker-build, site-check]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        run: |
          results=("${{ needs.changes.result }}" "${{ needs.lint-and-test.result }}" "${{ needs.e2e-test.result }}" "${{ needs.docker-build.result }}" "${{ needs.site-check.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed: $r"
              exit 1
            fi
          done
          echo "CI passed (jobs: ${results[*]})"

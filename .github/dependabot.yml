version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    # develop 二層: 依存更新 PR を develop 軽量レーン経由にし main 直行を止める
    # (#3072 / branch-strategy.md §7。main へは統合 PR の重量レーン + 監査で反映)
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    # develop 二層: 依存更新 PR を develop 軽量レーン経由にする (#3072 / branch-strategy.md §7)
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
    ignore:
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-patch"]
      # #3302: better-sqlite3 12.11.x は demo/SQLite (file-backed + WAL) を SIGSEGV crash させる
      # (#3190/#3192 で 12.10.0 exact pin に根治)。upstream 修正確認まで 12.11.x を ignore。
      # 12.12+ は再提案を許可 (修正版採用時は scripts/check-native-dep-pin.mjs の pin と同期更新)。
      - dependency-name: "better-sqlite3"
        versions: ["12.11.x"]
    groups:
      npm-minor-patch:
        # #3311: grouped update が per-dependency ignore (上記 better-sqlite3 12.11.x) を
        # すり抜けて 12.11.1 を再取込した regression を根治。group 自体から除外し再発を断つ
        # (#3302 SIGSEGV regression guard / scripts/check-native-dep-pin.mjs と同期)。
        exclude-patterns:
          - "better-sqlite3"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/infra"
    # develop 二層: 依存更新 PR を develop 軽量レーン経由にする (#3072 / branch-strategy.md §7)
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
      - "infra"
    groups:
      infra-npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    # develop 二層: 依存更新 PR を develop 軽量レーン経由にし main 直行を止める
    # (#3072 / branch-strategy.md §7。main へは統合 PR の重量レーン + 監査で反映)
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    # develop 二層: 依存更新 PR を develop 軽量レーン経由にする (#3072 / branch-strategy.md §7)
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
    ignore:
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-patch"]
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/infra"
    # develop 二層: 依存更新 PR を develop 軽量レーン経由にする (#3072 / branch-strategy.md §7)
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
      - "infra"
    groups:
      infra-npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

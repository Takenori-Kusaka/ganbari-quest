<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エラーが おきたよ - がんばりクエスト</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f4fd 0%,#f0f7ff 100%);font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#333}
.container{text-align:center;padding:2rem;max-width:480px}
.icon{font-size:4rem;margin-bottom:1rem}
h1{font-size:1.5rem;color:#3878B8;margin-bottom:.75rem}
.msg{font-size:1.1rem;line-height:1.8;margin-bottom:1.5rem}
.hint{font-size:.85rem;color:#888;margin-bottom:1.5rem}
.btn{display:inline-block;padding:.75rem 2rem;background:linear-gradient(135deg,#5BA3E6,#3878B8);color:#fff;text-decoration:none;border-radius:2rem;font-size:1rem;transition:opacity .2s}
.btn:hover{opacity:.85}
.code{font-size:.75rem;color:#aaa;margin-top:2rem}
</style>
</head>
<body>
<div class="container">
  <div class="icon">&#x1F6E1;&#xFE0F;</div>
  <h1>ちょっと エラーが おきたよ</h1>
  <p class="msg">ごめんね、いま うまく うごかないみたい。<br>すこし まってから もういちど ためしてね！</p>
  <p class="hint">それでも なおらないときは、おとうさん・おかあさんに おしえてね</p>
  <a href="/" class="btn">トップにもどる</a>
  <p class="code">Error 500</p>
</div>
</body>
</html>

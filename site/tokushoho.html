<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特定商取引法に基づく表記 - がんばりクエスト</title>
<meta name="robots" content="noindex">
<meta property="og:title" content="特定商取引法に基づく表記 - がんばりクエスト">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.ganbari-quest.com/tokushoho.html">
<meta property="og:image" content="https://www.ganbari-quest.com/ogp.png">
<link rel="canonical" href="https://www.ganbari-quest.com/tokushoho.html">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" defer></script>
<style>
body{line-height:1.8;background:var(--gray-50)}
table{width:100%;border-collapse:collapse;margin:16px 0}
table th,table td{padding:12px 16px;border:1px solid var(--gray-200);font-size:.9rem;vertical-align:top}
table th{background:var(--gray-50);font-weight:600;color:var(--gray-900);width:180px;white-space:nowrap}
table td{color:var(--gray-700)}
@media(max-width:600px){
  table th{width:120px;font-size:.8rem;padding:8px 10px}
  table td{font-size:.8rem;padding:8px 10px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <img src="logo-compact.png" alt="がんばりクエスト" height="44">
    </a>
    <button class="hamburger" aria-label="メニュー" aria-expanded="false" aria-controls="main-nav" onclick="var n=this.nextElementSibling;n.classList.toggle('open');var o=n.classList.contains('open');this.textContent=o?'✕':'☰';this.setAttribute('aria-expanded',o)">☰</button>
    <nav id="main-nav" class="header-nav">
      <a href="index.html" data-lp-key="nav.home" onclick="this.parentElement.classList.remove('open')">ホーム</a>
      <a href="index.html#features" data-lp-key="nav.features" onclick="this.parentElement.classList.remove('open')">できること</a>
      <a href="pricing.html" data-lp-key="nav.pricing" onclick="this.parentElement.classList.remove('open')">料金プラン</a>
      <a href="https://ganbari-quest.com/demo" class="btn btn-demo" data-lp-key="common.ctaDemo">デモを見る</a>
      <a href="https://ganbari-quest.com/auth/signup" class="btn btn-primary" data-lp-key="common.ctaSignup">無料で始める</a>
    </nav>
  </div>
</header>

<main class="main">
<article class="doc">
  <header data-lp-key="legalTokushoho.articleHeader"></header>

  <table data-lp-key="legalTokushoho.tableContent"></table>

  <div class="effective" data-lp-key="legalTokushoho.effective"></div>
</article>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <h3 data-lp-key="footer.brandName"></h3>
      <p data-lp-key="footer.brandTagline"></p>
    </div>
    <div class="footer-links">
      <h4 data-lp-key="footer.linksHeading"></h4>
      <a href="pricing.html" data-lp-key="footer.pricingLink"></a>
      <a href="https://github.com/Takenori-Kusaka/ganbari-quest" data-lp-key="footer.githubLink"></a>
      <a href="mailto:ganbari.quest.support@gmail.com" data-contact-context="特定商取引法" data-lp-key="footer.contactLink"></a>
      <a href="https://github.com/sponsors/Takenori-Kusaka" data-lp-key="footer.sponsorLink"></a>
    </div>
    <div class="footer-links">
      <h4 data-lp-key="footer.legalHeading"></h4>
      <a href="terms.html" data-lp-key="footer.termsLink"></a>
      <a href="privacy.html" data-lp-key="footer.privacyLink"></a>
      <a href="sla.html" data-lp-key="footer.slaLink"></a>
      <a href="tokushoho.html" data-lp-key="footer.tokushohoLink"></a>
    </div>
  </div>
  <div class="footer-copy">
    <p data-lp-key="footer.copyright"></p>
  </div>
</footer>

<script src="shared-labels.js"></script>
<script src="js/contact.js"></script>
</body>
</html>

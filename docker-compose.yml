services:
  app:
    build:
      context: .
      args:
        # Cache-busting arg (#711 / PR #826 review):
        # Pass BUILD_TIMESTAMP=<unique value> from deploy workflow to force
        # version:generate to re-run even when the source layer cache hits.
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
        # NUC LAN: 同一ネットワーク内の任意端末からの POST を許可 (#962)
        DISABLE_CSRF_ORIGIN_CHECK: "true"
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ./tenants:/app/client/tenants
      - ./uploads:/app/client/uploads
      - ./generated:/app/client/generated
    environment:
      - NODE_ENV=production
      - DATABASE_URL=./data/ganbari-quest.db
      - HOST=0.0.0.0
      - PORT=3000
      - ORIGIN=${ORIGIN:-http://0.0.0.0:3000}
      - TZ=Asia/Tokyo
    env_file:
      - path: .env
        required: false
    stop_grace_period: 15s
    restart: unless-stopped

  # Scheduled backup service (runs daily at 3:00 AM JST)
  # Enable: docker compose --profile backup up -d
  backup:
    build: .
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "0 3 * * * cd /app && node scripts/backup-to-gdrive.cjs >> /proc/1/fd/1 2>&1" | crontab -
        echo "[Backup] Cron scheduled: daily 3:00 AM JST (local + GDrive)"
        crond -f
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts:ro
    environment:
      - DATABASE_URL=./data/ganbari-quest.db
      - BACKUP_DIR=./data/backups
      - BACKUP_RETENTION=7
      - TZ=Asia/Tokyo
    env_file:
      - path: .env
        required: true
    restart: unless-stopped
    profiles:
      - backup

  # Optional: Caddy reverse proxy for HTTPS
  # Uncomment and create a Caddyfile to enable
  # caddy:

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-labelledby="trust-family-circle-title">
  <title id="trust-family-circle-title">家族限定アイコン</title>
  <!-- 4 人の家族が円形に並ぶシルエット (#1796 trust-badges SVG 化) -->

<?xml version="1.0" encoding="UTF-8"?>
<!--
  LP [03] core-loop 1-shot summary 図解 (#1787)
  暫定 SVG（Gemini API 鍵が利用できる環境では `npm run generate:coreloop-summary` で
  ブランドキャラクター付きの PNG に置き換える）
  色: ブランド青 #5BA3E6 / 金 #FFE44D / オレンジ accent
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320" role="img" aria-label="活動 → 習慣 → ごほうび の循環図">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFAF0"/>
      <stop offset="100%" stop-color="#F0F8FF"/>
    </linearGradient>
    <linearGradient id="badgeBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BB7E8"/>
      <stop offset="100%" stop-color="#3878B8"/>
    </linearGradient>
    <linearGradient id="badgeGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
    <linearGradient id="badgeOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB37A"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5BA3E6"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="640" height="320" rx="14" fill="url(#bgGrad)"/>

  <!-- 中央キャラクタープレースホルダー（円 + 星 emblem） -->
  <g transform="translate(320 160)">
    <circle r="56" fill="#FFFFFF" stroke="#3878B8" stroke-width="3"/>
    <!-- 兜 (helmet) -->
    <path d="M -34 -8 Q -34 -38 0 -42 Q 34 -38 34 -8 L 30 -4 Q 0 -10 -30 -4 Z" fill="#5BA3E6" stroke="#3878B8" stroke-width="2"/>
    <!-- 顔 (skin tone) -->
    <ellipse cx="0" cy="6" rx="22" ry="18" fill="#FFE0B2" stroke="#3878B8" stroke-width="1.5"/>
    <!-- 目 -->
    <circle cx="-7" cy="3" r="3" fill="#2D2D2D"/>
    <circle cx="7" cy="3" r="3" fill="#2D2D2D"/>
    <circle cx="-6" cy="2" r="1" fill="#FFFFFF"/>
    <circle cx="8" cy="2" r="1" fill="#FFFFFF"/>
    <!-- 口 (smile) -->
    <path d="M -6 12 Q 0 17 6 12" fill="none" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 頬 blush -->
    <circle cx="-13" cy="10" r="3" fill="#FFB6C1" opacity="0.6"/>
    <circle cx="13" cy="10" r="3" fill="#FFB6C1" opacity="0.6"/>
    <!-- 星 emblem on chest -->
    <polygon points="0,30 4,40 14,40 6,46 9,56 0,50 -9,56 -6,46 -14,40 -4,40" fill="#FFE44D" stroke="#FFCC00" stroke-width="1"/>
  </g>

  <!-- 循環矢印 (3 つの円弧) -->
  <g fill="none" stroke="#5BA3E6" stroke-width="2.5" stroke-linecap="round">
    <!-- 活動 → 習慣 (左上 → 右上) -->
    <path d="M 158 78 Q 320 30 482 78" marker-end="url(#arrowHead)"/>
    <!-- 習慣 → ごほうび (右上 → 下中央) -->
    <path d="M 510 110 Q 540 220 360 256" marker-end="url(#arrowHead)"/>
    <!-- ごほうび → 活動 (下中央 → 左上) -->
    <path d="M 270 256 Q 100 220 130 110" marker-end="url(#arrowHead)"/>
  </g>

  <!-- 3 アイコン円 (活動 / 習慣 / ごほうび) -->
  <!-- 活動 (左上) -->
  <g transform="translate(120 70)">
    <circle r="42" fill="#FFFFFF" stroke="url(#badgeBlue)" stroke-width="3"/>
    <!-- ノート + チェック -->
    <rect x="-18" y="-20" width="32" height="36" rx="3" fill="#5BA3E6" stroke="#3878B8" stroke-width="1.5"/>
    <line x1="-12" y1="-12" x2="8" y2="-12" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-12" y1="-6" x2="8" y2="-6" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="8" y2="0" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <!-- check mark -->
    <path d="M -8 8 L -3 13 L 8 4" fill="none" stroke="#FFE44D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="64" font-family="sans-serif" font-size="14" font-weight="700" fill="#3878B8" text-anchor="middle">活動</text>
  </g>

  <!-- 習慣 (右上) -->
  <g transform="translate(520 70)">
    <circle r="42" fill="#FFFFFF" stroke="url(#badgeBlue)" stroke-width="3"/>
    <!-- スタンプカード (5 つの星) -->
    <rect x="-22" y="-16" width="44" height="32" rx="4" fill="#FFFAF0" stroke="#3878B8" stroke-width="1.5"/>
    <g fill="#FFE44D" stroke="#FFCC00" stroke-width="0.8">
      <polygon points="-14,-4 -12,1 -7,1 -11,4 -9,9 -14,6 -19,9 -17,4 -21,1 -16,1"/>
      <polygon points="-2,-4 0,1 5,1 1,4 3,9 -2,6 -7,9 -5,4 -9,1 -4,1"/>
      <polygon points="10,-4 12,1 17,1 13,4 15,9 10,6 5,9 7,4 3,1 8,1"/>
    </g>
    <text x="0" y="64" font-family="sans-serif" font-size="14" font-weight="700" fill="#3878B8" text-anchor="middle">習慣</text>
  </g>

  <!-- ごほうび (下中央) -->
  <g transform="translate(320 268)">
    <circle r="42" fill="#FFFFFF" stroke="url(#badgeOrange)" stroke-width="3"/>
    <!-- ギフトボックス -->
    <rect x="-18" y="-12" width="36" height="26" rx="2" fill="#FF8C42" stroke="#D96B2E" stroke-width="1.5"/>
    <rect x="-18" y="-2" width="36" height="6" fill="#FFE44D" stroke="#FFCC00" stroke-width="1"/>
    <rect x="-3" y="-12" width="6" height="26" fill="#FFE44D" stroke="#FFCC00" stroke-width="1"/>
    <!-- リボン -->
    <path d="M -8 -16 Q -3 -22 0 -16 Q 3 -22 8 -16 L 0 -10 Z" fill="#FFE44D" stroke="#FFCC00" stroke-width="1"/>
    <text x="0" y="-50" font-family="sans-serif" font-size="14" font-weight="700" fill="#D96B2E" text-anchor="middle">ごほうび</text>
  </g>
</svg>
